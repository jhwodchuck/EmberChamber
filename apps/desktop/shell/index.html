<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EmberChamber Desktop Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0809;
        --bg-secondary: #130c0d;
        --panel: rgba(19, 12, 13, 0.9);
        --panel-strong: rgba(17, 11, 12, 0.94);
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 184, 144, 0.24);
        --text: #fcfbfa;
        --muted: #d7b9ab;
        --accent: #ffb890;
        --accent-strong: #ea6f3f;
        --accent-ink: #fff7f1;
        --warning: #ffd28b;
        --error: #fecdd3;
        --success: #98efc5;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
        font-family: "Ubuntu", "Cantarell", "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(255, 191, 146, 0.12), transparent 20%),
          radial-gradient(circle at 12% 14%, rgba(234, 111, 63, 0.1), transparent 14%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent 24%),
          var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100vh;
        padding: 14px;
      }

      .auth-layout,
      .workspace-layout {
        display: grid;
        gap: 24px;
      }

      .auth-layout {
        grid-template-columns: minmax(0, 1.25fr) minmax(24rem, 32rem);
      }

      .workspace-layout {
        grid-template-columns: 15.5rem minmax(0, 1fr);
        align-items: stretch;
      }

      .panel,
      .card {
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
          var(--panel);
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 16px;
      }

      .panel-strong {
        background: linear-gradient(180deg, rgba(255, 171, 120, 0.08), transparent 38%), var(--panel-strong);
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .grid-2,
      .grid-3 {
        display: grid;
        gap: 16px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .wordmark,
      .brand-chip {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #ffb890, #ea6f3f);
        color: #170c0a;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .logo.small {
        width: 42px;
        height: 42px;
        border-radius: 14px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      h1 {
        max-width: 16ch;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1;
        letter-spacing: -0.03em;
        font-family: inherit;
      }

      h2 {
        font-size: 1.2rem;
        line-height: 1.2;
        font-family: inherit;
      }

      h3 {
        font-size: 1rem;
        line-height: 1.3;
      }

      .lede {
        margin-top: 18px;
        max-width: 56ch;
        color: var(--muted);
        line-height: 1.7;
        font-size: 1.02rem;
      }

      .highlight {
        margin-top: 20px;
        border-radius: 18px;
        border: 1px solid rgba(255, 184, 144, 0.22);
        background: rgba(234, 111, 63, 0.1);
        padding: 16px 18px;
        line-height: 1.6;
      }

      .step,
      .metric,
      .mini-card {
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--bg-secondary);
        padding: 16px;
      }

      .step-number,
      .label {
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .step p,
      .metric p,
      .mini-card p,
      .subtle,
      .hint,
      .empty,
      .group-copy,
      .session-copy {
        color: var(--muted);
        line-height: 1.6;
      }

      .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 2rem;
        line-height: 1;
      }

      .sidebar {
        position: sticky;
        top: 14px;
        display: grid;
        gap: 12px;
      }

      .sidebar-nav {
        display: grid;
        gap: 8px;
      }

      .nav-button,
      .ghost-button,
      .primary-button,
      .danger-button,
      .secondary-button {
        appearance: none;
        border-radius: 12px;
        padding: 11px 13px;
        border: 1px solid transparent;
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          opacity 120ms ease;
      }

      .nav-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        background: transparent;
        border-color: transparent;
        color: var(--muted);
        text-align: left;
      }

      .nav-button.active {
        background: rgba(234, 111, 63, 0.14);
        border-color: rgba(255, 184, 144, 0.2);
        color: var(--text);
      }

      .nav-button:hover,
      .ghost-button:hover,
      .secondary-button:hover {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .ghost-button,
      .secondary-button {
        background: rgba(255, 255, 255, 0.03);
        border-color: var(--line);
        color: var(--muted);
      }

      .primary-button {
        background: var(--accent-strong);
        border-color: transparent;
        color: var(--accent-ink);
        font-weight: 700;
        box-shadow: 0 16px 38px rgba(234, 111, 63, 0.28);
      }

      .danger-button {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.28);
        color: #fecaca;
      }

      .primary-button[disabled],
      .danger-button[disabled],
      .ghost-button[disabled],
      .secondary-button[disabled] {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .field-grid,
      .field-stack {
        display: grid;
        gap: 14px;
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 12px 13px;
        outline: none;
      }

      textarea {
        min-height: 108px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(255, 184, 144, 0.6);
        box-shadow: 0 0 0 3px rgba(234, 111, 63, 0.12);
      }

      .checkbox-row,
      .toggle-row,
      .inline-actions,
      .group-meta,
      .badge-row,
      .session-row,
      .view-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .toggle-row,
      .session-row,
      .view-header {
        justify-content: space-between;
      }

      .checkbox-row {
        align-items: flex-start;
      }

      .checkbox-row input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        padding: 0;
      }

      .status {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--bg-secondary);
        padding: 14px 16px;
      }

      .status h3 {
        font-size: 0.98rem;
      }

      .status p {
        margin-top: 8px;
        line-height: 1.6;
      }

      .status.info {
        border-color: var(--line);
      }

      .status.success {
        border-color: rgba(152, 239, 197, 0.34);
        background: rgba(12, 43, 34, 0.52);
      }

      .status.warning {
        border-color: rgba(255, 210, 139, 0.36);
        background: rgba(71, 50, 18, 0.44);
      }

      .status.error {
        border-color: rgba(253, 164, 175, 0.36);
        background: rgba(82, 23, 23, 0.42);
      }

      .status code,
      .code-block {
        display: block;
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(13, 8, 9, 0.78);
        color: var(--accent);
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .auth-mode-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .auth-mode-button {
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        padding: 10px 14px;
      }

      .auth-mode-button.active {
        border-color: var(--line-strong);
        background: rgba(234, 111, 63, 0.14);
        color: var(--text);
      }

      .qr-surface,
      .scanner-shell {
        display: grid;
        gap: 12px;
        justify-items: center;
        margin-top: 16px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        padding: 16px;
      }

      .qr-surface svg {
        display: block;
        width: 260px;
        height: 260px;
        max-width: 100%;
        padding: 12px;
        border-radius: 20px;
        background: #ffffff;
      }

      .scanner-video {
        width: min(100%, 26rem);
        aspect-ratio: 1;
        border-radius: 20px;
        background: #000000;
        object-fit: cover;
      }

      .status-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .workspace-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .workspace-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .content {
        min-width: 0;
      }

      .section-stack {
        display: grid;
        gap: 16px;
      }

      .group-card,
      .session-card,
      .invite-card {
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        padding: 16px;
      }

      .group-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        font-size: 0.75rem;
        color: var(--muted);
      }

      .badge.good {
        border-color: rgba(124, 230, 191, 0.26);
        color: var(--success);
      }

      .badge.warn {
        border-color: rgba(255, 210, 139, 0.28);
        color: var(--warning);
      }

      .badge.bad {
        border-color: rgba(253, 164, 175, 0.26);
        color: var(--error);
      }

      .group-copy,
      .session-copy {
        margin-top: 8px;
      }

      .rule-block {
        margin-top: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
      }

      .split-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .divider {
        height: 1px;
        background: var(--line);
      }

      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .empty {
        padding: 18px;
        border-radius: 20px;
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .section-intro {
        max-width: 56ch;
        color: var(--muted);
        line-height: 1.7;
      }

      .hero-summary {
        display: grid;
        gap: 18px;
      }

      .hero-summary h2 {
        font-size: 1.35rem;
        line-height: 1.15;
        letter-spacing: -0.02em;
        max-width: 18ch;
      }

      .secondary-meta {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .group-switcher {
        display: grid;
        gap: 8px;
      }

      .thread-layout {
        display: grid;
        gap: 16px;
      }

      .thread-card {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(17, 11, 12, 0.92);
        padding: 16px;
      }

      .thread-stream {
        display: grid;
        gap: 14px;
        max-height: 36rem;
        overflow-y: auto;
        padding-right: 4px;
      }

      .message-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(40rem, 100%);
      }

      .message-row.self {
        justify-self: end;
      }

      .message-row.system {
        justify-self: center;
        max-width: 32rem;
      }

      .message-bubble {
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        padding: 14px;
      }

      .message-row.self .message-bubble {
        background: rgba(234, 111, 63, 0.12);
        border-color: rgba(255, 184, 144, 0.2);
      }

      .message-row.system .message-bubble {
        background: rgba(255, 255, 255, 0.02);
        text-align: center;
      }

      .message-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.86rem;
        color: var(--muted);
      }

      .message-copy {
        margin-top: 10px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .media-shell {
        position: relative;
        margin-top: 12px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(13, 8, 9, 0.92);
      }

      .media-shell img,
      .media-shell video {
        display: block;
        width: 100%;
        max-height: 28rem;
        object-fit: contain;
        background: #120a0a;
      }

      .media-shell img:not(.no-zoom) {
        cursor: zoom-in;
      }

      .lightbox-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
      }

      .lightbox-overlay img {
        max-width: 92vw;
        max-height: 88vh;
        object-fit: contain;
        border-radius: 8px;
        cursor: default;
        box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
      }

      .lightbox-close {
        position: absolute;
        top: 20px;
        right: 24px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .lightbox-close:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .read-receipt {
        font-size: 0.82rem;
        opacity: 0.7;
        margin-left: 4px;
      }

      .read-receipt.read {
        color: var(--accent);
        opacity: 1;
      }

      .media-shell.blurred img {
        filter: blur(28px) saturate(0.7);
        transform: scale(1.04);
      }

      .media-shell.blurred video {
        filter: blur(22px) saturate(0.7);
      }

      .media-placeholder {
        display: grid;
        gap: 10px;
        padding: 20px;
        min-height: 13rem;
        place-items: center;
        text-align: center;
        color: var(--muted);
      }

      .media-overlay {
        position: absolute;
        inset: auto 12px 12px 12px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }

      .watermark {
        max-width: 18rem;
        border-radius: 999px;
        background: rgba(13, 8, 9, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 7px 10px;
        font-size: 0.78rem;
        color: rgba(255, 241, 232, 0.92);
        backdrop-filter: blur(8px);
      }

      .reveal-button {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }

      .composer-grid {
        display: grid;
        gap: 16px;
      }

      .composer-preview {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
      }

      .composer-preview img,
      .composer-preview video {
        display: block;
        width: 100%;
        max-height: 20rem;
        object-fit: contain;
        border-radius: 14px;
        background: #120a0a;
      }

      .group-shortcut {
        width: 100%;
        text-align: left;
      }

      /* ── Chat list ─────────────────────────────────────────── */
      .search-input {
        width: 100%;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 11px 16px;
        font: inherit;
        outline: none;
      }
      .search-input:focus { border-color: var(--line-strong); }

      .filter-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
        margin-bottom: 14px;
      }
      .filter-chip {
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        padding: 7px 12px;
        font: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        text-transform: capitalize;
      }
      .filter-chip.active {
        border-color: var(--line-strong);
        background: rgba(234, 111, 63, 0.14);
        color: var(--text);
      }

      .chat-list { display: grid; gap: 4px; margin-top: 6px; }

      .chat-row {
        display: flex;
        width: 100%;
        text-align: left;
        gap: 12px;
        align-items: flex-start;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid transparent;
        cursor: pointer;
        font: inherit;
        background: none;
        color: var(--text);
      }
      .chat-row:hover { background: rgba(255,255,255,0.04); border-color: var(--line); }
      .chat-row.active { background: rgba(234,111,63,0.08); border-color: rgba(255,184,144,0.18); }

      .chat-avatar {
        flex-shrink: 0;
        width: 46px;
        height: 46px;
        border-radius: 16px;
        background: rgba(234,111,63,0.16);
        border: 1px solid rgba(234,111,63,0.22);
        display: grid;
        place-items: center;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--accent);
      }
      .chat-row-info { flex: 1; min-width: 0; display: grid; gap: 4px; }
      .chat-row-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .chat-row-title { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
      .chat-row-time { font-size: 0.78rem; color: var(--muted); flex-shrink: 0; }
      .chat-row-preview { font-size: 0.85rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .chat-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
      .chat-badge {
        border-radius: 999px;
        padding: 2px 7px;
        font-size: 0.72rem;
        font-weight: 700;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .chat-badge.locked { border-color: rgba(152,239,197,0.26); color: var(--success); }
      .chat-badge.sensitive { border-color: rgba(255,210,139,0.28); color: var(--warning); }
      .chat-member-count { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

      /* ── Settings ──────────────────────────────────────────── */
      .settings-avatar {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        background: rgba(234,111,63,0.16);
        border: 1px solid rgba(234,111,63,0.24);
        display: grid;
        place-items: center;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
      }
      .settings-account-row { display: flex; align-items: center; gap: 14px; margin: 14px 0; }

      .metric-tile {
        flex: 1;
        min-width: 130px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.03);
        padding: 12px;
        display: grid;
        gap: 5px;
      }
      .metric-tile-label { font-size: 0.71rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
      .metric-tile-value { font-size: 0.95rem; font-weight: 700; }
      .metric-tile-hint { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
      .metric-tile-row { display: flex; gap: 10px; flex-wrap: wrap; }

      .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--line); }

            payload.inviteToken ||
            payload.groupInviteReference ||
            payload.deviceBundle ||
            payload.mailboxCursor ||

      function applyPersistedSecureState(payload = {}) {
        state.session = payload.session || null;
        state.pendingChallenge = payload.pendingChallenge || null;
        state.createdInvites =
          payload.createdInvites && typeof payload.createdInvites === "object" ? payload.createdInvites : {};
        state.authForm.email = typeof payload.email === "string" ? payload.email : "";
        state.authForm.inviteToken = typeof payload.inviteToken === "string" ? payload.inviteToken : "";
        state.authForm.groupInviteReference =
          typeof payload.groupInviteReference === "string" ? payload.groupInviteReference : "";

          payload.deviceBundle && typeof payload.deviceBundle === "object" ? payload.deviceBundle : null;
        state.mailboxCursor = typeof payload.mailboxCursor === "string" ? payload.mailboxCursor : "";

          typeof payload.deviceLabel === "string" && payload.deviceLabel.trim()

      function currentSecureStatePayload() {
        return {
          session: state.session,
          pendingChallenge: state.pendingChallenge,
          createdInvites: state.createdInvites,
          email: state.authForm.email.trim(),
          inviteToken: state.authForm.inviteToken.trim(),
          groupInviteReference: state.authForm.groupInviteReference.trim(),

          deviceLabel: state.authForm.deviceLabel.trim() || suggestDesktopLabel(),

      function updateSecureStorageStatus(snapshot) {
        if (!snapshot || typeof snapshot !== "object") {

        }

        state.secureStorageDetail = snapshot.detail || snapshot.storagePath || null;
      }

      async function desktopInvoke(command, payload = {}) {
        const invoke = globalThis.__TAURI_INTERNALS__?.invoke;

      function writeBrowserSecureState(payload) {

        writeLegacyJson(legacyStorageKeys.pendingChallenge, payload.pendingChallenge);
        writeLegacyJson(legacyStorageKeys.createdInvites, payload.createdInvites || {});
        writeLocalText(legacyStorageKeys.email, payload.email || "");
        writeLocalText(legacyStorageKeys.inviteToken, payload.inviteToken || "");
        writeLocalText(legacyStorageKeys.groupInviteReference, payload.groupInviteReference || "");
        writeLegacyJson("emberchamber.desktop.device-bundle.v1", payload.deviceBundle || null);
        writeLocalText("emberchamber.desktop.mailbox-cursor.v1", payload.mailboxCursor || "");
        writeLocalText(legacyStorageKeys.deviceLabel, payload.deviceLabel || suggestDesktopLabel());
      }

      async function loadPersistedSecureState() {
        const legacyState = readLegacySecureState();

        if (!nativeDesktop) {
          applyPersistedSecureState(legacyState);
          state.secureStorageMode = "browser";
          state.secureStorageDetail = null;
          return;
        }

        try {
          const snapshot = await desktopInvoke("load_secure_state");
          updateSecureStorageStatus(snapshot);

          if (hasPersistedSecureState(snapshot?.state)) {
            applyPersistedSecureState(snapshot.state);
            clearLegacySecureState();
            return;
          }

          if (hasPersistedSecureState(legacyState)) {
            applyPersistedSecureState(legacyState);
            const migrated = await desktopInvoke("save_secure_state", {
              state: currentSecureStatePayload(),
            });
            updateSecureStorageStatus(migrated);
            clearLegacySecureState();
            return;
          }

          applyPersistedSecureState(snapshot?.state || {});
          clearLegacySecureState();
        } catch (error) {
          applyPersistedSecureState({});
          state.secureStorageMode = "memory";
          state.secureStorageDetail =
            error instanceof Error
              ? `${error.message} This install is running in volatile memory only until native secure storage recovers.`
              : "Desktop secure storage is unavailable. This install is running in volatile memory only until native secure storage recovers.";
        }
      }

      async function persistSecureStateNow() {
        const payload = currentSecureStatePayload();

        if (!nativeDesktop) {
          writeBrowserSecureState(payload);
          return;
        }

        try {
          const snapshot = await desktopInvoke("save_secure_state", { state: payload });
          updateSecureStorageStatus(snapshot);
          clearLegacySecureState();
        } catch (error) {
          state.secureStorageMode = "memory";
          state.secureStorageDetail =
            error instanceof Error
              ? `${error.message} Changes are staying in memory only until native secure storage recovers.`
              : "Desktop secure storage is unavailable. Changes are staying in memory only until native secure storage recovers.";
        }
      }

      function scheduleSecureStatePersist() {
        if (secureStatePersistTimer) {
          globalThis.clearTimeout(secureStatePersistTimer);
        }

        secureStatePersistTimer = globalThis.setTimeout(() => {
          secureStatePersistTimer = 0;

      async function clearPersistedSecureState() {
        if (secureStatePersistTimer) {
          globalThis.clearTimeout(secureStatePersistTimer);
          secureStatePersistTimer = 0;
        }

        if (!nativeDesktop) {
          clearLegacySecureState();
          return;
        }

        try {
          const snapshot = await desktopInvoke("clear_secure_state");
          updateSecureStorageStatus(snapshot);
          clearLegacySecureState();
        } catch (error) {
          clearLegacySecureState();
          state.secureStorageMode = "memory";
          state.secureStorageDetail =
            error instanceof Error
              ? `${error.message} Desktop secure storage could not be cleared natively, so this install is staying in volatile memory only.`
              : "Desktop secure storage is unavailable. This install is staying in volatile memory only.";
        }

      function clearStoredSession() {
        state.session = null;
      }

      function clearPendingChallenge() {
        state.pendingChallenge = null;
      }

      async function setNativeContentProtection(enabled) {
        if (!nativeDesktop) {

      function normalizeRelayUrl(value) {
        return (value || DEFAULT_RELAY_URL).trim().replace(/\/$/, "");

      function isLocalRelayUrl(value = state.relayUrl) {
        try {
          const url = new URL(normalizeRelayUrl(value));
          return ["127.0.0.1", "localhost"].includes(url.hostname);
        } catch {
          return false;
        }
      }

      function hasStoredRelayOverride() {
        return Boolean(readLocalText(localStorageKeys.relayUrl).trim());
      }

      async function maybeAdoptLocalRelay() {
        if (state.session || hasStoredRelayOverride()) {
          return false;
        }

        try {
          const response = await fetch(`${LOCAL_RELAY_URL}/health`);
          if (!response.ok) {
            return false;
          }

          const body = (await response.json().catch(() => null)) || null;
          if (
            !body ||
            body.relay !== "cloudflare-workers" ||
            body.localAutoconnectMarker !== LOCAL_RELAY_AUTOCONNECT_MARKER
          ) {
            return false;
          }

          state.relayUrl = LOCAL_RELAY_URL;

          if (!state.authForm.groupInviteReference.trim() && !state.authForm.inviteToken.trim()) {
            state.authForm.inviteToken = LOCAL_RELAY_TEST_INVITE_TOKEN;
            await persistSecureStateNow();

          const status = createStatus(
            "success",
            "Local Ubuntu test setup detected",
            "A local relay is already running, so this install will use it directly. The reusable local beta invite is prefilled when you need bootstrap instead of a group invite URL.",
            state.relayUrl

          state.settingsStatus = status;
          render();

      function suggestDesktopLabel() {
        const agent = [navigator.userAgentData?.platform, navigator.platform, navigator.userAgent]
          .filter(Boolean)
          .join(" ");

        if (/win/i.test(agent)) {
          return "Windows desktop";
        }

        if (/linux/i.test(agent)) {
          return "Linux desktop";
        }

        if (/mac/i.test(agent)) {
          return "Mac desktop";
        }

        return "Desktop app";
      }

      function readCompletionTokenFromLocation() {
        try {
          const token = new URL(globalThis.location.href).searchParams.get("token");
          return token || "";
        } catch {

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDateTime(value) {
        if (!value) {
          return "Unknown time";
        }

        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return value;
        }

        return timeFormatter.format(parsed);
      }

      function formatChatTimestamp(value) {
        if (!value) { return ""; }
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) { return ""; }
        const now = new Date();
        const sameDay = parsed.getFullYear() === now.getFullYear() && parsed.getMonth() === now.getMonth() && parsed.getDate() === now.getDate();
        return sameDay
          ? parsed.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
          : parsed.toLocaleDateString([], { month: "short", day: "numeric" });

      function encodeBytes(bytes) {

        for (let index = 0; index < bytes.length; index += chunkSize) {

        return bytes;

        return encodeBytes(new Uint8Array(digest));

          signedPrekeyB64: publicKeyB64,
          signedPrekeySignatureB64: publicKeyB64,

      async function encryptThreadAttachment(file) {

        const rawKey = nacl.randomBytes(nacl.secretbox.keyLength);
        const iv = nacl.randomBytes(nacl.secretbox.nonceLength);

          ciphertext: toArrayBuffer(ciphertext),
          plaintextSha256B64: await sha256B64(plaintext),

      async function decryptThreadAttachment(ciphertext, attachment) {

        const rawKey = decodeBytes(attachment.fileKeyB64);
        const iv = decodeBytes(attachment.fileIvB64);
        if (iv.length === nacl.secretbox.nonceLength) {
          const plaintext = nacl.secretbox.open(new Uint8Array(ciphertext), iv, rawKey);
          if (!plaintext) {

        return crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);

      function encryptConversationPayload(payload, recipientIdentityKeyB64, senderPrivateKeyB64) {
        const nonce = nacl.randomBytes(nacl.box.nonceLength);
        const ciphertext = nacl.box(
          utf8Encoder.encode(JSON.stringify(payload)),
          nonce,
          decodeBytes(recipientIdentityKeyB64),
          decodeBytes(senderPrivateKeyB64)

        return encodeBytes(
          utf8Encoder.encode(
            JSON.stringify({
              version: 1,
              nonceB64: encodeBytes(nonce),
              boxB64: encodeBytes(ciphertext),
            })
          )
        );
