      function decryptConversationPayload(ciphertext, senderIdentityKeyB64, recipientPrivateKeyB64) {
        const envelope = JSON.parse(utf8Decoder.decode(decodeBytes(ciphertext)));
        const plaintext = nacl.box.open(
          decodeBytes(envelope.boxB64),
          decodeBytes(envelope.nonceB64),
          decodeBytes(senderIdentityKeyB64),
          decodeBytes(recipientPrivateKeyB64)
        );

        if (!plaintext) {
          throw new Error("Conversation envelope could not be opened.");
        }

        return JSON.parse(utf8Decoder.decode(plaintext));
      }

      function isBusy(action) {
        return state.busyAction === action;
      }

      function setBusy(action) {
        state.busyAction = action;
        render();
      }

      function clearBusy() {
        state.busyAction = "";
        render();
      }

      function createStatus(tone, title, body, detail) {
        return { tone, title, body, detail };
      }

      function renderStatus(status) {
        if (!status) {
          return "";
        }

        return `
          <section class="status ${escapeHtml(status.tone || "info")}">
            <h3>${escapeHtml(status.title)}</h3>
            <p>${escapeHtml(status.body)}</p>
            ${status.detail ? `<code>${escapeHtml(status.detail)}</code>` : ""}
          </section>
        `;
      }

      function parseCompletionToken(value) {
        const trimmed = (value || "").trim();
        if (!trimmed) {
          return "";
        }

        try {
          const url = new URL(trimmed);
          const searchToken = url.searchParams.get("token");
          if (searchToken) {
            return searchToken;
          }
        } catch {
          // Ignore parse failures and fall back to raw input.
        }

        const tokenMatch = trimmed.match(/[?&]token=([^&]+)/);
        if (tokenMatch) {
          return decodeURIComponent(tokenMatch[1]);
        }

        return trimmed;
      }

      function parseInviteReference(value) {
        const trimmed = (value || "").trim();
        if (!trimmed) {
          return null;
        }

        try {
          const url = new URL(trimmed);
          const segments = url.pathname.split("/").filter(Boolean);
          if (segments[0] === "invite" && segments.length >= 3) {
            return {
              groupId: segments[1],
              inviteToken: segments[2],
            };
          }
        } catch {
          // Ignore parse failures and fall back to local parsing.
        }

        const parts = trimmed.split("/").filter(Boolean);
        if (parts.length >= 2) {
          return {
            groupId: parts[parts.length - 2],
            inviteToken: parts[parts.length - 1],
          };
        }

        return null;
      }

      const DEVICE_LINK_QR_PREFIX = "emberchamber-device-link:";
      const LOCAL_RELAY_HOSTS = new Set(["127.0.0.1", "localhost", "10.0.2.2", "tauri.localhost"]);

      function deviceLinkTextToBase64Url(value) {
        return btoa(value).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function deviceLinkTextFromBase64Url(value) {
        const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
        const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
        return atob(normalized + padding);
      }

      function defaultPort(protocol) {
        return protocol === "https:" ? "443" : protocol === "http:" ? "80" : "";
      }

      function normalizeRelayOrigin(value) {
        return new URL(value).origin.replace(/\/$/, "");
      }

      function canonicalRelayOrigin(value) {
        const parsed = new URL(value);
        const host = parsed.hostname.toLowerCase();
        const port = parsed.port || defaultPort(parsed.protocol);

        if (LOCAL_RELAY_HOSTS.has(host)) {
          return `${parsed.protocol}//loopback:${port}`;
        }

        return `${parsed.protocol}//${host}${port ? `:${port}` : ""}`;
      }

      function relayOriginsMatch(left, right) {
        try {
          return canonicalRelayOrigin(left) === canonicalRelayOrigin(right);
        } catch {
          return false;
        }
      }

      function createDeviceLinkToken() {
        if (typeof crypto.randomUUID === "function") {
          return `${crypto.randomUUID()}-${crypto.randomUUID()}`;
        }

        const bytes = crypto.getRandomValues(new Uint8Array(24));
        return Array.from(bytes, (value) => value.toString(16).padStart(2, "0")).join("");
      }

      function encodeDeviceLinkQrPayload(input) {
        const payload = {
          version: 1,
          relayOrigin: normalizeRelayOrigin(input.relayOrigin),
          qrMode: input.qrMode,
          linkToken: input.linkToken,
          ...(input.requesterLabel ? { requesterLabel: input.requesterLabel } : {}),
        };

        return `${DEVICE_LINK_QR_PREFIX}${deviceLinkTextToBase64Url(JSON.stringify(payload))}`;
      }

      function parseDeviceLinkQrPayload(value) {
        const trimmed = (value || "").trim();
        if (!trimmed) {
          throw new Error("QR payload is empty.");
        }

        const encoded = trimmed.startsWith(DEVICE_LINK_QR_PREFIX)
          ? trimmed.slice(DEVICE_LINK_QR_PREFIX.length)
          : trimmed;
        const parsed = JSON.parse(deviceLinkTextFromBase64Url(encoded));

        if (parsed.version !== 1) {
          throw new Error("Unsupported device-link QR version.");
        }

        if (
          (parsed.qrMode !== "source_display" && parsed.qrMode !== "target_display") ||
          typeof parsed.linkToken !== "string" ||
          parsed.linkToken.length < 16 ||
          typeof parsed.relayOrigin !== "string"
        ) {
          throw new Error("Invalid device-link QR payload.");
        }

        return {
          version: 1,
          relayOrigin: normalizeRelayOrigin(parsed.relayOrigin),
          qrMode: parsed.qrMode,
          linkToken: parsed.linkToken,
          ...(typeof parsed.requesterLabel === "string" && parsed.requesterLabel.trim()
            ? { requesterLabel: parsed.requesterLabel.trim() }
            : {}),
        };
      }

      function deviceLinkDescription(status, signedIn) {
        if (!status) {
          return signedIn
            ? "Start a QR request from this signed-in device, or scan a waiting QR from the new device."
            : "Use a readable device label, then either show a QR for a signed-in device to scan or scan a trusted-device QR here.";
        }

        if (status.state === "waiting_for_source") {
          return "Waiting for a signed-in device to scan this QR and attach it to your account.";
        }

        if (status.state === "pending_claim") {
          return "Waiting for the new device to scan this QR and announce its device label.";
        }

        if (status.state === "pending_approval") {
          return signedIn
            ? `${status.requesterLabel} is ready. Approve it on this device to issue a new session.`
            : `${status.requesterLabel} is waiting for approval from your signed-in device.`;
        }

        if (status.state === "approved") {
          return signedIn
            ? `${status.requesterLabel} has been approved. The new device can finish sign-in now.`
            : `${status.requesterLabel} was approved. Finishing sign-in on this desktop now.`;
        }

        if (status.state === "consumed") {
          return `${status.requesterLabel} already finished sign-in with this QR.`;
        }

        if (status.state === "expired") {
          return "This QR expired. Start a fresh device-link request.";
        }

        return "Device-link status is updating.";
      }

      function deviceLinkStatusTone(status) {
        if (!status) {
          return "info";
        }

        if (status.state === "expired") {
          return "warning";
        }

        if (status.state === "consumed") {
          return "success";
        }

        return "info";
      }

      function clearDeviceLinkState(options = {}) {
        const { preserveMessage = false } = options;

        if (deviceLinkPollTimer) {
          globalThis.clearTimeout(deviceLinkPollTimer);
          deviceLinkPollTimer = 0;
        }

        if (deviceLinkScannerControls?.stop) {
          try {
            deviceLinkScannerControls.stop();
          } catch {
            // Ignore scanner cleanup failures.
          }
        }
        deviceLinkScannerControls = null;

        state.deviceLink.qrPayload = "";
        state.deviceLink.activeLink = null;
        state.deviceLink.status = null;
        state.deviceLink.scannerOpen = false;
        state.deviceLink.scanExpectation = state.session ? "target_display" : "source_display";
        state.deviceLink.completedSessionId = "";
        if (!preserveMessage) {
          state.deviceLink.message = null;
        }
      }

      function currentRelayOrigin() {
        return normalizeRelayOrigin(state.relayUrl);
      }

      function rememberInvite(groupId, invite) {
        const current = Array.isArray(state.createdInvites[groupId]) ? state.createdInvites[groupId] : [];
        const next = [invite, ...current.filter((entry) => entry.id !== invite.id)].slice(0, 8);
        state.createdInvites = {
          ...state.createdInvites,
          [groupId]: next,
        };
        void persistSecureStateNow();
      }

      function cachedInvite(groupId, inviteId) {
        const items = Array.isArray(state.createdInvites[groupId]) ? state.createdInvites[groupId] : [];
        return items.find((entry) => entry.id === inviteId) || null;
      }

      function revokePreviewUrl(url) {
        if (!url) {
          return;
        }

        try {
          URL.revokeObjectURL(url);
        } catch {
          // Ignore preview cleanup failures.
        }
      }

      function clearComposerFile() {
        revokePreviewUrl(state.threadComposer.previewUrl);
        state.threadComposer.file = null;
        state.threadComposer.fileName = "";
        state.threadComposer.mimeType = "";
        state.threadComposer.previewUrl = "";
      }

      function setComposerFile(file) {
        clearComposerFile();

        if (!file) {
          return;
        }

        state.threadComposer.file = file;
        state.threadComposer.fileName = file.name;
        state.threadComposer.mimeType = file.type || "application/octet-stream";
        if (file.type.startsWith("image/") || file.type.startsWith("video/")) {
          state.threadComposer.previewUrl = URL.createObjectURL(file);
        }
      }

      function currentGroup() {
        return state.groups.find((group) => group.id === state.activeGroupId) || null;
      }

      async function ensureDesktopDeviceBundle() {
        if (!state.session) {
          throw new Error("Missing relay session");
        }

        if (state.deviceBundle?.privateKeyB64) {
          return state.deviceBundle;
        }

        const bundle = createStoredDeviceBundle();
        await relayFetch("/v1/devices/register", {
          method: "POST",
          body: JSON.stringify(toPublicPrekeyBundle(bundle)),
        });
        state.deviceBundle = bundle;
        await persistSecureStateNow();
        return bundle;
      }

      async function listDeviceBundlesForAccount(accountId) {
        if (deviceBundleDirectoryCache.has(accountId)) {
          return deviceBundleDirectoryCache.get(accountId);
        }

        const request = relayFetch(`/v1/accounts/${accountId}/device-bundles`).catch((error) => {
          deviceBundleDirectoryCache.delete(accountId);
          throw error;
        });
        deviceBundleDirectoryCache.set(accountId, request);
        return request;
      }

      async function syncEncryptedMailbox() {
        if (!state.session) {
          return { receivedConversationIds: [] };
        }

        const localBundle = await ensureDesktopDeviceBundle();
        const sync = await relayFetch(
          `/v1/mailbox/sync?after=${encodeURIComponent(state.mailboxCursor || "")}&limit=${encodeURIComponent("100")}`
        );
        const receivedConversationIds = new Set();
        const updates = new Map();
        const ackEnvelopeIds = [];

        for (const envelope of sync.envelopes || []) {
          try {
            const senderBundles = await listDeviceBundlesForAccount(envelope.senderAccountId);
            const senderBundle = senderBundles.find((entry) => entry.deviceId === envelope.senderDeviceId);
            if (!senderBundle) {
              continue;
            }

            const payload = decryptConversationPayload(
              envelope.ciphertext,
              senderBundle.bundle.identityKeyB64,
              localBundle.privateKeyB64
            );
            if (!payload || payload.kind !== "ember_conversation_v1") {
              continue;
            }

            const existing = updates.get(envelope.conversationId) || readCachedThreadMessages(envelope.conversationId);
            const message = {
              id: `${envelope.envelopeId}:${payload.clientMessageId}`,
              conversationId: envelope.conversationId,
              historyMode: "device_encrypted",
              senderAccountId: envelope.senderAccountId,
              senderDisplayName: payload.senderDisplayName,
              kind: payload.attachment ? "media" : "text",
              text: payload.text,
              attachment: payload.attachment
                ? {
                    ...payload.attachment,
                    downloadUrl: "",
                  }
                : null,
              createdAt: payload.createdAt,
            };
            const merged = existing
              .filter((entry) => entry.id !== message.id)
              .concat(message)
              .sort((left, right) => new Date(left.createdAt).getTime() - new Date(right.createdAt).getTime());

            updates.set(envelope.conversationId, merged);
            ackEnvelopeIds.push(envelope.envelopeId);
            receivedConversationIds.add(envelope.conversationId);
          } catch {
            // Ignore envelopes that this desktop cannot open.
          }
        }

        updates.forEach((messages, conversationId) => {
          writeCachedThreadMessages(conversationId, messages);
        });

        if (sync.cursor?.lastSeenEnvelopeId) {
          state.mailboxCursor = sync.cursor.lastSeenEnvelopeId;
          await persistSecureStateNow();
        }

        if (ackEnvelopeIds.length > 0) {
          await relayFetch("/v1/mailbox/ack", {
            method: "POST",
            body: JSON.stringify({ envelopeIds: ackEnvelopeIds }),
          });
        }

        if (state.activeGroupId && receivedConversationIds.has(state.activeGroupId)) {
          state.threadMessages = readCachedThreadMessages(state.activeGroupId);
          clearThreadAttachmentMedia();
          render();
        }

        return { receivedConversationIds: Array.from(receivedConversationIds) };
      }

      function stopMailboxSocket() {
        if (mailboxReconnectTimer) {
          globalThis.clearTimeout(mailboxReconnectTimer);
          mailboxReconnectTimer = 0;
        }

        if (mailboxSocket) {
          try {
            mailboxSocket.close();
          } catch {
            // Ignore socket close failures.
          }
          mailboxSocket = null;
        }
      }

      async function connectMailboxSocket(refreshBeforeConnect = false) {
        stopMailboxSocket();

        try {
          const activeSession = state.session;
          if (!activeSession?.accessToken) {
            return;
          }

          const socketSession = refreshBeforeConnect ? await refreshRelaySession() : activeSession;
          if (!socketSession?.accessToken) {
            return;
          }

          const wsUrl = `${state.relayUrl.replace(/^http/, "ws")}/v1/mailbox/ws?token=${encodeURIComponent(
            socketSession.accessToken
          )}`;
          mailboxSocket = new WebSocket(wsUrl);
          mailboxSocket.onmessage = () => {
            void syncEncryptedMailbox().catch(() => undefined);
          };
          mailboxSocket.onclose = () => {
            mailboxSocket = null;
            if (!state.session) {
              return;
            }
            mailboxReconnectTimer = globalThis.setTimeout(() => {
              mailboxReconnectTimer = 0;
              void connectMailboxSocket(true);
            }, 1500);
          };
          mailboxSocket.onerror = () => {
            try {
              mailboxSocket?.close();
            } catch {
              // Ignore close failures.
            }
          };
        } catch {
          if (!state.session) {
            return;
          }
          mailboxReconnectTimer = globalThis.setTimeout(() => {
            mailboxReconnectTimer = 0;
            void connectMailboxSocket(true);
          }, 1500);
        }
      }

      function viewerIdentityLabel() {
        if (state.me?.displayName) {
          return state.me.displayName;
        }

        if (state.me?.username) {
          return `@${state.me.username}`;
        }

        return state.me?.email || "Current member";
      }

      function pickPreferredGroupId(groups) {
        if (groups.some((group) => group.id === state.activeGroupId)) {
          return state.activeGroupId;
        }

        if (
          state.session?.bootstrapConversationId &&
          groups.some((group) => group.id === state.session.bootstrapConversationId)
        ) {
          return state.session.bootstrapConversationId;
        }

        return groups[0]?.id || null;
      }

      function inferContentClass(file) {
        if (file.type.startsWith("image/")) {
          return "image";
        }

        if (file.type.startsWith("video/")) {
          return "video";
        }

        if (file.type.startsWith("audio/")) {
          return "audio";
        }

        return "file";
      }

      function clearThreadAttachmentMedia() {
        Object.values(state.attachmentMedia).forEach((entry) => {
          if (entry?.objectUrl) {
            revokePreviewUrl(entry.objectUrl);
          }
        });
        state.attachmentMedia = {};
      }

      async function fetchThreadAttachmentArrayBuffer(attachment) {
        let downloadUrl = attachment.downloadUrl;
        let response =
          downloadUrl
            ? await fetch(downloadUrl, { referrerPolicy: "no-referrer" }).catch(() => new Response(null, { status: 599 }))
            : new Response(null, { status: 598 });

        if (!response.ok) {
          const access = await relayFetch(`/v1/attachments/${attachment.id}/access`);
          attachment.downloadUrl = access.downloadUrl;
          downloadUrl = access.downloadUrl;
          response = await fetch(downloadUrl, { referrerPolicy: "no-referrer" });
        }

        if (!response.ok) {
          throw new Error("Unable to fetch attachment bytes.");
        }

        return response.arrayBuffer();
      }

      async function readThreadAttachmentBlob(attachment) {
        const buffer = await fetchThreadAttachmentArrayBuffer(attachment);
        if (attachment.encryptionMode !== "device_encrypted") {
          return new Blob([buffer], { type: attachment.mimeType });
        }

        const plaintext = await decryptThreadAttachment(buffer, attachment);
        return new Blob([plaintext], { type: attachment.mimeType });
      }

      function attachmentMediaEntry(attachmentId) {
        return state.attachmentMedia[attachmentId] || null;
      }

      async function ensureAttachmentMedia(attachment) {
        if (!attachment?.id) {
          return null;
        }

        const existing = attachmentMediaEntry(attachment.id);
        if (existing?.status === "ready") {
          return existing;
        }

        if (existing?.status === "loading") {
          return existing;
        }

        state.attachmentMedia[attachment.id] = {
          status: "loading",
          objectUrl: "",
          error: "",
        };
        scheduleRenderSoon();

        try {
          const blob = await readThreadAttachmentBlob(attachment);
          const objectUrl = URL.createObjectURL(blob);
          if (existing?.objectUrl) {
            revokePreviewUrl(existing.objectUrl);
          }
          state.attachmentMedia[attachment.id] = {
            status: "ready",
            objectUrl,
            error: "",
          };
        } catch (error) {
          state.attachmentMedia[attachment.id] = {
            status: "error",
            objectUrl: "",
            error: error instanceof Error ? error.message : "Unable to open the attachment.",
          };
        }

        render();
        return state.attachmentMedia[attachment.id];
      }

      function findThreadAttachment(attachmentId) {
        return (
          state.threadMessages.find((message) => message.attachment?.id === attachmentId)?.attachment || null
        );
      }

      function resetThreadState() {
        state.activeGroupId = null;
        state.threadMessages = [];
        state.revealedMessages = {};
        clearThreadAttachmentMedia();
        state.threadStatus = null;
        state.isLoadingThread = false;
        state.threadComposer.text = "";
        clearComposerFile();
      }

      function ensureInviteDraft(groupId) {
        if (!state.groupInviteDrafts[groupId]) {
          state.groupInviteDrafts[groupId] = {
            note: "",
            expiresInHours: "72",
            maxUses: "12",
          };
        }

        return state.groupInviteDrafts[groupId];
      }

      async function refreshRelaySession() {
        if (!state.session?.refreshToken) {
          clearStoredSession();
          await persistSecureStateNow();
          return null;
        }

        const response = await fetch(`${state.relayUrl}/v1/auth/refresh`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({
            refreshToken: state.session.refreshToken,
          }),
        });

        const body = (await response.json().catch(() => ({}))) || {};
        if (!response.ok || !body.accessToken) {
          clearStoredSession();
          await persistSecureStateNow();
          return null;
        }

        state.session = {
          ...state.session,
          accessToken: body.accessToken,
          sessionId: body.sessionId,
          deviceId: body.deviceId,
        };
        await persistSecureStateNow();
        return state.session;
      }

      async function relayFetch(path, options = {}, config = {}) {
        const { auth = true, retryAfterRefresh = true } = config;
        const headers = new Headers(options.headers || {});
        const hasBody = options.body !== undefined && options.body !== null;

        if (auth && state.session?.accessToken) {
          headers.set("authorization", `Bearer ${state.session.accessToken}`);
        }

        if (hasBody && !headers.has("content-type")) {
          headers.set("content-type", "application/json");
        }

        const response = await fetch(`${state.relayUrl}${path}`, {
          ...options,
          headers,
        });

        const body = (await response.json().catch(() => ({}))) || {};
        if (response.ok) {
          return body;
        }

        if (auth && response.status === 401 && retryAfterRefresh) {
          const refreshed = await refreshRelaySession();
          if (refreshed) {
            return relayFetch(path, options, { auth, retryAfterRefresh: false });
          }
        }

        const error = new Error(body.error || "Relay request failed");
        error.code = body.code;
        throw error;
      }

      async function loadWorkspace() {
        if (!state.session) {
          state.isLoadingWorkspace = false;
          stopMailboxSocket();
          render();
          return;
        }

        state.isLoadingWorkspace = true;
        state.workspaceStatus = null;
        render();

        try {
          await ensureDesktopDeviceBundle();
          const [me, privacy, sessions, groups] = await Promise.all([
            relayFetch("/v1/me"),
            relayFetch("/v1/me/privacy"),
            relayFetch("/v1/sessions"),
            relayFetch("/v1/groups"),
          ]);

          state.me = me;
          state.privacy = privacy;
          state.sessions = sessions;
          state.groups = groups;
          state.profileForm.displayName = me.displayName || "";
          state.profileForm.bio = me.bio || "";
          state.privacyForm = {
            notificationPreviewMode: privacy.notificationPreviewMode || "discreet",
            autoDownloadSensitiveMedia: Boolean(privacy.autoDownloadSensitiveMedia),
            allowSensitiveExport: Boolean(privacy.allowSensitiveExport),
            secureAppSwitcher: Boolean(privacy.secureAppSwitcher),
          };
          const contentProtectionError = await setNativeContentProtection(state.privacyForm.secureAppSwitcher);
          if (contentProtectionError) {
            state.settingsStatus = createStatus(
              "warning",
              "Desktop privacy fallback",
              `The relay says secure app-switcher previews should be ${state.privacyForm.secureAppSwitcher ? "on" : "off"}, but the native window could not apply that change on this device: ${contentProtectionError}`
            );
          }

          const inviteLoads = await Promise.allSettled(
            groups
              .filter((group) => group.canCreateInvites)
              .map(async (group) => {
                ensureInviteDraft(group.id);
                return [group.id, await relayFetch(`/v1/groups/${group.id}/invites`)];
              }),
          );

          const nextInvites = {};
          for (const result of inviteLoads) {
            if (result.status === "fulfilled") {
              nextInvites[result.value[0]] = result.value[1];
            }
          }
          state.groupInvites = nextInvites;
          state.activeGroupId = pickPreferredGroupId(groups);
          await syncEncryptedMailbox();
          await connectMailboxSocket();
          if (state.activeGroupId) {
            await loadThread(state.activeGroupId, { preserveStatus: true });
          } else {
            resetThreadState();
          }
        } catch (error) {
          if (!state.session) {
            state.authStatus = createStatus(
              "warning",
              "Session expired",
              "The desktop app signed you out because the relay session could not be refreshed."
            );
            resetWorkspaceState();
          } else {
            state.workspaceStatus = createStatus(
              "error",
              "Workspace failed to load",
              error instanceof Error ? error.message : "Unknown relay error",
              state.relayUrl,
            );
          }
        } finally {
          state.isLoadingWorkspace = false;
          render();
        }
      }

      function resetWorkspaceState() {
        stopMailboxSocket();
        deviceBundleDirectoryCache.clear();
        state.me = null;
        state.privacy = null;
        state.sessions = [];
        state.groups = [];
        state.groupInvites = {};
        state.deviceBundle = null;
        state.mailboxCursor = "";
        clearCachedThreadMessages();
        resetThreadState();
        state.chatSearch = "";
        state.chatFilter = "all";
        state.chatListOpen = true;
        state.lightboxMessageId = null;
        state.profileForm = {
          displayName: "",
          bio: "",
        };
        state.privacyForm = {
          notificationPreviewMode: "discreet",
          autoDownloadSensitiveMedia: false,
          allowSensitiveExport: false,
          secureAppSwitcher: true,
        };
      }

      async function loadThread(groupId, options = {}) {
        const { preserveStatus = false } = options;

        if (!state.session || !groupId) {
          state.threadMessages = [];
          state.activeGroupId = null;
          state.isLoadingThread = false;
          render();
          return;
        }

        state.activeGroupId = groupId;
        state.isLoadingThread = true;
        state.threadMessages = [];
        state.revealedMessages = {};
        clearThreadAttachmentMedia();
        if (!preserveStatus) {
          state.threadStatus = null;
        }
        render();

        try {
          const group = state.groups.find((entry) => entry.id === groupId) || null;
          if (group?.historyMode === "device_encrypted") {
            state.threadMessages = readCachedThreadMessages(groupId);
            render();
            await syncEncryptedMailbox();
            state.threadMessages = readCachedThreadMessages(groupId);
          } else {
            state.threadMessages = await relayFetch(`/v1/groups/${groupId}/messages?limit=80`);
          }
          state.revealedMessages = {};
          clearThreadAttachmentMedia();
        } catch (error) {
          state.threadStatus = createStatus(
            "error",
            "Unable to load the group thread",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          state.isLoadingThread = false;
          render();
        }
      }

      async function sendThreadMessage() {
        if (!state.session || !state.activeGroupId) {
          return;
        }

        const group = currentGroup();
        if (!group) {
          state.threadStatus = createStatus(
            "warning",
            "Pick a group first",
            "This desktop install needs an active group before it can send media."
          );
          render();
          return;
        }

        const text = state.threadComposer.text.trim();
        const file = state.threadComposer.file;
        if (!text && !file) {
          state.threadStatus = createStatus(
            "warning",
            "Add a photo or caption first",
            "Choose a file, write a caption, or do both before sending."
          );
          render();
          return;
        }

        if (file && file.size > 20 * 1024 * 1024) {
          state.threadStatus = createStatus(
            "error",
            "File is too large",
            "The current desktop MVP accepts uploads up to 20 MB per file."
          );
          render();
          return;
        }

        setBusy("send-message");

        try {
          let message;

          if (group.historyMode === "device_encrypted") {
            const localBundle = await ensureDesktopDeviceBundle();
            const conversation = await relayFetch(`/v1/conversations/${group.id}`);
            const bundleLists = await Promise.all(
              Array.from(new Set(conversation.memberAccountIds)).map(async (accountId) => ({
                accountId,
                bundles: await listDeviceBundlesForAccount(accountId),
              }))
            );
            const recipientDevices = bundleLists
              .flatMap((entry) => entry.bundles)
              .filter((bundle) => bundle.deviceId !== state.session.deviceId);

            if (recipientDevices.length === 0) {
              throw new Error("No member devices are registered for this encrypted group yet.");
            }

            let attachment = null;
            const attachmentIds = [];

            if (file) {
              const contentClass = inferContentClass(file);
              const encrypted = await encryptThreadAttachment(file);
              const protectionProfile =
                contentClass === "image" || contentClass === "video"
                  ? group.sensitiveMediaDefault
                    ? "sensitive_media"
                    : "standard"
                  : "standard";

              const ticket = await relayFetch("/v1/attachments/ticket", {
                method: "POST",
                body: JSON.stringify({
                  fileName: file.name,
                  mimeType: "application/octet-stream",
                  encryptionMode: "device_encrypted",
                  ciphertextByteLength: encrypted.ciphertext.byteLength,
                  ciphertextSha256B64: encrypted.ciphertextSha256B64,
                  plaintextByteLength: encrypted.plaintext.byteLength,
                  plaintextSha256B64: encrypted.plaintextSha256B64,
                  conversationId: group.id,
                  conversationEpoch: group.epoch,
                  contentClass,
                  retentionMode: "private_vault",
                  protectionProfile,
                }),
              });

              const uploadResponse = await fetch(ticket.uploadUrl, {
                method: "PUT",
                headers: {
                  "content-type": "application/octet-stream",
                },
                body: encrypted.ciphertext,
              });

              if (!uploadResponse.ok) {
                throw new Error((await uploadResponse.text()) || "Attachment upload failed");
              }

              attachment = {
                id: ticket.attachmentId,
                downloadUrl: "",
                fileName: file.name,
                mimeType: file.type || "application/octet-stream",
                byteLength: file.size,
                contentClass,
                retentionMode: ticket.retentionMode,
                protectionProfile: ticket.protectionProfile,
                previewBlurHash: ticket.previewBlurHash || null,
                encryptionMode: ticket.encryptionMode,
                fileKeyB64: encrypted.fileKeyB64,
                fileIvB64: encrypted.fileIvB64,
              };
              attachmentIds.push(ticket.attachmentId);
            }

            const createdAt = new Date().toISOString();
            const clientMessageId = crypto.randomUUID();
            const payload = {
              version: 1,
              kind: "ember_conversation_v1",
              conversationId: group.id,
              conversationKind: "group",
              historyMode: "device_encrypted",
              senderDisplayName: viewerIdentityLabel(),
              text: text || undefined,
              attachment: attachment
                ? {
                    id: attachment.id,
                    fileName: attachment.fileName,
                    mimeType: attachment.mimeType,
                    byteLength: attachment.byteLength,
                    contentClass: attachment.contentClass,
                    retentionMode: attachment.retentionMode,
                    protectionProfile: attachment.protectionProfile,
                    previewBlurHash: attachment.previewBlurHash,
                    encryptionMode: attachment.encryptionMode,
                    fileKeyB64: attachment.fileKeyB64,
                    fileIvB64: attachment.fileIvB64,
                  }
                : null,
              createdAt,
              clientMessageId,
            };

            await relayFetch("/v1/messages/batch", {
              method: "POST",
              body: JSON.stringify({
                conversationId: group.id,
                epoch: group.epoch,
                envelopes: recipientDevices.map((bundle) => ({
                  recipientDeviceId: bundle.deviceId,
                  ciphertext: encryptConversationPayload(
                    payload,
                    bundle.bundle.identityKeyB64,
                    localBundle.privateKeyB64
                  ),
                  clientMessageId,
                  attachmentIds,
                })),
              }),
            });

            message = {
              id: clientMessageId,
              conversationId: group.id,
              historyMode: "device_encrypted",
              senderAccountId: state.session.accountId,
              senderDisplayName: viewerIdentityLabel(),
              kind: attachment ? "media" : "text",
              text: text || undefined,
              attachment,
              createdAt,
            };
            const mergedMessages = state.threadMessages
              .filter((entry) => entry.id !== message.id)
              .concat(message)
              .sort((left, right) => new Date(left.createdAt).getTime() - new Date(right.createdAt).getTime());
            state.threadMessages = mergedMessages;
            writeCachedThreadMessages(group.id, mergedMessages);
          } else {
            let attachmentId;

            if (file) {
              const contentClass = inferContentClass(file);
              const encrypted = await encryptThreadAttachment(file);
              const protectionProfile =
                contentClass === "image" || contentClass === "video"
                  ? group.sensitiveMediaDefault
                    ? "sensitive_media"
                    : "standard"
                  : "standard";

              const ticket = await relayFetch("/v1/attachments/ticket", {
                method: "POST",
                body: JSON.stringify({
                  fileName: file.name,
                  mimeType: file.type || "application/octet-stream",
                  encryptionMode: "device_encrypted",
                  ciphertextByteLength: encrypted.ciphertext.byteLength,
                  ciphertextSha256B64: encrypted.ciphertextSha256B64,
                  plaintextByteLength: encrypted.plaintext.byteLength,
                  plaintextSha256B64: encrypted.plaintextSha256B64,
                  fileKeyB64: encrypted.fileKeyB64,
                  fileIvB64: encrypted.fileIvB64,
                  conversationId: group.id,
                  conversationEpoch: group.epoch,
                  contentClass,
                  retentionMode: "private_vault",
                  protectionProfile,
                }),
              });

              const uploadResponse = await fetch(ticket.uploadUrl, {
                method: "PUT",
                headers: {
                  "content-type": "application/octet-stream",
                },
                body: encrypted.ciphertext,
              });

              if (!uploadResponse.ok) {
                throw new Error((await uploadResponse.text()) || "Attachment upload failed");
              }

              attachmentId = ticket.attachmentId;
            }

            message = await relayFetch(`/v1/groups/${group.id}/messages`, {
              method: "POST",
              body: JSON.stringify({
                text: text || undefined,
                attachmentId,
                clientMessageId: crypto.randomUUID(),
              }),
            });
            state.threadMessages = [...state.threadMessages, message];
          }

          state.threadStatus = createStatus(
            "success",
            file ? "Attachment sent" : "Message sent",
            file
              ? group.historyMode === "device_encrypted"
                ? `Delivered into ${group.title}. Text and attachment metadata stayed on-device and moved by encrypted mailbox fanout.`
                : `Delivered into ${group.title}. The attachment bytes were encrypted on this desktop before upload.`
              : `Delivered into ${group.title}.`
          );
          state.threadComposer.text = "";
          clearComposerFile();
        } catch (error) {
          state.threadStatus = createStatus(
            "error",
            "Unable to send to the group",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          clearBusy();
          render();
        }
      }

      async function openAuthenticatedSession(session) {
        state.session = session;
        clearPendingChallenge();
        clearDeviceLinkState();
        await persistSecureStateNow();
        state.authStatus = null;
        resetWorkspaceState();
        state.activeView = "thread";
        state.chatListOpen = true;
        state.activeGroupId = session.bootstrapConversationId || null;
        render();
        await loadWorkspace();
      }

      async function startDeviceLinkQr() {
        const deviceLabel = state.authForm.deviceLabel.trim();
        const signedIn = Boolean(state.session);

        if (!signedIn && deviceLabel.length < 3) {
          state.deviceLink.message = createStatus(
            "error",
            "Name this device first",
            "Use at least 3 characters so the signed-in device can recognize the approval target."
          );
          render();
          return;
        }

        setBusy("device-link-start");

        try {
          state.deviceLink.message = null;
          state.deviceLink.completedSessionId = "";

          if (signedIn) {
            const response = await relayFetch("/v1/devices/link/start", {
              method: "POST",
              body: JSON.stringify({}),
            });
            const parsed = parseDeviceLinkQrPayload(response.qrPayload);
            state.deviceLink.activeLink = {
              linkToken: parsed.linkToken,
              qrMode: parsed.qrMode,
            };
            state.deviceLink.qrPayload = response.qrPayload;
            state.deviceLink.status = response;
          } else {
            const linkToken = createDeviceLinkToken();
            state.deviceLink.activeLink = {
              linkToken,
              qrMode: "target_display",
            };
            state.deviceLink.qrPayload = encodeDeviceLinkQrPayload({
              relayOrigin: currentRelayOrigin(),
              qrMode: "target_display",
              linkToken,
              requesterLabel: deviceLabel,
            });
            state.deviceLink.status = {
              relayOrigin: currentRelayOrigin(),
              qrMode: "target_display",
              state: "waiting_for_source",
              requesterLabel: deviceLabel,
              expiresAt: new Date(Date.now() + 10 * 60 * 1000).toISOString(),
              canComplete: false,
            };
            await persistSecureStateNow();
          }
        } catch (error) {
          state.deviceLink.message = createStatus(
            "error",
            "Unable to prepare device link",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          clearBusy();
          render();
          ensureDeviceLinkPolling();
        }
      }

      function openDeviceLinkScanner() {
        const signedIn = Boolean(state.session);
        const deviceLabel = state.authForm.deviceLabel.trim();

        if (!signedIn && deviceLabel.length < 3) {
          state.deviceLink.message = createStatus(
            "error",
            "Name this device first",
            "Use at least 3 characters so the signed-in device can recognize the approval target."
          );
          render();
          return;
        }

        state.deviceLink.scanExpectation = signedIn ? "target_display" : "source_display";
        state.deviceLink.message = null;
        state.deviceLink.scannerOpen = true;
        render();
      }

      async function handleDeviceLinkScan(qrPayload) {
        setBusy("device-link-scan");

        try {
          const parsed = parseDeviceLinkQrPayload(qrPayload);
          if (!relayOriginsMatch(currentRelayOrigin(), parsed.relayOrigin)) {
            throw new Error("That QR belongs to a different relay environment.");
          }

          if (parsed.qrMode !== state.deviceLink.scanExpectation) {
            throw new Error("That QR is for the opposite device-link flow.");
          }

          state.deviceLink.message = null;
          state.deviceLink.completedSessionId = "";

          if (state.session) {
            const response = await relayFetch("/v1/devices/link/scan", {
              method: "POST",
              body: JSON.stringify({ qrPayload }),
            });
            state.deviceLink.activeLink = {
              linkToken: parsed.linkToken,
              qrMode: parsed.qrMode,
            };
            state.deviceLink.qrPayload = "";
            state.deviceLink.status = response;
          } else {
            const response = await relayFetch(
              "/v1/devices/link/claim",
              {
                method: "POST",
                body: JSON.stringify({
                  qrPayload,
                  deviceLabel: state.authForm.deviceLabel.trim(),
                }),
              },
              { auth: false },
            );
            state.deviceLink.activeLink = {
              linkToken: parsed.linkToken,
              qrMode: parsed.qrMode,
            };
            state.deviceLink.qrPayload = "";
            state.deviceLink.status = response;
            await persistSecureStateNow();
          }
        } catch (error) {
          state.deviceLink.message = createStatus(
            "error",
            "QR scan failed",
            error instanceof Error ? error.message : "Unknown scan error"
          );
        } finally {
          clearBusy();
          render();
          ensureDeviceLinkPolling();
        }
      }

      async function approveDeviceLink() {
        const linkId = state.deviceLink.status?.linkId;
        if (!state.session || !linkId) {
          return;
        }

        setBusy("device-link-approve");

        try {
          const response = await relayFetch("/v1/devices/link/confirm", {
            method: "POST",
            body: JSON.stringify({ linkId }),
          });
          state.deviceLink.status = response;
          state.deviceLink.message = createStatus(
            "success",
            "Device approved",
            `${response.requesterLabel} can finish sign-in now.`
          );
        } catch (error) {
          state.deviceLink.message = createStatus(
            "error",
            "Approval failed",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          clearBusy();
          render();
          ensureDeviceLinkPolling();
        }
      }

      async function completeDeviceLinkOnDesktop() {
        if (!state.deviceLink.activeLink) {
          return;
        }

        const session = await relayFetch(
          "/v1/devices/link/complete",
          {
            method: "POST",
            body: JSON.stringify({
              linkToken: state.deviceLink.activeLink.linkToken,
              qrMode: state.deviceLink.activeLink.qrMode,
            }),
          },
          { auth: false },
        );
        state.deviceLink.completedSessionId = session.sessionId;
        await openAuthenticatedSession(session);
      }

      function ensureDeviceLinkPolling() {
        if (!state.deviceLink.activeLink || state.deviceLink.completedSessionId) {
          return;
        }

        if (deviceLinkPollTimer) {
          globalThis.clearTimeout(deviceLinkPollTimer);
          deviceLinkPollTimer = 0;
        }

        const poll = async () => {
          if (!state.deviceLink.activeLink || state.deviceLink.completedSessionId) {
            return;
          }

          try {
            const status = await relayFetch(
              `/v1/devices/link/status?token=${encodeURIComponent(state.deviceLink.activeLink.linkToken)}&qrMode=${encodeURIComponent(state.deviceLink.activeLink.qrMode)}`,
              undefined,
              { auth: false },
            );
            state.deviceLink.status = status;

            if (!state.session && status.state === "approved") {
              await completeDeviceLinkOnDesktop();
              return;
            }

            render();

            if (status.state === "consumed" || status.state === "expired") {
              return;
            }
          } catch (error) {
            state.deviceLink.message = createStatus(
              "error",
              "Device-link status failed",
              error instanceof Error ? error.message : "Unknown relay error"
            );
            render();
          }

          deviceLinkPollTimer = globalThis.setTimeout(() => {
            deviceLinkPollTimer = 0;
            void poll();
          }, 2000);
        };

        void poll();
      }

      async function startMagicLink() {
        const email = state.authForm.email.trim();
        const groupInviteReference = state.authForm.groupInviteReference.trim();
        const deviceLabel = state.authForm.deviceLabel.trim();
        const parsedGroupInvite = groupInviteReference ? parseInviteReference(groupInviteReference) : null;
        const localRelay = isLocalRelayUrl();
        const inviteToken =
          parsedGroupInvite
            ? ""
            : state.authForm.inviteToken.trim() || (localRelay ? LOCAL_RELAY_TEST_INVITE_TOKEN : "");

        if (localRelay && !parsedGroupInvite && !state.authForm.inviteToken.trim()) {
          state.authForm.inviteToken = inviteToken;
          await persistSecureStateNow();
        }

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          state.authStatus = createStatus(
            "error",
            "Enter a valid email address",
            "The desktop app needs a real inbox to send the magic link."
          );
          render();
          return;
        }

        if (!deviceLabel || deviceLabel.length < 3) {
          state.authStatus = createStatus(
            "error",
            "Name this device first",
            "Use at least 3 characters so session review stays readable."
          );
          render();
          return;
        }

        if (groupInviteReference && !parsedGroupInvite) {
          state.authStatus = createStatus(
            "error",
            "Paste a valid group invite URL",
            "Use the full invite URL so this install can land in the right group after sign-in."
          );
          render();
          return;
        }

        if (!state.authForm.ageConfirmed18) {
          state.authStatus = createStatus(
            "error",
            "Confirm adults-only access first",
            "EmberChamber beta access is limited to adults 18 and over."
          );
          render();
          return;
        }

        setBusy("start-auth");

        try {
          const challenge = await relayFetch(
            "/v1/auth/start",
            {
              method: "POST",
              body: JSON.stringify({
                email,
                inviteToken: parsedGroupInvite ? undefined : inviteToken || undefined,
                groupId: parsedGroupInvite?.groupId,
                groupInviteToken: parsedGroupInvite?.inviteToken,
                deviceLabel,
                ageConfirmed18: true,
              }),
            },
            { auth: false },
          );

          state.pendingChallenge = challenge;
          state.authForm.email = email;
          state.authForm.inviteToken = inviteToken;
          state.authForm.groupInviteReference = groupInviteReference;
          state.authForm.deviceLabel = deviceLabel;
          await persistSecureStateNow();

          if (challenge.debugCompletionToken) {
            state.authForm.completionInput = challenge.debugCompletionToken;
          }

          state.authStatus = createStatus(
            localRelay && challenge.debugCompletionToken
              ? "success"
              : challenge.inviteRequired
                ? "warning"
                : "success",
            localRelay && challenge.debugCompletionToken
              ? "Local completion token ready"
              : challenge.inviteRequired
                ? "Inbox link sent for bootstrap"
                : "Magic link sent",
            parsedGroupInvite
              ? `Open the email, finish sign-in, and this install will land inside the invited group before ${formatDateTime(challenge.expiresAt)}.`
              : localRelay && challenge.debugCompletionToken
                ? `Local relay mode is active. The completion token was pasted into the field below, so you can finish sign-in before ${formatDateTime(challenge.expiresAt)} without leaving the app.`
              : `Open the email, then paste the magic link or completion token here before ${formatDateTime(challenge.expiresAt)}.`,
            challenge.debugCompletionToken || undefined,
          );
        } catch (error) {
          state.authStatus = createStatus(
            "error",
            "Unable to start sign-in",
            error instanceof Error ? error.message : "Unknown relay error",
            state.relayUrl,
          );
        } finally {
          clearBusy();
        }
      }

      async function completeMagicLink() {
        const completionToken = parseCompletionToken(state.authForm.completionInput);
        const deviceLabel = state.authForm.deviceLabel.trim();

        if (!completionToken) {
          state.authStatus = createStatus(

          return;

        setBusy("complete-auth");

            {

                completionToken,
                deviceLabel: deviceLabel || undefined,

      async function createInvite(groupId) {

        const action = `create-invite:${groupId}`;
        setBusy(action);

        try {
          const invite = await relayFetch(`/v1/groups/${groupId}/invites`, {
            method: "POST",
            body: JSON.stringify({
              note: draft.note.trim() || undefined,
              expiresInHours: draft.expiresInHours ? Number(draft.expiresInHours) : undefined,
              maxUses: draft.maxUses ? Number(draft.maxUses) : undefined,
            }),
          });

          rememberInvite(groupId, {
            id: invite.id,
            inviteUrl: invite.inviteUrl,
            inviteToken: invite.inviteToken,
            createdAt: invite.createdAt,
          });
          draft.note = "";
          state.groupsStatus = createStatus(
            "success",

      async function revokeSession(sessionId) {
        if (!state.session) {
          return;
        }

        const action = `revoke-session:${sessionId}`;
        setBusy(action);

        try {
          await relayFetch(`/v1/sessions/${sessionId}`, {
            method: "DELETE",
          });

          state.sessionsStatus = createStatus(
            "success",
            "Session revoked",
            "That device session can no longer refresh access tokens."
          );
          await loadWorkspace();
        } catch (error) {
          state.sessionsStatus = createStatus(
            "error",
            "Unable to revoke session",
            error instanceof Error ? error.message : "Unknown relay error"
          );
          render();
        } finally {
          clearBusy();
        }
      }

      async function checkRelayHealth() {
        setBusy("check-relay");

        try {
          const response = await fetch(`${state.relayUrl}/health`);
          const body = await response.json();
          state.settingsStatus = createStatus(
            "success",
            "Relay reachable",
            `Relay responded at ${formatDateTime(body.timestamp)}.`,
            state.relayUrl,
          );
        } catch (error) {
          state.settingsStatus = createStatus(
            "error",
            "Relay health check failed",
            error instanceof Error ? error.message : "Unknown network error",
            state.relayUrl,
          );
        } finally {
          clearBusy();
        }
      }

      function saveRelayUrl() {
        state.relayUrl = writeStoredRelayOverride(state.relayUrl);
        state.settingsStatus =
          state.relayUrl === DEFAULT_RELAY_URL
            ? createStatus(
                "success",
                "Using default relay",
                "The saved relay override is cleared. New requests will use the hosted relay until you deliberately switch again or restart into the Ubuntu local lane.",
                state.relayUrl,
              )
            : createStatus(
                "success",
                "Relay URL saved",
                "New requests will use the updated relay endpoint until this install is reset or you switch back to the default relay.",
                state.relayUrl,
              );
        render();
      }

      function useDefaultRelay() {
        clearStoredRelayOverride();
        state.relayUrl = DEFAULT_RELAY_URL;
        state.settingsStatus = createStatus(
          "success",
          "Using default relay",
          "This desktop cleared the saved override and is back on the hosted relay. Restart or sign out again when you want Ubuntu local auto-adoption to run.",
          state.relayUrl,
        );
        render();
      }

      function useLocalRelayOverride() {
        state.relayUrl = writeStoredRelayOverride(LOCAL_RELAY_URL);
        state.settingsStatus = createStatus(
          "success",
          "Using local relay",
          "This desktop saved an explicit localhost override for the Ubuntu test lane. Clear it when you want the hosted relay again.",
          state.relayUrl,
        );
        render();
      }

      async function signOut() {
        setBusy("sign-out");

        let revokeError = null;
        const currentSessionId = state.session?.sessionId;

        if (currentSessionId) {
          try {
            await relayFetch(`/v1/sessions/${currentSessionId}`, {
              method: "DELETE",
            });
          } catch (error) {
            revokeError = error instanceof Error ? error.message : "Unknown relay error";
          }
        }

        clearStoredSession();
        clearPendingChallenge();
        clearDeviceLinkState();
        clearStoredRelayOverride();
        state.relayUrl = DEFAULT_RELAY_URL;
        state.authForm.mode = "magic-link";
        state.authForm.inviteTokenVisible = false;
        await clearPersistedSecureState();
        state.activeView = "thread";
        state.workspaceStatus = null;
        resetWorkspaceState();
        const adoptedLocalRelay = await maybeAdoptLocalRelay();
        state.authStatus = revokeError
          ? createStatus(
              "warning",
              "Signed out locally",
              `This install cleared the local session and reset the saved relay override, but the relay did not confirm server-side revocation for the current device: ${revokeError}`
            )
          : createStatus(
              "info",
              "Signed out",
              adoptedLocalRelay
                ? "The desktop app revoked the current relay session, cleared local desktop state for this device, and re-adopted the local Ubuntu relay because it is still running."
                : "The desktop app revoked the current relay session, cleared local desktop state for this device, and returned to the default hosted relay."
            );
        clearBusy();
        render();
      }

      function handleInput(event) {
        const target = event.target;
        if (!(target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement)) {
          return;
        }

        const bind = target.dataset.bind;
        if (!bind) {
          return;
        }

        const value = target.type === "checkbox" ? target.checked : target.value;

        if (bind === "relayUrl") {
          state.relayUrl = value;
          return;
        }

        if (bind === "auth.email") {
          state.authForm.email = value;
          scheduleSecureStatePersist();
          return;
        }

        if (bind === "auth.inviteToken") {
          state.authForm.inviteToken = value;
          scheduleSecureStatePersist();
          return;
        }

        if (bind === "auth.groupInviteReference") {
          state.authForm.groupInviteReference = value;
          scheduleSecureStatePersist();
          return;
        }

        if (bind === "auth.deviceLabel") {
          state.authForm.deviceLabel = value;
          scheduleSecureStatePersist();
          return;
        }

        if (bind === "auth.ageConfirmed18") {
          state.authForm.ageConfirmed18 = Boolean(value);
          return;
        }

        if (bind === "auth.completionInput") {
          state.authForm.completionInput = value;
          return;
        }

        if (bind === "createGroup.title") {
          state.createGroupForm.title = value;
          return;
        }

        if (bind === "createGroup.joinRuleText") {
          state.createGroupForm.joinRuleText = value;
          return;
        }

        if (bind === "createGroup.memberCap") {
          state.createGroupForm.memberCap = value;
          return;
        }

        if (bind === "createGroup.sensitiveMediaDefault") {
          state.createGroupForm.sensitiveMediaDefault = Boolean(value);
          return;
        }

        if (bind === "inviteTools.input") {
          state.inviteTools.input = value;
          return;
        }

        if (bind === "chatSearch") {
          const selStart = target.selectionStart;
          const selEnd = target.selectionEnd;
          state.chatSearch = value;
          render();
          const restoredInput = root.querySelector("[data-bind='chatSearch']");
          if (restoredInput) {
            restoredInput.focus();
            restoredInput.setSelectionRange(selStart, selEnd);
          }
          return;
        }

        if (bind === "thread.text") {
          state.threadComposer.text = value;
          return;
        }

        if (bind === "thread.file" && target instanceof HTMLInputElement) {
          setComposerFile(target.files?.[0] || null);
          render();
          return;
        }

        if (bind === "profile.displayName") {
          state.profileForm.displayName = value;
          return;
        }

        if (bind === "profile.bio") {
          state.profileForm.bio = value;
          return;
        }

        if (bind === "privacy.notificationPreviewMode") {
          state.privacyForm.notificationPreviewMode = value;
          return;
        }

        if (bind === "privacy.autoDownloadSensitiveMedia") {
          state.privacyForm.autoDownloadSensitiveMedia = Boolean(value);
          return;
        }

        if (bind === "privacy.allowSensitiveExport") {
          state.privacyForm.allowSensitiveExport = Boolean(value);
          return;
        }

        if (bind === "privacy.secureAppSwitcher") {
          state.privacyForm.secureAppSwitcher = Boolean(value);
          return;
        }

        if (bind.startsWith("groupInvite.")) {
          const [, groupId, field] = bind.split(".");
          const draft = ensureInviteDraft(groupId);
          draft[field] = value;
        }
      }

      async function handleClick(event) {
        const button = event.target.closest("[data-action], [data-nav]");
        if (!button) {
          return;
        }

        const nav = button.dataset.nav;
        if (nav) {
          state.activeView = nav;
          if (nav === "thread") state.chatListOpen = true;
          render();
          return;
        }

        const action = button.dataset.action;
        if (!action) {
          return;
        }

        if (action === "sign-out") {
          await signOut();
          return;
        }

        if (action === "set-auth-mode") {
          state.authForm.mode = button.dataset.authMode === "device-link" ? "device-link" : "magic-link";
          clearDeviceLinkState();
          render();
          return;
        }

        if (action === "toggle-invite-token") {
          state.authForm.inviteTokenVisible = !state.authForm.inviteTokenVisible;
          if (!state.authForm.inviteTokenVisible) {
            state.authForm.inviteToken = "";
          }
          render();
          return;
        }

        if (action === "start-device-link") {
          await startDeviceLinkQr();
          return;
        }

        if (action === "open-device-link-scanner") {
          openDeviceLinkScanner();
          return;
        }

        if (action === "close-device-link-scanner") {
          state.deviceLink.scannerOpen = false;
          render();
          return;
        }

        if (action === "clear-device-link") {
          clearDeviceLinkState();
          render();
          return;
        }

        if (action === "approve-device-link") {
          await approveDeviceLink();
          return;
        }

        if (action === "refresh-workspace") {
          await loadWorkspace();
          return;
        }

        if (action === "check-relay") {
          await checkRelayHealth();
          return;
        }

        if (action === "use-default-relay") {
          useDefaultRelay();
          return;
        }

        if (action === "use-local-relay") {
          useLocalRelayOverride();
          return;
        }

        if (action === "copy-invite") {
          const groupId = button.dataset.groupId;
          const inviteId = button.dataset.inviteId;
          const cached = cachedInvite(groupId, inviteId);
          if (!cached?.inviteUrl) {
            state.groupsStatus = createStatus(
              "warning",
              "Raw invite URL unavailable",
              "This device only retains raw invite URLs for invites it minted locally. Create a fresh invite if you need a copyable link."
            );
            render();
            return;
          }

          try {
            await navigator.clipboard.writeText(cached.inviteUrl);
            state.groupsStatus = createStatus(
              "success",
              "Invite URL copied",
              "The latest invite URL is now in your clipboard."
            );
          } catch {
            state.groupsStatus = createStatus(
              "warning",
              "Clipboard unavailable",
              "Copy the invite URL from the code block manually on this device.",
              cached.inviteUrl,
            );
          }
          render();
          return;
        }

        if (action === "revoke-session") {
          const sessionId = button.dataset.sessionId;
          if (sessionId) {
            await revokeSession(sessionId);
          }
          return;
        }

        if (action === "create-invite") {
          const groupId = button.dataset.groupId;
          if (groupId) {
            await createInvite(groupId);
          }
          return;
        }

        if (action === "open-chat-list") {
          state.chatListOpen = true;
          render();
          return;
        }

        if (action === "set-chat-filter") {
          const filter = button.dataset.filter;
          if (filter === "all" || filter === "sensitive" || filter === "encrypted") {
            state.chatFilter = filter;
            render();
          }
          return;
        }

        if (action === "view-image") {
          const messageId = button.dataset.messageId;
          if (messageId) {
            state.lightboxMessageId = messageId;
            render();
          }
          return;
        }

        if (action === "close-lightbox") {
          state.lightboxMessageId = null;
          render();
          return;
        }

        if (action === "toggle-privacy-pref") {
          const pref = button.dataset.pref;
          if (pref === "autoDownloadSensitiveMedia" || pref === "allowSensitiveExport" || pref === "secureAppSwitcher") {
            state.privacyForm[pref] = !state.privacyForm[pref];
            await savePrivacy();
          }
          return;
        }

        if (action === "set-notification-preview") {
          const mode = button.dataset.mode;
          if (mode === "discreet" || mode === "expanded" || mode === "none") {
            state.privacyForm.notificationPreviewMode = mode;
            await savePrivacy();
          }
          return;
        }

        if (action === "open-group") {
          const groupId = button.dataset.groupId;
          if (groupId) {
            state.activeView = "thread";
            state.chatListOpen = false;
            await loadThread(groupId);
          }
          return;
        }

        if (action === "clear-composer-file") {
          clearComposerFile();
          render();
          return;
        }

        if (action === "reveal-message") {
          const messageId = button.dataset.messageId;
          if (messageId) {
            state.revealedMessages[messageId] = true;
            render();
          }
          return;
        }

        if (action === "open-attachment") {
          const attachmentId = button.dataset.attachmentId;
          if (!attachmentId) {
            return;
          }

          const attachment = findThreadAttachment(attachmentId);
          if (!attachment) {
            state.threadStatus = createStatus(
              "warning",
              "Attachment unavailable",
              "The selected attachment is no longer present in the current thread."
            );
            render();
            return;
          }

          try {
            const blob = await readThreadAttachmentBlob(attachment);
            const objectUrl = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = objectUrl;
            anchor.download = attachment.fileName;
            anchor.click();
            globalThis.setTimeout(() => revokePreviewUrl(objectUrl), 1500);
          } catch (error) {
            state.threadStatus = createStatus(
              "error",
              "Unable to open the attachment",
              error instanceof Error ? error.message : "Unknown attachment error"
            );
            render();
          }
          return;
        }

        if (action === "retry-attachment") {
          const attachmentId = button.dataset.attachmentId;
          if (attachmentId) {
            const existing = state.attachmentMedia[attachmentId];
            if (existing?.objectUrl) {
              revokePreviewUrl(existing.objectUrl);
            }
            delete state.attachmentMedia[attachmentId];
            render();
          }
          return;
        }

        if (action === "accept-preview-invite") {
          await acceptInvite();
          return;
        }
      }

      async function handleSubmit(event) {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {

        const name = form.dataset.form;
        if (!name) {

        event.preventDefault();

          await startMagicLink();

        if (name === "complete-auth") {

        if (name === "preview-invite") {

        if (name === "save-profile") {

      }

      function renderOverviewView() {
        const currentSessionCount = state.sessions.length;
        const groupCount = state.groups.length;
        const privacyLabel =

          <section class="panel panel-strong">
