      function formatByteSize(value) {
        if (!Number.isFinite(value) || value <= 0) {
          return "Unknown size";
        }

        const units = ["B", "KB", "MB", "GB"];
        let size = value;
        let unitIndex = 0;
        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }

        const precision = size >= 10 || unitIndex === 0 ? 0 : 1;
        return `${size.toFixed(precision)} ${units[unitIndex]}`;
      }

      function secureStorageModeLabel() {
        if (state.secureStorageMode === "keyring") {
          return "System keyring";
        }

        if (state.secureStorageMode === "file") {
          return "Restricted local file fallback";
        }

        if (state.secureStorageMode === "browser") {
          return "Browser fallback";
        }

        if (state.secureStorageMode === "memory") {
          return "Volatile memory only";
        }

        return "Loading desktop state";
      }

      function renderAttachmentBlock(message) {
        const attachment = message.attachment;
        if (!attachment) {
          return "";
        }

        const isSensitive = attachment.protectionProfile === "sensitive_media";
        const isRevealed = !isSensitive || Boolean(state.revealedMessages[message.id]);
        const shouldFetchSensitiveMedia = !isSensitive || Boolean(state.privacy?.autoDownloadSensitiveMedia) || isRevealed;
        const watermark = `${viewerIdentityLabel()} · ${formatDateTime(message.createdAt)}`;
        const encryptedAttachment = attachment.encryptionMode === "device_encrypted";
        const inlineMedia = attachment.contentClass === "image" || attachment.contentClass === "video";
        if (inlineMedia && shouldFetchSensitiveMedia) {
          void ensureAttachmentMedia(attachment);
        }
        const attachmentAsset = attachmentMediaEntry(attachment.id);
        const loadingEncryptedMedia = inlineMedia && shouldFetchSensitiveMedia && (!attachmentAsset || attachmentAsset.status === "loading");
        const encryptedMediaError = inlineMedia && attachmentAsset?.status === "error";
        const mediaUrl = attachmentAsset?.objectUrl || attachment.downloadUrl || "";

        if (encryptedMediaError) {
          return `
            <div class="rule-block">
              <p class="label">Attachment unavailable</p>
              <p class="group-copy" style="margin-top: 10px">${escapeHtml(attachmentAsset.error || "The desktop client could not decrypt this attachment.")}</p>
              <div class="inline-actions" style="margin-top: 12px">
                <button class="secondary-button" type="button" data-action="retry-attachment" data-attachment-id="${escapeHtml(attachment.id)}">Retry</button>
                <button class="ghost-button" type="button" data-action="open-attachment" data-attachment-id="${escapeHtml(attachment.id)}">Save copy</button>
              </div>
            </div>
          `;
        }

        if (attachment.contentClass === "image") {
          if (isSensitive && !shouldFetchSensitiveMedia) {
            return `
              <div class="media-shell">
                <div class="media-placeholder">
                  <div>
                    <p class="label">Sensitive image</p>
                    <p style="margin-top: 10px">${escapeHtml(attachment.fileName)}</p>
                    <p style="margin-top: 8px">${escapeHtml(formatByteSize(attachment.byteLength))}</p>
                  </div>
                  <button class="secondary-button reveal-button" type="button" data-action="reveal-message" data-message-id="${escapeHtml(message.id)}">Reveal image</button>
                </div>
                <div class="media-overlay">
                  <div class="watermark">${escapeHtml(watermark)}</div>
                </div>
              </div>
            `;
          }

          if (loadingEncryptedMedia) {
            return `
              <div class="media-shell">
                <div class="media-placeholder">
                  <div>
                    <p class="label">Decrypting image</p>
                    <p style="margin-top: 10px">${escapeHtml(attachment.fileName)}</p>
                    <p style="margin-top: 8px">${escapeHtml(formatByteSize(attachment.byteLength))}</p>
                  </div>
                </div>
                <div class="media-overlay">
                  <div class="watermark">${escapeHtml(watermark)}</div>
                </div>
              </div>
            `;
          }

          return `
            <div class="media-shell ${isRevealed ? "" : "blurred"}">
              <img
                src="${escapeHtml(mediaUrl)}"
                alt="${escapeHtml(attachment.fileName)}"
                referrerpolicy="no-referrer"
                ${isRevealed ? `data-action="view-image" data-message-id="${escapeHtml(message.id)}"` : "class=\"no-zoom\""}
              />
              <div class="media-overlay">
                <div class="watermark">${escapeHtml(watermark)}</div>
                ${
                  isRevealed
                    ? `<button class="secondary-button" type="button" data-action="view-image" data-message-id="${escapeHtml(message.id)}" style="font-size:0.82rem;padding:6px 12px">⛶ Full screen</button>`
                    : `<button class="secondary-button reveal-button" type="button" data-action="reveal-message" data-message-id="${escapeHtml(message.id)}">Reveal image</button>`
                }
              </div>
            </div>
            <p class="secondary-meta" style="margin-top: 10px">${escapeHtml(attachment.fileName)} · ${escapeHtml(formatByteSize(attachment.byteLength))}</p>
          `;
        }

        if (attachment.contentClass === "video") {
          if (loadingEncryptedMedia) {
            return `
              <div class="media-shell">
                <div class="media-placeholder">
                  <div>
                    <p class="label">Decrypting video</p>
                    <p style="margin-top: 10px">${escapeHtml(attachment.fileName)}</p>
                    <p style="margin-top: 8px">${escapeHtml(formatByteSize(attachment.byteLength))}</p>
                  </div>
                </div>
                <div class="media-overlay">
                  <div class="watermark">${escapeHtml(watermark)}</div>
                </div>
              </div>
            `;
          }

          return isRevealed
            ? `
                <div class="media-shell">
                  <video src="${escapeHtml(mediaUrl)}" controls controlsList="nodownload noplaybackrate" referrerpolicy="no-referrer"></video>
                  <div class="media-overlay">
                    <div class="watermark">${escapeHtml(watermark)}</div>
                  </div>
                </div>
                <p class="secondary-meta" style="margin-top: 10px">${escapeHtml(attachment.fileName)} · ${escapeHtml(formatByteSize(attachment.byteLength))}</p>
              `
            : `
                <div class="media-shell">
                  <div class="media-placeholder">
                    <div>
                      <p class="label">Sensitive video</p>
                      <p style="margin-top: 10px">${escapeHtml(attachment.fileName)}</p>
                      <p style="margin-top: 8px">${escapeHtml(formatByteSize(attachment.byteLength))}</p>
                    </div>
                    <button class="secondary-button reveal-button" type="button" data-action="reveal-message" data-message-id="${escapeHtml(message.id)}">Reveal video</button>
                  </div>
                  <div class="media-overlay">
                    <div class="watermark">${escapeHtml(watermark)}</div>
                  </div>
                </div>
              `;
        }

        return `
          <div class="rule-block">
            <p class="label">${escapeHtml(attachment.contentClass)}</p>
            <p class="group-copy" style="margin-top: 10px">${escapeHtml(attachment.fileName)}</p>
            <p class="secondary-meta" style="margin-top: 8px">${escapeHtml(formatByteSize(attachment.byteLength))}</p>
            <div class="inline-actions" style="margin-top: 12px">
              <button class="secondary-button" type="button" data-action="open-attachment" data-attachment-id="${escapeHtml(attachment.id)}">
                ${encryptedAttachment ? "Decrypt and save" : "Save copy"}
              </button>
            </div>
          </div>
        `;
      }

      function renderThreadMessage(message) {
        if (message.kind === "system_notice") {
          return `
            <article class="message-row system">
              <div class="message-bubble">
                <p class="label">System notice</p>
                <p class="message-copy">${escapeHtml(message.text || "")}</p>
              </div>
            </article>
          `;
        }

        const isSelf = message.senderAccountId === state.me?.id;
        const readCount = message.readByCount ?? 0;
        const receiptMark = isSelf
          ? readCount >= 1
            ? `<span class="read-receipt read" title="Read by ${readCount}">✓✓</span>`
            : `<span class="read-receipt" title="Delivered">✓</span>`
          : "";
        return `
          <article class="message-row ${isSelf ? "self" : ""}">
            <div class="message-bubble">
              <div class="message-meta">
                <strong>${escapeHtml(isSelf ? "You" : message.senderDisplayName)}</strong>
                <span>${escapeHtml(formatDateTime(message.createdAt))}</span>
                ${message.editedAt ? `<span style="opacity:0.55;font-size:0.8rem">edited</span>` : ""}
                ${receiptMark}
              </div>
              ${message.text ? `<p class="message-copy">${escapeHtml(message.text)}</p>` : ""}
              ${renderAttachmentBlock(message)}
            </div>
          </article>
        `;
      }

      function renderLightbox() {
        if (!state.lightboxMessageId) return "";
        const message = state.threadMessages.find((m) => m.id === state.lightboxMessageId);
        if (!message?.attachment) return "";
        const attachment = message.attachment;
        const encryptedAttachment = attachment.encryptionMode === "device_encrypted";
        const attachmentAsset = attachmentMediaEntry(attachment.id);
        const mediaUrl = encryptedAttachment
          ? attachmentAsset?.objectUrl || ""
          : attachment.downloadUrl || "";
        if (!mediaUrl) return "";
        return `
          <div class="lightbox-overlay" data-action="close-lightbox">
            <button class="lightbox-close" type="button" data-action="close-lightbox">✕ Close</button>
            <img src="${escapeHtml(mediaUrl)}" alt="${escapeHtml(attachment.fileName)}" referrerpolicy="no-referrer" />
          </div>
        `;
      }

      function renderChatListView() {
        const normalizedSearch = state.chatSearch.trim().toLowerCase();
        const filtered = state.groups
          .filter((group) => {
            if (state.chatFilter === "sensitive" && !group.sensitiveMediaDefault) return false;
            if (state.chatFilter === "encrypted" && group.historyMode !== "device_encrypted") return false;
            if (normalizedSearch && !group.title.toLowerCase().includes(normalizedSearch)) return false;
            return true;
          })
          .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));

        return `
          <section class="panel">
            <div class="view-header">
              <div>
                <p class="eyebrow">Chats</p>
                <h2>${state.me?.displayName ? escapeHtml(state.me.displayName) + "'s circles" : "Your circles"}</h2>
              </div>

            <div style="margin-top: 14px">
              <input class="search-input" type="text" data-bind="chatSearch" placeholder="Search conversations" value="${escapeHtml(state.chatSearch)}" />
            </div>

            <div class="filter-row">
              ${["all", "sensitive", "encrypted"].map((f) => `

              `).join("")}
            </div>

            ${filtered.length === 0 ? `
              <div class="empty">
                ${state.groups.length === 0
                  ? "No groups yet. Accept an invite or create a group to start the first circle."

                <div class="inline-actions" style="margin-top: 14px">

            ` : `
              <div class="chat-list">
                ${filtered.map((group) => {
                  const initial = group.title.trim().charAt(0).toUpperCase() || "#";
                  const preview = group.historyMode === "device_encrypted"
                    ? "New encrypted messages will appear here."
                    : group.joinRuleText
                      ? (group.joinRuleText.length > 80 ? group.joinRuleText.slice(0, 80) + "\u2026" : group.joinRuleText)
                      : "Start the conversation.";
                  return `
                    <button class="chat-row ${state.activeGroupId === group.id ? "active" : ""}" type="button" data-action="open-group" data-group-id="${escapeHtml(group.id)}">
                      <div class="chat-avatar">${escapeHtml(initial)}</div>
                      <div class="chat-row-info">
                        <div class="chat-row-top">
                          <span class="chat-row-title">${escapeHtml(group.title)}</span>
                          <span class="chat-row-time">${escapeHtml(formatChatTimestamp(group.updatedAt))}</span>
                        </div>
                        <div class="chat-row-preview">${escapeHtml(preview)}</div>
                        <div class="chat-meta-row">
                          ${group.historyMode === "device_encrypted" ? '<span class="chat-badge locked">Locked</span>' : ""}
                          ${group.sensitiveMediaDefault ? '<span class="chat-badge sensitive">Sensitive</span>' : ""}
                          <span class="chat-member-count">${escapeHtml(String(group.memberCount))}/${escapeHtml(String(group.memberCap))}</span>
                        </div>
                      </div>
                    </button>
                  `;
                }).join("")}
              </div>
            `}
          </section>
        `;
      }

          ${renderStatus(state.threadStatus)}

              <div class="view-header">
                <div>
                  <p class="eyebrow">Group</p>
                  <h2>${escapeHtml(group.title)}</h2>
                </div>
                <div class="badge-row">
                  <span class="badge">${escapeHtml(String(group.memberCount))} / ${escapeHtml(String(group.memberCap))} members</span>

                </div>
              </div>
              <p class="section-intro" style="margin-top: 12px">${escapeHtml(group.joinRuleText || "No saved join rule.")}</p>
            </section>

            <section class="thread-card">
              <div class="view-header">
                <div>
                  <p class="eyebrow">Messages</p>
                  <h2>Recent activity</h2>
                </div>
                <div class="inline-actions">
                  <button class="secondary-button" type="button" data-action="open-group" data-group-id="${escapeHtml(group.id)}" ${state.isLoadingThread ? "disabled" : ""}>
                    ${state.isLoadingThread ? "Refreshing..." : "Refresh thread"}
                  </button>
                  <button class="ghost-button" type="button" data-nav="groups">Manage group</button>
                </div>
              </div>

              <div class="thread-stream" style="margin-top: 18px">

                        <div class="status info">

                }

            <section class="thread-card">

                            </div>

                          </div>

                              : state.threadComposer.previewUrl && state.threadComposer.mimeType.startsWith("video/")
                                ? `<video src="${escapeHtml(state.threadComposer.previewUrl)}" controls controlsList="nodownload noplaybackrate"></video>`

          </section>

      function inviteStatusBadge(status) {
        if (status === "active") {
          return "good";
        }

        if (status === "frozen" || status === "expired" || status === "exhausted") {
          return "warn";
        }

        return "bad";
      }

        const cached = cachedInvite(groupId, record.id);

        return `

            <div class="split-actions">
              <div>

              <span class="badge ${inviteStatusBadge(record.status)}">${escapeHtml(record.status)}</span>

            <div class="badge-row" style="margin-top: 12px">
              <span class="badge">Uses ${escapeHtml(String(record.useCount))}${record.maxUses ? ` / ${escapeHtml(String(record.maxUses))}` : ""}</span>
              <span class="badge">${record.expiresAt ? `Expires ${escapeHtml(formatDateTime(record.expiresAt))}` : "No expiry"}</span>
              ${record.createdByCurrentAccount ? '<span class="badge">Created by this account</span>' : ""}

              cached?.inviteUrl

                    ${isBusy("check-relay") ? "Checking relay..." : "Check relay"}
                  </button>
                  <button class="danger-button" type="button" data-action="sign-out">Sign out</button>
                </div>
              </section>
            </aside>

            <main class="content">
              <div class="workspace-header">
                <div style="display: flex; align-items: center; gap: 12px">
                  ${state.activeView === "thread" && !state.chatListOpen && state.activeGroupId ? `
                    <button class="back-button" type="button" data-action="open-chat-list">← Chats</button>
                  ` : ""}
                  <div>
                    <p class="eyebrow">Workspace</p>
                    <h2 style="font-size: 1.8rem">
                      ${
                        state.activeView === "thread" && !state.chatListOpen && currentGroup()
                          ? escapeHtml(currentGroup().title)
                          : escapeHtml(navItems.find(([id]) => id === state.activeView)?.[1] || "Chats")
                      }
                    </h2>
                  </div>
                </div>
                <div class="workspace-actions">
                  <span class="badge">${escapeHtml(state.relayUrl)}</span>
                </div>
              </div>

              ${renderStatus(state.workspaceStatus)}
              <div class="section-stack">
                ${viewContent}
              </div>
            </main>
          </div>
        `;
      }

      function renderHydratingView() {
        return `
          <section class="auth-layout">
            <div class="panel panel-strong">
              <div class="stack">
                <div class="wordmark">
                  <div class="logo">EC</div>
                  <div>
                    <p class="eyebrow">Desktop startup</p>
                    <p style="font-size: 1.15rem; font-weight: 700">EmberChamber desktop</p>
                  </div>
                </div>
                <h1>Loading local desktop state.</h1>
                <p class="lede">
                  The Ubuntu shell is restoring persisted session data, invite state, and desktop defaults before it decides whether to open the workspace or the sign-in path.
                </p>
                <div class="highlight">
                  <strong>${escapeHtml(secureStorageModeLabel())}</strong>
                  ${
                    state.secureStorageDetail
                      ? `<p style="margin-top: 10px">${escapeHtml(state.secureStorageDetail)}</p>`
                      : '<p style="margin-top: 10px">Checking desktop storage and relay preferences now.</p>'
                  }
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function mountDeviceLinkQr() {
        const container = root.querySelector("[data-device-link-qr]");
        if (!(container instanceof HTMLElement)) {
          return;
        }

        container.innerHTML = "";
        if (!state.deviceLink.qrPayload || !globalThis.ZXingBrowser?.BrowserQRCodeSvgWriter) {
          return;
        }

        const writer = new globalThis.ZXingBrowser.BrowserQRCodeSvgWriter();
        writer.writeToDom(container, state.deviceLink.qrPayload, 260, 260);
      }

      async function mountDeviceLinkScanner() {
        if (!state.deviceLink.scannerOpen) {
          if (deviceLinkScannerControls?.stop) {
            try {
              deviceLinkScannerControls.stop();
            } catch {
              // Ignore scanner cleanup failures.
            }
          }
          deviceLinkScannerControls = null;
          return;
        }

        const video = root.querySelector("[data-device-link-scanner]");
        if (!(video instanceof HTMLVideoElement)) {
          return;
        }

        if (!globalThis.ZXingBrowser?.BrowserQRCodeReader) {
          state.deviceLink.scannerOpen = false;
          state.deviceLink.message = createStatus(
            "error",
            "QR scanner unavailable",
            "The desktop scanner library is not loaded."
          );
          render();
          return;
        }

        if (deviceLinkScannerControls?.stop) {
          try {
            deviceLinkScannerControls.stop();
          } catch {
            // Ignore scanner cleanup failures.
          }
        }

        try {
          const reader = new globalThis.ZXingBrowser.BrowserQRCodeReader();
          deviceLinkScannerControls = await reader.decodeFromConstraints(
            {
              audio: false,
              video: {
                facingMode: { ideal: "environment" },
              },
            },
            video,
            async (result) => {
              const text = result?.getText?.();
              if (!text) {
                return;
              }

              try {
                deviceLinkScannerControls?.stop?.();
              } catch {
                // Ignore cleanup failures.
              }
              deviceLinkScannerControls = null;
              state.deviceLink.scannerOpen = false;
              render();
              await handleDeviceLinkScan(text);
            },
          );
        } catch (error) {
          state.deviceLink.scannerOpen = false;
          state.deviceLink.message = createStatus(
            "error",
            "Camera scan unavailable",
            error instanceof Error ? error.message : "The desktop app could not open a camera for QR scanning."
          );
          render();
        }
      }

      function syncDeviceLinkUiAfterRender() {
        mountDeviceLinkQr();
        void mountDeviceLinkScanner();
      }

      function render() {
        root.innerHTML = (state.isHydrating
          ? renderHydratingView()
          : state.session
            ? renderWorkspaceView()
            : renderAuthView()) + renderLightbox();
        syncDeviceLinkUiAfterRender();
      }

      root.addEventListener("input", handleInput);
      root.addEventListener("change", handleInput);
      root.addEventListener("click", (event) => {
        void handleClick(event);
      });
      root.addEventListener("submit", (event) => {
        void handleSubmit(event);
      });

      async function initializeDesktopShell() {
        render();
        await loadPersistedSecureState();
        state.isHydrating = false;
        render();
        await maybeAdoptLocalRelay();

        if (state.session) {
          await loadWorkspace();
        }
      }

      void initializeDesktopShell();
    </script>
  </body>
</html>
