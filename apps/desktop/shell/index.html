<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EmberChamber Desktop Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #081015;
        --bg-secondary: #0d181d;
        --panel: rgba(10, 21, 27, 0.92);
        --panel-strong: #11212b;
        --line: rgba(138, 240, 214, 0.18);
        --line-strong: rgba(138, 240, 214, 0.3);
        --text: #eef6f7;
        --muted: #a5bcc0;
        --accent: #8af0d6;
        --accent-ink: #06242b;
        --warning: #ffd28b;
        --error: #fda4af;
        --success: #7ce6bf;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(138, 240, 214, 0.15), transparent 24%),
          radial-gradient(circle at bottom right, rgba(106, 167, 255, 0.16), transparent 26%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 35%),
          var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .shell {
        min-height: 100vh;
        padding: 24px;
      }

      .auth-layout,
      .workspace-layout {
        display: grid;
        gap: 24px;
      }

      .auth-layout {
        grid-template-columns: minmax(0, 1.25fr) minmax(24rem, 32rem);
      }

      .workspace-layout {
        grid-template-columns: 18rem minmax(0, 1fr);
        align-items: start;
      }

      .panel,
      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 24px;
      }

      .panel-strong {
        background: linear-gradient(180deg, rgba(138, 240, 214, 0.06), transparent 38%), var(--panel-strong);
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .grid-2,
      .grid-3 {
        display: grid;
        gap: 16px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .wordmark,
      .brand-chip {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #8af0d6, #6aa7ff);
        color: #041318;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .logo.small {
        width: 42px;
        height: 42px;
        border-radius: 14px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      h1 {
        max-width: 12ch;
        font-size: clamp(2.6rem, 5vw, 4.8rem);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      h2 {
        font-size: 1.45rem;
        line-height: 1.15;
      }

      h3 {
        font-size: 1rem;
        line-height: 1.3;
      }

      .lede {
        margin-top: 18px;
        max-width: 56ch;
        color: var(--muted);
        line-height: 1.7;
        font-size: 1.02rem;
      }

      .highlight {
        margin-top: 20px;
        border-radius: 18px;
        border: 1px solid rgba(138, 240, 214, 0.22);
        background: rgba(138, 240, 214, 0.08);
        padding: 16px 18px;
        line-height: 1.6;
      }

      .step,
      .metric,
      .mini-card {
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--bg-secondary);
        padding: 16px;
      }

      .step-number,
      .label {
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .step p,
      .metric p,
      .mini-card p,
      .subtle,
      .hint,
      .empty,
      .group-copy,
      .session-copy {
        color: var(--muted);
        line-height: 1.6;
      }

      .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 2rem;
        line-height: 1;
      }

      .sidebar {
        position: sticky;
        top: 24px;
        display: grid;
        gap: 16px;
      }

      .sidebar-nav {
        display: grid;
        gap: 8px;
      }

      .nav-button,
      .ghost-button,
      .primary-button,
      .danger-button,
      .secondary-button {
        appearance: none;
        border-radius: 16px;
        padding: 13px 15px;
        border: 1px solid transparent;
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          opacity 120ms ease;
      }

      .nav-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        background: transparent;
        border-color: transparent;
        color: var(--muted);
        text-align: left;
      }

      .nav-button.active {
        background: rgba(138, 240, 214, 0.12);
        border-color: rgba(138, 240, 214, 0.18);
        color: var(--text);
      }

      .nav-button:hover,
      .ghost-button:hover,
      .secondary-button:hover {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .ghost-button,
      .secondary-button {
        background: rgba(255, 255, 255, 0.02);
        border-color: var(--line);
        color: var(--muted);
      }

      .primary-button {
        background: var(--accent);
        border-color: transparent;
        color: var(--accent-ink);
        font-weight: 700;
      }

      .danger-button {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.28);
        color: #fecaca;
      }

      .primary-button[disabled],
      .danger-button[disabled],
      .ghost-button[disabled],
      .secondary-button[disabled] {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .field-grid,
      .field-stack {
        display: grid;
        gap: 14px;
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border-radius: 16px;
        border: 1px solid #1d3943;
        background: #091419;
        color: var(--text);
        padding: 14px 15px;
        outline: none;
      }

      textarea {
        min-height: 108px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(138, 240, 214, 0.68);
        box-shadow: 0 0 0 3px rgba(138, 240, 214, 0.12);
      }

      .checkbox-row,
      .toggle-row,
      .inline-actions,
      .group-meta,
      .badge-row,
      .session-row,
      .view-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .toggle-row,
      .session-row,
      .view-header {
        justify-content: space-between;
      }

      .checkbox-row {
        align-items: flex-start;
      }

      .checkbox-row input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        padding: 0;
      }

      .status {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--bg-secondary);
        padding: 14px 16px;
      }

      .status h3 {
        font-size: 0.98rem;
      }

      .status p {
        margin-top: 8px;
        line-height: 1.6;
      }

      .status.info {
        border-color: var(--line);
      }

      .status.success {
        border-color: rgba(124, 230, 191, 0.32);
        background: rgba(12, 43, 34, 0.52);
      }

      .status.warning {
        border-color: rgba(255, 210, 139, 0.36);
        background: rgba(71, 50, 18, 0.44);
      }

      .status.error {
        border-color: rgba(253, 164, 175, 0.36);
        background: rgba(82, 23, 23, 0.42);
      }

      .status code,
      .code-block {
        display: block;
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(8, 20, 25, 0.88);
        color: var(--accent);
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .workspace-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .workspace-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .content {
        min-width: 0;
      }

      .section-stack {
        display: grid;
        gap: 16px;
      }

      .group-card,
      .session-card,
      .invite-card {
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(11, 24, 31, 0.92);
        padding: 18px;
      }

      .group-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        font-size: 0.75rem;
        color: var(--muted);
      }

      .badge.good {
        border-color: rgba(124, 230, 191, 0.26);
        color: var(--success);
      }

      .badge.warn {
        border-color: rgba(255, 210, 139, 0.28);
        color: var(--warning);
      }

      .badge.bad {
        border-color: rgba(253, 164, 175, 0.26);
        color: var(--error);
      }

      .group-copy,
      .session-copy {
        margin-top: 8px;
      }

      .rule-block {
        margin-top: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
        padding: 14px;
      }

      .split-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .divider {
        height: 1px;
        background: var(--line);
      }

      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .empty {
        padding: 18px;
        border-radius: 20px;
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.02);
      }

      .section-intro {
        max-width: 56ch;
        color: var(--muted);
        line-height: 1.7;
      }

      .hero-summary {
        display: grid;
        gap: 18px;
      }

      .hero-summary h2 {
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
        max-width: 14ch;
      }

      .secondary-meta {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .group-switcher {
        display: grid;
        gap: 8px;
      }

      .thread-layout {
        display: grid;
        gap: 16px;
      }

      .thread-card {
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(9, 20, 25, 0.94);
        padding: 18px;
      }

      .thread-stream {
        display: grid;
        gap: 14px;
        max-height: 36rem;
        overflow-y: auto;
        padding-right: 4px;
      }

      .message-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(40rem, 100%);
      }

      .message-row.self {
        justify-self: end;
      }

      .message-row.system {
        justify-self: center;
        max-width: 32rem;
      }

      .message-bubble {
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
      }

      .message-row.self .message-bubble {
        background: rgba(138, 240, 214, 0.1);
        border-color: rgba(138, 240, 214, 0.22);
      }

      .message-row.system .message-bubble {
        background: rgba(255, 255, 255, 0.02);
        text-align: center;
      }

      .message-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.86rem;
        color: var(--muted);
      }

      .message-copy {
        margin-top: 10px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .media-shell {
        position: relative;
        margin-top: 12px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(138, 240, 214, 0.18);
        background: rgba(8, 20, 25, 0.96);
      }

      .media-shell img,
      .media-shell video {
        display: block;
        width: 100%;
        max-height: 28rem;
        object-fit: contain;
        background: #050c10;
      }

      .media-shell.blurred img {
        filter: blur(28px) saturate(0.7);
        transform: scale(1.04);
      }

      .media-shell.blurred video {
        filter: blur(22px) saturate(0.7);
      }

      .media-placeholder {
        display: grid;
        gap: 10px;
        padding: 20px;
        min-height: 13rem;
        place-items: center;
        text-align: center;
        color: var(--muted);
      }

      .media-overlay {
        position: absolute;
        inset: auto 12px 12px 12px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }

      .watermark {
        max-width: 18rem;
        border-radius: 999px;
        background: rgba(8, 20, 25, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 7px 10px;
        font-size: 0.78rem;
        color: rgba(238, 246, 247, 0.92);
        backdrop-filter: blur(8px);
      }

      .reveal-button {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }

      .composer-grid {
        display: grid;
        gap: 16px;
      }

      .composer-preview {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
      }

      .composer-preview img,
      .composer-preview video {
        display: block;
        width: 100%;
        max-height: 20rem;
        object-fit: contain;
        border-radius: 14px;
        background: #050c10;
      }

      .group-shortcut {
        width: 100%;
        text-align: left;
      }

      @media (max-width: 1180px) {
        .auth-layout,
        .workspace-layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }
      }

      @media (max-width: 780px) {
        .shell {
          padding: 16px;
        }

        .grid-2,
        .grid-3,
        .field-grid {
          grid-template-columns: 1fr;
        }

        .workspace-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-root" class="shell"></div>

    <script>
      const DEFAULT_RELAY_URL = "https://relay.emberchamber.com";
      const LOCAL_RELAY_URL = "http://127.0.0.1:8787";
      const LOCAL_RELAY_TEST_INVITE_TOKEN = "ubuntu-local-test-invite";
      const storageKeys = {
        relayUrl: "emberchamber.relay-url.override",
        session: "emberchamber.desktop.relay.session.v1",
        email: "emberchamber.auth.v1.email",
        inviteToken: "emberchamber.auth.v1.inviteToken",
        groupInviteReference: "emberchamber.auth.v1.group-invite-reference",
        deviceLabel: "emberchamber.auth.v1.deviceLabel",
        pendingChallenge: "emberchamber.desktop.pending-challenge.v1",
        createdInvites: "emberchamber.desktop.created-invites.v1",
      };

      const timeFormatter = new Intl.DateTimeFormat(undefined, {
        dateStyle: "medium",
        timeStyle: "short",
      });

      const root = document.getElementById("app-root");

      const state = {
        activeView: "thread",
        activeGroupId: null,
        relayUrl: readRelayUrl(),
        session: readJson(storageKeys.session, null),
        pendingChallenge: readJson(storageKeys.pendingChallenge, null),
        createdInvites: readJson(storageKeys.createdInvites, {}),
        authStatus: null,
        workspaceStatus: null,
        groupsStatus: null,
        invitesStatus: null,
        settingsStatus: null,
        sessionsStatus: null,
        threadStatus: null,
        busyAction: "",
        isLoadingWorkspace: false,
        isLoadingThread: false,
        me: null,
        privacy: null,
        sessions: [],
        groups: [],
        groupInvites: {},
        threadMessages: [],
        revealedMessages: {},
        authForm: {
          email: readText(storageKeys.email),
          inviteToken: readText(storageKeys.inviteToken),
          groupInviteReference: readText(storageKeys.groupInviteReference),
          deviceLabel: readText(storageKeys.deviceLabel) || suggestDesktopLabel(),
          ageConfirmed18: false,
          completionInput: readCompletionTokenFromLocation(),
        },
        createGroupForm: {
          title: "",
          joinRuleText: "",
          memberCap: "12",
          sensitiveMediaDefault: false,
          allowMemberInvites: false,
        },
        groupInviteDrafts: {},
        inviteTools: {
          input: "",
          preview: null,
        },
        profileForm: {
          displayName: "",
          bio: "",
        },
        privacyForm: {
          notificationPreviewMode: "discreet",
          autoDownloadSensitiveMedia: false,
          allowSensitiveExport: false,
          secureAppSwitcher: true,
        },
        threadComposer: {
          text: "",
          file: null,
          fileName: "",
          mimeType: "",
          previewUrl: "",
        },
      };

      function readText(key) {
        return globalThis.localStorage?.getItem(key) || "";
      }

      function writeText(key, value) {
        globalThis.localStorage?.setItem(key, value);
      }

      function readJson(key, fallback) {
        const raw = globalThis.localStorage?.getItem(key);
        if (!raw) {
          return fallback;
        }

        try {
          return JSON.parse(raw);
        } catch {
          globalThis.localStorage?.removeItem(key);
          return fallback;
        }
      }

      function writeJson(key, value) {
        globalThis.localStorage?.setItem(key, JSON.stringify(value));
      }

      function clearStoredSession() {
        globalThis.localStorage?.removeItem(storageKeys.session);
      }

      function clearPendingChallenge() {
        globalThis.localStorage?.removeItem(storageKeys.pendingChallenge);
        state.pendingChallenge = null;
      }

      function readRelayUrl() {
        const raw = readText(storageKeys.relayUrl);
        return normalizeRelayUrl(raw || DEFAULT_RELAY_URL);
      }

      function normalizeRelayUrl(value) {
        return (value || DEFAULT_RELAY_URL).trim().replace(/\/$/, "");
      }

      function isLocalRelayUrl(value = state.relayUrl) {
        try {
          const url = new URL(normalizeRelayUrl(value));
          return ["127.0.0.1", "localhost"].includes(url.hostname);
        } catch {
          return false;
        }
      }

      function hasStoredRelayOverride() {
        return Boolean(readText(storageKeys.relayUrl).trim());
      }

      async function maybeAdoptLocalRelay() {
        if (state.session || hasStoredRelayOverride()) {
          return;
        }

        try {
          const response = await fetch(`${LOCAL_RELAY_URL}/health`);
          if (!response.ok) {
            return;
          }

          state.relayUrl = LOCAL_RELAY_URL;
          writeText(storageKeys.relayUrl, state.relayUrl);

          if (!state.authForm.groupInviteReference.trim() && !state.authForm.inviteToken.trim()) {
            state.authForm.inviteToken = LOCAL_RELAY_TEST_INVITE_TOKEN;
            writeText(storageKeys.inviteToken, state.authForm.inviteToken);
          }

          const status = createStatus(
            "success",
            "Local Ubuntu test setup detected",
            "A local relay is already running, so this install will use it directly. The reusable local beta invite is prefilled when you need bootstrap instead of a group invite URL.",
            state.relayUrl
          );
          state.authStatus = status;
          state.settingsStatus = status;
          render();
        } catch {
          // Leave the hosted relay as the default when local dev infrastructure is absent.
        }
      }

      function suggestDesktopLabel() {
        const agent = [navigator.userAgentData?.platform, navigator.platform, navigator.userAgent]
          .filter(Boolean)
          .join(" ");

        if (/win/i.test(agent)) {
          return "Windows desktop";
        }

        if (/linux/i.test(agent)) {
          return "Linux desktop";
        }

        if (/mac/i.test(agent)) {
          return "Mac desktop";
        }

        return "Desktop app";
      }

      function readCompletionTokenFromLocation() {
        try {
          const token = new URL(globalThis.location.href).searchParams.get("token");
          return token || "";
        } catch {
          return "";
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDateTime(value) {
        if (!value) {
          return "Unknown time";
        }

        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return value;
        }

        return timeFormatter.format(parsed);
      }

      function isBusy(action) {
        return state.busyAction === action;
      }

      function setBusy(action) {
        state.busyAction = action;
        render();
      }

      function clearBusy() {
        state.busyAction = "";
        render();
      }

      function createStatus(tone, title, body, detail) {
        return { tone, title, body, detail };
      }

      function renderStatus(status) {
        if (!status) {
          return "";
        }

        return `
          <section class="status ${escapeHtml(status.tone || "info")}">
            <h3>${escapeHtml(status.title)}</h3>
            <p>${escapeHtml(status.body)}</p>
            ${status.detail ? `<code>${escapeHtml(status.detail)}</code>` : ""}
          </section>
        `;
      }

      function parseCompletionToken(value) {
        const trimmed = (value || "").trim();
        if (!trimmed) {
          return "";
        }

        try {
          const url = new URL(trimmed);
          const searchToken = url.searchParams.get("token");
          if (searchToken) {
            return searchToken;
          }
        } catch {
          // Ignore parse failures and fall back to raw input.
        }

        const tokenMatch = trimmed.match(/[?&]token=([^&]+)/);
        if (tokenMatch) {
          return decodeURIComponent(tokenMatch[1]);
        }

        return trimmed;
      }

      function parseInviteReference(value) {
        const trimmed = (value || "").trim();
        if (!trimmed) {
          return null;
        }

        try {
          const url = new URL(trimmed);
          const segments = url.pathname.split("/").filter(Boolean);
          if (segments[0] === "invite" && segments.length >= 3) {
            return {
              groupId: segments[1],
              inviteToken: segments[2],
            };
          }
        } catch {
          // Ignore parse failures and fall back to local parsing.
        }

        const parts = trimmed.split("/").filter(Boolean);
        if (parts.length >= 2) {
          return {
            groupId: parts[parts.length - 2],
            inviteToken: parts[parts.length - 1],
          };
        }

        return null;
      }

      function rememberInvite(groupId, invite) {
        const current = Array.isArray(state.createdInvites[groupId]) ? state.createdInvites[groupId] : [];
        const next = [invite, ...current.filter((entry) => entry.id !== invite.id)].slice(0, 8);
        state.createdInvites = {
          ...state.createdInvites,
          [groupId]: next,
        };
        writeJson(storageKeys.createdInvites, state.createdInvites);
      }

      function cachedInvite(groupId, inviteId) {
        const items = Array.isArray(state.createdInvites[groupId]) ? state.createdInvites[groupId] : [];
        return items.find((entry) => entry.id === inviteId) || null;
      }

      function revokePreviewUrl(url) {
        if (!url) {
          return;
        }

        try {
          URL.revokeObjectURL(url);
        } catch {
          // Ignore preview cleanup failures.
        }
      }

      function clearComposerFile() {
        revokePreviewUrl(state.threadComposer.previewUrl);
        state.threadComposer.file = null;
        state.threadComposer.fileName = "";
        state.threadComposer.mimeType = "";
        state.threadComposer.previewUrl = "";
      }

      function setComposerFile(file) {
        clearComposerFile();

        if (!file) {
          return;
        }

        state.threadComposer.file = file;
        state.threadComposer.fileName = file.name;
        state.threadComposer.mimeType = file.type || "application/octet-stream";
        if (file.type.startsWith("image/") || file.type.startsWith("video/")) {
          state.threadComposer.previewUrl = URL.createObjectURL(file);
        }
      }

      function currentGroup() {
        return state.groups.find((group) => group.id === state.activeGroupId) || null;
      }

      function viewerIdentityLabel() {
        if (state.me?.displayName) {
          return state.me.displayName;
        }

        if (state.me?.username) {
          return `@${state.me.username}`;
        }

        return state.me?.email || "Current member";
      }

      function pickPreferredGroupId(groups) {
        if (groups.some((group) => group.id === state.activeGroupId)) {
          return state.activeGroupId;
        }

        if (
          state.session?.bootstrapConversationId &&
          groups.some((group) => group.id === state.session.bootstrapConversationId)
        ) {
          return state.session.bootstrapConversationId;
        }

        return groups[0]?.id || null;
      }

      function inferContentClass(file) {
        if (file.type.startsWith("image/")) {
          return "image";
        }

        if (file.type.startsWith("video/")) {
          return "video";
        }

        if (file.type.startsWith("audio/")) {
          return "audio";
        }

        return "file";
      }

      function resetThreadState() {
        state.activeGroupId = null;
        state.threadMessages = [];
        state.revealedMessages = {};
        state.threadStatus = null;
        state.isLoadingThread = false;
        state.threadComposer.text = "";
        clearComposerFile();
      }

      function ensureInviteDraft(groupId) {
        if (!state.groupInviteDrafts[groupId]) {
          state.groupInviteDrafts[groupId] = {
            note: "",
            expiresInHours: "72",
            maxUses: "12",
          };
        }

        return state.groupInviteDrafts[groupId];
      }

      async function refreshRelaySession() {
        if (!state.session?.refreshToken) {
          clearStoredSession();
          state.session = null;
          return null;
        }

        const response = await fetch(`${state.relayUrl}/v1/auth/refresh`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
          },
          body: JSON.stringify({
            refreshToken: state.session.refreshToken,
          }),
        });

        const body = (await response.json().catch(() => ({}))) || {};
        if (!response.ok || !body.accessToken) {
          clearStoredSession();
          state.session = null;
          return null;
        }

        state.session = {
          ...state.session,
          accessToken: body.accessToken,
          sessionId: body.sessionId,
          deviceId: body.deviceId,
        };
        writeJson(storageKeys.session, state.session);
        return state.session;
      }

      async function relayFetch(path, options = {}, config = {}) {
        const { auth = true, retryAfterRefresh = true } = config;
        const headers = new Headers(options.headers || {});
        const hasBody = options.body !== undefined && options.body !== null;

        if (auth && state.session?.accessToken) {
          headers.set("authorization", `Bearer ${state.session.accessToken}`);
        }

        if (hasBody && !headers.has("content-type")) {
          headers.set("content-type", "application/json");
        }

        const response = await fetch(`${state.relayUrl}${path}`, {
          ...options,
          headers,
        });

        const body = (await response.json().catch(() => ({}))) || {};
        if (response.ok) {
          return body;
        }

        if (auth && response.status === 401 && retryAfterRefresh) {
          const refreshed = await refreshRelaySession();
          if (refreshed) {
            return relayFetch(path, options, { auth, retryAfterRefresh: false });
          }
        }

        const error = new Error(body.error || "Relay request failed");
        error.code = body.code;
        throw error;
      }

      async function loadWorkspace() {
        if (!state.session) {
          state.isLoadingWorkspace = false;
          render();
          return;
        }

        state.isLoadingWorkspace = true;
        state.workspaceStatus = null;
        render();

        try {
          const [me, privacy, sessions, groups] = await Promise.all([
            relayFetch("/v1/me"),
            relayFetch("/v1/me/privacy"),
            relayFetch("/v1/sessions"),
            relayFetch("/v1/groups"),
          ]);

          state.me = me;
          state.privacy = privacy;
          state.sessions = sessions;
          state.groups = groups;
          state.profileForm.displayName = me.displayName || "";
          state.profileForm.bio = me.bio || "";
          state.privacyForm = {
            notificationPreviewMode: privacy.notificationPreviewMode || "discreet",
            autoDownloadSensitiveMedia: Boolean(privacy.autoDownloadSensitiveMedia),
            allowSensitiveExport: Boolean(privacy.allowSensitiveExport),
            secureAppSwitcher: Boolean(privacy.secureAppSwitcher),
          };

          const inviteLoads = await Promise.allSettled(
            groups
              .filter((group) => group.canCreateInvites)
              .map(async (group) => {
                ensureInviteDraft(group.id);
                return [group.id, await relayFetch(`/v1/groups/${group.id}/invites`)];
              }),
          );

          const nextInvites = {};
          for (const result of inviteLoads) {
            if (result.status === "fulfilled") {
              nextInvites[result.value[0]] = result.value[1];
            }
          }
          state.groupInvites = nextInvites;
          state.activeGroupId = pickPreferredGroupId(groups);
          if (state.activeGroupId) {
            await loadThread(state.activeGroupId, { preserveStatus: true });
          } else {
            resetThreadState();
          }
        } catch (error) {
          if (!state.session) {
            state.authStatus = createStatus(
              "warning",
              "Session expired",
              "The desktop app signed you out because the relay session could not be refreshed."
            );
            resetWorkspaceState();
          } else {
            state.workspaceStatus = createStatus(
              "error",
              "Workspace failed to load",
              error instanceof Error ? error.message : "Unknown relay error",
              state.relayUrl,
            );
          }
        } finally {
          state.isLoadingWorkspace = false;
          render();
        }
      }

      function resetWorkspaceState() {
        state.me = null;
        state.privacy = null;
        state.sessions = [];
        state.groups = [];
        state.groupInvites = {};
        resetThreadState();
        state.profileForm = {
          displayName: "",
          bio: "",
        };
        state.privacyForm = {
          notificationPreviewMode: "discreet",
          autoDownloadSensitiveMedia: false,
          allowSensitiveExport: false,
          secureAppSwitcher: true,
        };
      }

      async function loadThread(groupId, options = {}) {
        const { preserveStatus = false } = options;

        if (!state.session || !groupId) {
          state.threadMessages = [];
          state.activeGroupId = null;
          state.isLoadingThread = false;
          render();
          return;
        }

        state.activeGroupId = groupId;
        state.isLoadingThread = true;
        state.threadMessages = [];
        state.revealedMessages = {};
        if (!preserveStatus) {
          state.threadStatus = null;
        }
        render();

        try {
          state.threadMessages = await relayFetch(`/v1/groups/${groupId}/messages?limit=80`);
          state.revealedMessages = {};
        } catch (error) {
          state.threadStatus = createStatus(
            "error",
            "Unable to load the group thread",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          state.isLoadingThread = false;
          render();
        }
      }

      async function sendThreadMessage() {
        if (!state.session || !state.activeGroupId) {
          return;
        }

        const group = currentGroup();
        if (!group) {
          state.threadStatus = createStatus(
            "warning",
            "Pick a group first",
            "This desktop install needs an active group before it can send media."
          );
          render();
          return;
        }

        const text = state.threadComposer.text.trim();
        const file = state.threadComposer.file;
        if (!text && !file) {
          state.threadStatus = createStatus(
            "warning",
            "Add a photo or caption first",
            "Choose a file, write a caption, or do both before sending."
          );
          render();
          return;
        }

        if (file && file.size > 20 * 1024 * 1024) {
          state.threadStatus = createStatus(
            "error",
            "File is too large",
            "The current desktop MVP accepts uploads up to 20 MB per file."
          );
          render();
          return;
        }

        setBusy("send-message");

        try {
          let attachmentId;

          if (file) {
            const contentClass = inferContentClass(file);
            const protectionProfile =
              contentClass === "image" || contentClass === "video"
                ? group.sensitiveMediaDefault
                  ? "sensitive_media"
                  : "standard"
                : "standard";

            const ticket = await relayFetch("/v1/attachments/ticket", {
              method: "POST",
              body: JSON.stringify({
                fileName: file.name,
                mimeType: file.type || "application/octet-stream",
                byteLength: file.size,
                conversationId: group.id,
                conversationEpoch: group.epoch,
                contentClass,
                retentionMode: "private_vault",
                protectionProfile,
              }),
            });

            const uploadResponse = await fetch(ticket.uploadUrl, {
              method: "PUT",
              headers: {
                "content-type": file.type || "application/octet-stream",
              },
              body: file,
            });

            if (!uploadResponse.ok) {
              throw new Error("Attachment upload failed");
            }

            attachmentId = ticket.attachmentId;
          }

          const message = await relayFetch(`/v1/groups/${group.id}/messages`, {
            method: "POST",
            body: JSON.stringify({
              text: text || undefined,
              attachmentId,
              clientMessageId: crypto.randomUUID(),
            }),
          });

          state.threadMessages = [...state.threadMessages, message];
          state.threadStatus = createStatus(
            "success",
            file ? "Photo sent" : "Message sent",
            file
              ? `Delivered into ${group.title}. This desktop install now proves the first-send loop.`
              : `Delivered into ${group.title}.`
          );
          state.threadComposer.text = "";
          clearComposerFile();
        } catch (error) {
          state.threadStatus = createStatus(
            "error",
            "Unable to send to the group",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          clearBusy();
          render();
        }
      }

      async function startMagicLink() {
        const email = state.authForm.email.trim();
        const groupInviteReference = state.authForm.groupInviteReference.trim();
        const deviceLabel = state.authForm.deviceLabel.trim();
        const parsedGroupInvite = groupInviteReference ? parseInviteReference(groupInviteReference) : null;
        const localRelay = isLocalRelayUrl();
        const inviteToken =
          parsedGroupInvite
            ? ""
            : state.authForm.inviteToken.trim() || (localRelay ? LOCAL_RELAY_TEST_INVITE_TOKEN : "");

        if (localRelay && !parsedGroupInvite && !state.authForm.inviteToken.trim()) {
          state.authForm.inviteToken = inviteToken;
          writeText(storageKeys.inviteToken, inviteToken);
        }

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          state.authStatus = createStatus(
            "error",
            "Enter a valid email address",
            "The desktop app needs a real inbox to send the magic link."
          );
          render();
          return;
        }

        if (!deviceLabel || deviceLabel.length < 3) {
          state.authStatus = createStatus(
            "error",
            "Name this device first",
            "Use at least 3 characters so session review stays readable."
          );
          render();
          return;
        }

        if (groupInviteReference && !parsedGroupInvite) {
          state.authStatus = createStatus(
            "error",
            "Paste a valid group invite URL",
            "Use the full invite URL so this install can land in the right group after sign-in."
          );
          render();
          return;
        }

        if (!state.authForm.ageConfirmed18) {
          state.authStatus = createStatus(
            "error",
            "Confirm adults-only access first",
            "EmberChamber beta access is limited to adults 18 and over."
          );
          render();
          return;
        }

        setBusy("start-auth");

        try {
          const challenge = await relayFetch(
            "/v1/auth/start",
            {
              method: "POST",
              body: JSON.stringify({
                email,
                inviteToken: parsedGroupInvite ? undefined : inviteToken || undefined,
                groupId: parsedGroupInvite?.groupId,
                groupInviteToken: parsedGroupInvite?.inviteToken,
                deviceLabel,
                ageConfirmed18: true,
              }),
            },
            { auth: false },
          );

          state.pendingChallenge = challenge;
          writeJson(storageKeys.pendingChallenge, challenge);
          writeText(storageKeys.email, email);
          writeText(storageKeys.inviteToken, inviteToken);
          writeText(storageKeys.groupInviteReference, groupInviteReference);
          writeText(storageKeys.deviceLabel, deviceLabel);

          if (challenge.debugCompletionToken) {
            state.authForm.completionInput = challenge.debugCompletionToken;
          }

          state.authStatus = createStatus(
            localRelay && challenge.debugCompletionToken
              ? "success"
              : challenge.inviteRequired
                ? "warning"
                : "success",
            localRelay && challenge.debugCompletionToken
              ? "Local completion token ready"
              : challenge.inviteRequired
                ? "Inbox link sent for bootstrap"
                : "Magic link sent",
            parsedGroupInvite
              ? `Open the email, finish sign-in, and this install will land inside the invited group before ${formatDateTime(challenge.expiresAt)}.`
              : localRelay && challenge.debugCompletionToken
                ? `Local relay mode is active. The completion token was pasted into the field below, so you can finish sign-in before ${formatDateTime(challenge.expiresAt)} without leaving the app.`
              : `Open the email, then paste the magic link or completion token here before ${formatDateTime(challenge.expiresAt)}.`,
            challenge.debugCompletionToken || undefined,
          );
        } catch (error) {
          state.authStatus = createStatus(
            "error",
            "Unable to start sign-in",
            error instanceof Error ? error.message : "Unknown relay error",
            state.relayUrl,
          );
        } finally {
          clearBusy();
        }
      }

      async function completeMagicLink() {
        const completionToken = parseCompletionToken(state.authForm.completionInput);
        const deviceLabel = state.authForm.deviceLabel.trim();

        if (!completionToken) {
          state.authStatus = createStatus(
            "error",
            "Paste the magic link or token",
            "You can paste the full email URL or the raw completion token."
          );
          render();
          return;
        }

        setBusy("complete-auth");

        try {
          const session = await relayFetch(
            "/v1/auth/complete",
            {
              method: "POST",
              body: JSON.stringify({
                completionToken,
                deviceLabel: deviceLabel || undefined,
              }),
            },
            { auth: false },
          );

          state.session = session;
          writeJson(storageKeys.session, session);
          clearPendingChallenge();
          state.authStatus = null;
          resetWorkspaceState();
          state.activeView = "thread";
          state.activeGroupId = session.bootstrapConversationId || null;
          render();
          await loadWorkspace();
        } catch (error) {
          state.authStatus = createStatus(
            "error",
            "Unable to complete sign-in",
            error instanceof Error ? error.message : "Unknown relay error"
          );
        } finally {
          clearBusy();
        }
      }

      async function createInvite(groupId) {
        if (!state.session) {
          return;
        }

        const draft = ensureInviteDraft(groupId);
        const action = `create-invite:${groupId}`;
        setBusy(action);

        try {
          const invite = await relayFetch(`/v1/groups/${groupId}/invites`, {
            method: "POST",
            body: JSON.stringify({
              note: draft.note.trim() || undefined,
              expiresInHours: draft.expiresInHours ? Number(draft.expiresInHours) : undefined,
              maxUses: draft.maxUses ? Number(draft.maxUses) : undefined,
            }),
          });

          rememberInvite(groupId, {
            id: invite.id,
            inviteUrl: invite.inviteUrl,
            inviteToken: invite.inviteToken,
            createdAt: invite.createdAt,
          });
          draft.note = "";
          state.groupsStatus = createStatus(
            "success",
            "Invite minted",
            "The raw invite URL is available on this device now. Historical invite URLs cannot be re-derived from the relay."
          );
          await loadWorkspace();
        } catch (error) {
          state.groupsStatus = createStatus(
            "error",
            "Unable to create invite",
            error instanceof Error ? error.message : "Unknown relay error"
          );
          render();
        } finally {
          clearBusy();
        }
      }

      function handleInput(event) {
        const target = event.target;
        if (!(target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement)) {
          return;
        }

        const bind = target.dataset.bind;
        if (!bind) {
          return;
        }

        const value = target.type === "checkbox" ? target.checked : target.value;

        if (bind === "relayUrl") {
          state.relayUrl = value;
          return;
        }

        if (bind === "auth.email") {
          state.authForm.email = value;
          writeText(storageKeys.email, value);
          return;
        }

        if (bind === "auth.inviteToken") {
          state.authForm.inviteToken = value;
          writeText(storageKeys.inviteToken, value);
          return;
        }

        if (bind === "auth.groupInviteReference") {
          state.authForm.groupInviteReference = value;
          writeText(storageKeys.groupInviteReference, value);
          return;
        }

        if (bind === "auth.deviceLabel") {
          state.authForm.deviceLabel = value;
          writeText(storageKeys.deviceLabel, value);
          return;
        }

        if (bind === "auth.ageConfirmed18") {
          state.authForm.ageConfirmed18 = Boolean(value);
          return;
        }

        if (bind === "auth.completionInput") {
          state.authForm.completionInput = value;
          return;
        }

        if (bind === "createGroup.title") {
          state.createGroupForm.title = value;
          return;
        }

        if (bind === "createGroup.joinRuleText") {
          state.createGroupForm.joinRuleText = value;
          return;
        }

        if (bind === "createGroup.memberCap") {
          state.createGroupForm.memberCap = value;
          return;
        }

        if (bind === "createGroup.sensitiveMediaDefault") {
          state.createGroupForm.sensitiveMediaDefault = Boolean(value);
          return;
        }

        if (bind === "inviteTools.input") {
          state.inviteTools.input = value;
          return;
        }

        if (bind === "thread.text") {
          state.threadComposer.text = value;
          return;
        }

        if (bind === "thread.file" && target instanceof HTMLInputElement) {
          setComposerFile(target.files?.[0] || null);
          render();
          return;
        }

        if (bind === "profile.displayName") {
          state.profileForm.displayName = value;
          return;
        }

        if (bind === "profile.bio") {
          state.profileForm.bio = value;
          return;
        }

        if (bind === "privacy.notificationPreviewMode") {
          state.privacyForm.notificationPreviewMode = value;
          return;
        }

        if (bind === "privacy.autoDownloadSensitiveMedia") {
          state.privacyForm.autoDownloadSensitiveMedia = Boolean(value);
          return;
        }

        if (bind === "privacy.allowSensitiveExport") {
          state.privacyForm.allowSensitiveExport = Boolean(value);
          return;
        }

        if (bind === "privacy.secureAppSwitcher") {
          state.privacyForm.secureAppSwitcher = Boolean(value);
          return;
        }

        if (bind.startsWith("groupInvite.")) {
          const [, groupId, field] = bind.split(".");
          const draft = ensureInviteDraft(groupId);
          draft[field] = value;
        }
      }

      async function handleClick(event) {
        const button = event.target.closest("[data-action], [data-nav]");
        if (!button) {
          return;
        }

        const nav = button.dataset.nav;
        if (nav) {
          state.activeView = nav;
          render();
          return;
        }

        const action = button.dataset.action;
        if (!action) {
          return;
        }

        if (action === "sign-out") {
          signOut();
          return;
        }

        if (action === "refresh-workspace") {
          await loadWorkspace();
          return;
        }

        if (action === "check-relay") {
          await checkRelayHealth();
          return;
        }

        if (action === "copy-invite") {
          const groupId = button.dataset.groupId;
          const inviteId = button.dataset.inviteId;
          const cached = cachedInvite(groupId, inviteId);
          if (!cached?.inviteUrl) {
            state.groupsStatus = createStatus(
              "warning",
              "Raw invite URL unavailable",
              "This device only retains raw invite URLs for invites it minted locally. Create a fresh invite if you need a copyable link."
            );
            render();
            return;
          }

          try {
            await navigator.clipboard.writeText(cached.inviteUrl);
            state.groupsStatus = createStatus(
              "success",
              "Invite URL copied",
              "The latest invite URL is now in your clipboard."
            );
          } catch {
            state.groupsStatus = createStatus(
              "warning",
              "Clipboard unavailable",
              "Copy the invite URL from the code block manually on this device.",
              cached.inviteUrl,
            );
          }
          render();
          return;
        }

        if (action === "revoke-session") {
          const sessionId = button.dataset.sessionId;
          if (sessionId) {
            await revokeSession(sessionId);
          }
          return;
        }

        if (action === "create-invite") {
          const groupId = button.dataset.groupId;
          if (groupId) {
            await createInvite(groupId);
          }
          return;
        }

        if (action === "open-group") {
          const groupId = button.dataset.groupId;
          if (groupId) {
            state.activeView = "thread";
            await loadThread(groupId);
          }
          return;
        }

        if (action === "clear-composer-file") {
          clearComposerFile();
          render();
          return;
        }

        if (action === "reveal-message") {
          const messageId = button.dataset.messageId;
          if (messageId) {
            state.revealedMessages[messageId] = true;
            render();
          }
          return;
        }

        if (action === "accept-preview-invite") {
          await acceptInvite();
          return;
        }
      }

      async function handleSubmit(event) {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) {
          return;
        }

        const name = form.dataset.form;
        if (!name) {
          return;
        }

        event.preventDefault();

        if (name === "start-auth") {
          await startMagicLink();
          return;
        }

        if (name === "complete-auth") {
          await completeMagicLink();
          return;

        if (name === "create-group") {

          return;

        if (name === "preview-invite") {

          return;

        if (name === "save-profile") {

        if (name === "save-privacy") {
          await savePrivacy();
          return;
        }

        if (name === "save-relay-url") {
          saveRelayUrl();
          return;
        }

        if (name === "send-message") {
          await sendThreadMessage();
        }
      }

      function formatByteSize(value) {
        if (!Number.isFinite(value) || value <= 0) {
          return "Unknown size";
        }

        const units = ["B", "KB", "MB", "GB"];
        let size = value;
        let unitIndex = 0;
        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }

        const precision = size >= 10 || unitIndex === 0 ? 0 : 1;
        return `${size.toFixed(precision)} ${units[unitIndex]}`;
      }

      function inviteStatusBadge(status) {
        if (status === "active") {
          return "good";
        }

        if (status === "frozen" || status === "expired" || status === "exhausted") {
          return "warn";
        }

        return "bad";
      }

      function renderGroupInviteRecord(groupId, record) {
        const cached = cachedInvite(groupId, record.id);

        return `
          <article class="invite-card">
            <div class="split-actions">
              <div>
                <h4>${escapeHtml(record.note || "Untitled invite")}</h4>
                <p class="secondary-meta">Created ${escapeHtml(formatDateTime(record.createdAt))} by ${escapeHtml(record.inviterDisplayName)}</p>
              </div>
              <span class="badge ${inviteStatusBadge(record.status)}">${escapeHtml(record.status)}</span>
            </div>
            <div class="badge-row" style="margin-top: 12px">
              <span class="badge">Uses ${escapeHtml(String(record.useCount))}${record.maxUses ? ` / ${escapeHtml(String(record.maxUses))}` : ""}</span>
              <span class="badge">${record.expiresAt ? `Expires ${escapeHtml(formatDateTime(record.expiresAt))}` : "No expiry"}</span>
              ${record.createdByCurrentAccount ? '<span class="badge">Created by this account</span>' : ""}
            </div>
            ${
              cached?.inviteUrl
                ? `
                  <div class="rule-block">
                    <p class="label">Copyable on this device</p>

                    <div class="inline-actions" style="margin-top: 12px">

                `
                : `
                  <p class="group-copy">Raw invite URLs are only available on the device that minted them. Create a fresh invite here if you need a shareable link now.</p>
                `
            }
          </article>
        `;
      }

                            `,
                          )
                          .join("")
                  }
                </div>
              </section>

              <section class="panel">
                <p class="eyebrow">Session controls</p>
                <p class="section-intro" style="margin-top: 12px">
                  Use refresh to pull the latest relay state, or sign out to clear the local session from this device.
                </p>
                <div class="stack" style="margin-top: 16px">
                  <button class="secondary-button" type="button" data-action="refresh-workspace">Refresh workspace</button>
                  <button class="ghost-button" type="button" data-action="check-relay" ${isBusy("check-relay") ? "disabled" : ""}>
                    ${isBusy("check-relay") ? "Checking relay..." : "Check relay"}
                  </button>
                  <button class="danger-button" type="button" data-action="sign-out">Sign out</button>
                </div>
              </section>
            </aside>

            <main class="content">
              <div class="workspace-header">
                <div>
                  <p class="eyebrow">Desktop MVP workspace</p>
                  <h2 style="font-size: 1.8rem">
                    ${
                      state.activeView === "thread" && currentGroup()
                        ? escapeHtml(currentGroup().title)
                        : escapeHtml(navItems.find(([id]) => id === state.activeView)?.[1] || "Thread")
                    }
                  </h2>
                </div>
                <div class="workspace-actions">
                  <span class="badge">${escapeHtml(state.relayUrl)}</span>
                </div>
              </div>

              ${renderStatus(state.workspaceStatus)}
              <div class="section-stack">
                ${viewContent}
              </div>
            </main>
          </div>
        `;
      }

      function render() {
        root.innerHTML = state.session ? renderWorkspaceView() : renderAuthView();
      }

      root.addEventListener("input", handleInput);
      root.addEventListener("change", handleInput);
      root.addEventListener("click", (event) => {
        void handleClick(event);
      });
      root.addEventListener("submit", (event) => {
        void handleSubmit(event);
      });

      async function initializeDesktopShell() {
        render();
        await maybeAdoptLocalRelay();

        if (state.session) {
          await loadWorkspace();
        }
      }

      void initializeDesktopShell();
    </script>
  </body>
</html>
