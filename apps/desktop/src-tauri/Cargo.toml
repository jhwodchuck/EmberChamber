[package]
name = "privatemesh-desktop"
description = "PrivateMesh Tauri shell for Windows, Linux, macOS, Android, and iPhone packaging"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "privatemesh_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "privatemesh-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { workspace = true }

[dependencies]
tauri = { workspace = true }
url = "2.5.7"
