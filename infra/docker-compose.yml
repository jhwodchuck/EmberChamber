version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: emberchamber_postgres
    environment:
      POSTGRES_USER: emberchamber
      POSTGRES_PASSWORD: emberchamber
      POSTGRES_DB: emberchamber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emberchamber"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emberchamber_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: emberchamber_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket creation ────────────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/emberchamber --ignore-existing;
      mc anonymous set download local/emberchamber;
      echo 'MinIO bucket initialized';
      "

  # ── API (backend) ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: emberchamber_api
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://emberchamber:emberchamber@postgres:5432/emberchamber
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-64}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      S3_BUCKET: emberchamber
      S3_ENDPOINT: http://minio:9000
      MAX_FILE_SIZE_MB: 50
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Web (frontend) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: emberchamber_web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
