name: Release - Apple Beta

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      capture_screenshots:
        description: Capture simulator screenshots
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

permissions:
  contents: write

concurrency:
  group: release-apple-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS simulator artifact
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Get npm cache path
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Restore npm package cache
        id: npm-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-

      - name: Install JavaScript dependencies
        run: npm ci --no-audit --no-fund

      - name: Patch Expo iOS packages for Xcode 16.4
        shell: bash
        run: |
          python3 << 'PYEOF'
          from pathlib import Path
          import sys

          def block(*lines):
              return "\n".join(lines)

          replacements = [
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"),
                  "extension UIView: @MainActor AnyArgument {",
                  "extension UIView: AnyArgument {",
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"),
                  "  public final class HostingView<Props: ViewProps, ContentView: View<Props>>: ExpoView, @MainActor AnyExpoSwiftUIHostingView {",
                  "  public final class HostingView<Props: ViewProps, ContentView: View<Props>>: ExpoView, AnyExpoSwiftUIHostingView {",
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"),
                  block(
                      "    override func mountChildComponentView(_ childComponentView: UIView, index: Int) {",
                      "      var children = props.children ?? []",
                      "      let child: any AnyChild",
                      "      if let view = childComponentView as AnyObject as? (any ExpoSwiftUI.View) {",
                      "        child = view",
                      "      } else {",
                      "        child = UIViewHost(view: childComponentView)",
                      "      }",
                      "      children.insert(child, at: index)",
                      "",
                      "      props.children = children",
                      "      props.objectWillChange.send()",
                      "    }",
                  ),
                  block(
                      "    override func mountChildComponentView(_ childComponentView: UIView, index: Int) {",
                      "      performSynchronouslyOnMainActor {",
                      "        var children = props.children ?? []",
                      "        let child: any AnyChild",
                      "        if let view = childComponentView as AnyObject as? (any ExpoSwiftUI.View) {",
                      "          child = view",
                      "        } else {",
                      "          child = UIViewHost(view: childComponentView)",
                      "        }",
                      "        children.insert(child, at: index)",
                      "",
                      "        props.children = children",
                      "        props.objectWillChange.send()",
                      "      }",
                      "    }",
                  ),
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"),
                  block(
                      "    override func unmountChildComponentView(_ childComponentView: UIView, index: Int) {",
                      "      // Make sure the view has no superview, React Native asserts against this.",
                      "      childComponentView.removeFromSuperview()",
                      "",
                      "      let childViewId: ObjectIdentifier",
                      "      if let child = childComponentView as AnyObject as? (any AnyChild) {",
                      "        childViewId = child.id",
                      "      } else {",
                      "        childViewId = ObjectIdentifier(childComponentView)",
                      "      }",
                      "",
                      "      if let children = props.children {",
                      "        props.children = children.filter({ $0.id != childViewId })",
                      "        #if DEBUG",
                      "        assert(props.children?.count == children.count - 1, \"Failed to remove child view\")",
                      "        #endif",
                      "        props.objectWillChange.send()",
                      "      }",
                      "    }",
                  ),
                  block(
                      "    override func unmountChildComponentView(_ childComponentView: UIView, index: Int) {",
                      "      performSynchronouslyOnMainActor {",
                      "        // Make sure the view has no superview, React Native asserts against this.",
                      "        childComponentView.removeFromSuperview()",
                      "",
                      "        let childViewId: ObjectIdentifier",
                      "        if let child = childComponentView as AnyObject as? (any AnyChild) {",
                      "          childViewId = child.id",
                      "        } else {",
                      "          childViewId = ObjectIdentifier(childComponentView)",
                      "        }",
                      "",
                      "        if let children = props.children {",
                      "          props.children = children.filter({ $0.id != childViewId })",
                      "          #if DEBUG",
                      "          assert(props.children?.count == children.count - 1, \"Failed to remove child view\")",
                      "          #endif",
                      "          props.objectWillChange.send()",
                      "        }",
                      "      }",
                      "    }",
                  ),
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"),
                  block(
                      "    override func removeFromSuperview() {",
                      "      // When the view is unmounted, the focus on TextFieldView stays active and it causes a crash, so we blur it here",
                      "      // UIView does something similar to resign the first responder in removeFromSuperview, so we do the same for our virtual view",
                      "      if let focusableView = contentView as? any ExpoSwiftUI.FocusableView {",
                      "        focusableView.forceResignFirstResponder()",
                      "      }",
                      "      super.removeFromSuperview()",
                      "    }",
                  ),
                  block(
                      "    override func removeFromSuperview() {",
                      "      performSynchronouslyOnMainActor {",
                      "        // When the view is unmounted, the focus on TextFieldView stays active and it causes a crash, so we blur it here",
                      "        // UIView does something similar to resign the first responder in removeFromSuperview, so we do the same for our virtual view",
                      "        if let focusableView = contentView as? any ExpoSwiftUI.FocusableView {",
                      "          focusableView.forceResignFirstResponder()",
                      "        }",
                      "        super.removeFromSuperview()",
                      "      }",
                      "    }",
                  ),
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualView.swift"),
                  block(
                      "extension ExpoSwiftUI.SwiftUIVirtualView: @MainActor ExpoSwiftUI.ViewWrapper {",
                      "  func getWrappedView() -> Any {",
                      "    if let wrapper = contentView as? ExpoSwiftUI.ViewWrapper {",
                      "      return wrapper.getWrappedView()",
                      "    }",
                      "    return contentView",
                      "  }",
                      "}",
                  ),
                  block(
                      "extension ExpoSwiftUI.SwiftUIVirtualView: ExpoSwiftUI.ViewWrapper {",
                      "  func getWrappedView() -> Any {",
                      "    let result: NonisolatedUnsafeVar<Any> = performSynchronouslyOnMainActor {",
                      "      let wrappedView: Any",
                      "      if let wrapper = contentView as? ExpoSwiftUI.ViewWrapper {",
                      "        wrappedView = wrapper.getWrappedView()",
                      "      } else {",
                      "        wrappedView = contentView",
                      "      }",
                      "      return NonisolatedUnsafeVar(wrappedView)",
                      "    }",
                      "    return result.value",
                      "  }",
                      "}",
                  ),
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/DevTools/URLAuthenticationChallengeForwardSender.swift"),
                  "internal final class URLAuthenticationChallengeForwardSender: NSObject, URLAuthenticationChallengeSender {",
                  "internal final class URLAuthenticationChallengeForwardSender: NSObject, URLAuthenticationChallengeSender, @unchecked Sendable {",
              ),
              (
                  Path("apps/mobile/node_modules/expo-modules-core/ios/DevTools/URLSessionSessionDelegateProxy.swift"),
                  "public final class URLSessionSessionDelegateProxy: NSObject, URLSessionDataDelegate {",
                  "public final class URLSessionSessionDelegateProxy: NSObject, URLSessionDataDelegate, @unchecked Sendable {",
              ),
                (
                  Path("apps/mobile/node_modules/expo-notifications/ios/ExpoNotifications/Notifications/DateComponentsSerializer.swift"),
                  block(
                    "    if #available(iOS 26.0, *) {",
                    "      serializedComponents[\"isRepeatedDay\"] = dateComponents.isRepeatedDay ?? false",
                    "    }",
                  ),
                  "    serializedComponents[\"isRepeatedDay\"] = false",
                ),
                    (
                      Path("apps/mobile/node_modules/expo-image-picker/ios/MediaHandler.swift"),
                      "      asset?.contentType ?? UTType(filenameExtension: fileExtension)",
                      "      UTType(filenameExtension: fileExtension)",
                    ),
                    (
                      Path("apps/mobile/node_modules/expo-image-picker/ios/MediaHandler.swift"),
                      "      resource.contentType",
                      "      UTType(resource.uniformTypeIdentifier) ?? UTType(filenameExtension: fileExtension)",
                    ),
          ]

          for path, old, new in replacements:
              src = path.read_text()
              if old not in src:
                  print(f"ERROR: expected source fragment not found in {path}", file=sys.stderr)
                  sys.exit(1)
              path.write_text(src.replace(old, new, 1))
              print(f"patched {path}")
          PYEOF

      - name: Save npm package cache
        if: steps.npm-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Prebuild iOS app
        run: npm run prebuild:ios --workspace=apps/mobile

      - name: Patch Podfile for Xcode 16.4 CI compatibility
        shell: bash
        run: |
          python3 << 'PYEOF'
          import sys

          path = "apps/mobile/ios/Podfile"
          with open(path) as f:
              src = f.read()

          # Find react_native_post_install( and use paren-counting to locate
          # the matching closing ')'.  This handles nested calls like
          # ccache_enabled?(podfile_properties) that broke the old regex.
          marker = "react_native_post_install("
          idx = src.find(marker)
          if idx == -1:
              print("ERROR: could not find react_native_post_install in Podfile", file=sys.stderr)
              sys.exit(1)

          paren_start = idx + len(marker) - 1   # index of the opening '('
          depth = 0
          close_idx = -1
          for i in range(paren_start, len(src)):
              if src[i] == "(":
                  depth += 1
              elif src[i] == ")":
                  depth -= 1
                  if depth == 0:
                      close_idx = i
                      break

          if close_idx == -1:
              print("ERROR: unbalanced parens after react_native_post_install", file=sys.stderr)
              sys.exit(1)

          # Insert patch right after the line that contains the closing ')'
          eol = src.index("\n", close_idx)

          patch = (
              "\n"
              "    # -- CI patches (must run after react_native_post_install) --\n"
              "    installer.pods_project.targets.each do |target|\n"
              "      target.build_configurations.each do |config|\n"
              '        if target.name == "ExpoModulesCore"\n'
              '          config.build_settings["SWIFT_VERSION"] = "5.10"\n'
              '        end\n'
              '        flags = config.build_settings["OTHER_SWIFT_FLAGS"] || "$(inherited)"\n'
              '        unless flags.include?("-strict-concurrency")\n'
              '          config.build_settings["OTHER_SWIFT_FLAGS"] = flags + " -strict-concurrency=minimal"\n'
              '        end\n'
              '        dt = config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"].to_f\n'
              '        config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "12.0" if dt < 12.0\n'
              '        config.build_settings["GCC_WARN_ABOUT_DEPRECATED_FUNCTIONS"] = "NO"\n'
              "      end\n"
              "    end\n"
              "    # -- end CI patches --\n"
          )

          patched = src[: eol + 1] + patch + src[eol + 1 :]

          with open(path, "w") as f:
              f.write(patched)

          print("Podfile patched successfully")
          PYEOF
          echo "--- Podfile post_install section ---"
          grep -A 35 'post_install' apps/mobile/ios/Podfile | head -40

      - name: Compute CocoaPods cache keys
        id: cocoapods-cache-key
        shell: bash
        run: |
          XCODE_VERSION=$(xcodebuild -version | awk 'NR==1 {print $2}')
          PODFILE_HASH=$(shasum apps/mobile/ios/Podfile package-lock.json | shasum | awk '{print $1}')
          echo "xcode-version=$XCODE_VERSION" >> "$GITHUB_OUTPUT"
          echo "key=cocoapods-${{ runner.os }}-${{ runner.arch }}-xcode-$XCODE_VERSION-podfile-$PODFILE_HASH" >> "$GITHUB_OUTPUT"
          echo "prefix=cocoapods-${{ runner.os }}-${{ runner.arch }}-xcode-$XCODE_VERSION-" >> "$GITHUB_OUTPUT"

      - name: Restore CocoaPods cache
        id: cocoapods-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            apps/mobile/ios/Pods
            apps/mobile/ios/Podfile.lock
            ~/Library/Caches/CocoaPods
          key: ${{ steps.cocoapods-cache-key.outputs.key }}
          restore-keys: |
            ${{ steps.cocoapods-cache-key.outputs.prefix }}

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/mobile/ios

      - name: Save CocoaPods cache
        if: steps.cocoapods-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            apps/mobile/ios/Pods
            apps/mobile/ios/Podfile.lock
            ~/Library/Caches/CocoaPods
          key: ${{ steps.cocoapods-cache-key.outputs.key }}

      - name: Detect Xcode workspace and scheme
        run: |
          IOS_WORKSPACE=$(find apps/mobile/ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)
          if [ -z "$IOS_WORKSPACE" ]; then
            echo "No .xcworkspace found under apps/mobile/ios" >&2
            exit 1
          fi

          IOS_SCHEME=$(xcodebuild -workspace "$IOS_WORKSPACE" -list -json | python3 -c "import json,sys; d=json.load(sys.stdin); s=(d.get('workspace',{}).get('schemes') or d.get('project',{}).get('schemes') or []); print(s[0] if s else '')")
          if [ -z "$IOS_SCHEME" ]; then
            echo "No build scheme found for workspace $IOS_WORKSPACE" >&2
            exit 1
          fi

          echo "IOS_WORKSPACE=$IOS_WORKSPACE" >> "$GITHUB_ENV"
          echo "IOS_SCHEME=$IOS_SCHEME" >> "$GITHUB_ENV"
          echo "Using workspace: $IOS_WORKSPACE"
          echo "Using scheme: $IOS_SCHEME"

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath apps/mobile/ios/build \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            BUNDLE_REACT_NATIVE_CODE_AND_IMAGES=YES

      - name: Locate built simulator app
        run: |
          PRODUCT_DIR=apps/mobile/ios/build/Build/Products/Debug-iphonesimulator
          APP_PATH=$(find "$PRODUCT_DIR" -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No simulator .app found in $PRODUCT_DIR" >&2
            exit 1
          fi
          echo "IOS_SIMULATOR_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Archive simulator app
        run: |
          PRODUCT_DIR=apps/mobile/ios/build/Build/Products/Debug-iphonesimulator
          APP_PATH="$IOS_SIMULATOR_APP_PATH"
          APP_NAME=$(basename "$APP_PATH")
          cd "$PRODUCT_DIR"
          zip -r "$GITHUB_WORKSPACE/EmberChamber-ios-simulator.zip" "$APP_NAME"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-ios-beta
          path: EmberChamber-ios-simulator.zip
          retention-days: 30
          if-no-files-found: error

      - name: Publish simulator zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          generate_release_notes: true
          files: EmberChamber-ios-simulator.zip

  screenshots:
    name: Capture iOS simulator screenshots
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.capture_screenshots)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Download simulator app artifact
        uses: actions/download-artifact@v8
        with:
          name: emberchamber-ios-beta
          path: .

      - name: Unpack simulator app artifact
        run: |
          PRODUCT_DIR=apps/mobile/ios/build/Build/Products/Debug-iphonesimulator
          mkdir -p "$PRODUCT_DIR"
          unzip -q EmberChamber-ios-simulator.zip -d "$PRODUCT_DIR"
          APP_PATH=$(find "$PRODUCT_DIR" -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No simulator .app found in $PRODUCT_DIR after unzip" >&2
            exit 1
          fi
          echo "IOS_SIMULATOR_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Capture screenshots from simulator app
        run: bash apps/mobile/scripts/capture-ios-screenshots.sh "$IOS_SIMULATOR_APP_PATH"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-ios-screenshots-${{ github.run_number }}
          path: apps/mobile/artifacts/ios-screenshots
          retention-days: 14
          if-no-files-found: warn
