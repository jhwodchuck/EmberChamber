name: Prune old workflow runs

on:
  schedule:
    # Weekly on Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      keep:
        description: "Override keep count for all workflows (blank = tiered: 30 for deploy/release, 10 for CI)"
        default: ""
        required: false

jobs:
  prune:
    name: Delete old runs
    runs-on: ubuntu-22.04
    permissions:
      actions: write

    steps:
      - name: Prune runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_MANUAL: ${{ inputs.keep || '' }}
        run: |
          # Tiered retention: deploy/release workflows keep 30 runs, CI keeps 10.
          # Manual override (workflow_dispatch input) takes precedence over both.
          echo "Pruning workflow runs in $REPO"

          workflow_ids=$(gh api "repos/$REPO/actions/workflows?per_page=100" \
            --jq '.workflows[] | "\(.id) \(.name)"')

          total_deleted=0

          while IFS=' ' read -r wf_id wf_name; do
            if [[ -n "$KEEP_MANUAL" ]]; then
              keep="$KEEP_MANUAL"
            elif echo "$wf_name" | grep -qiE "deploy|release"; then
              keep=30
            else
              keep=10
            fi

            run_ids=$(gh api "repos/$REPO/actions/workflows/$wf_id/runs?per_page=100&status=completed" \
              --jq ".workflow_runs[$keep:] | .[].id" 2>/dev/null || true)

            if [[ -z "$run_ids" ]]; then
              echo "  $wf_name (keep=$keep) — nothing to prune"
              continue
            fi

            count=0
            for run_id in $run_ids; do
              gh api -X DELETE "repos/$REPO/actions/runs/$run_id" 2>/dev/null && count=$((count + 1)) || true
            done

            echo "  $wf_name (keep=$keep) — deleted $count run(s)"
            total_deleted=$((total_deleted + count))
          done <<< "$workflow_ids"

          echo "Total deleted: $total_deleted"
