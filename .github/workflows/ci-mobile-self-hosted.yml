name: CI - Mobile (Self-Hosted)

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile-self-hosted.yml"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/build-android.yml"
      - ".github/workflows/reusable-ci-mobile.yml"
  workflow_dispatch:

concurrency:
  group: ci-mobile-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-mobile.yml
    with:
      runner: '["self-hosted","Linux","X64","emberchamber-trusted"]'
      capture_screenshots: true
      emulator_options: "-no-snapshot -no-window -no-audio -no-boot-anim -netdelay none -netspeed full -gpu swiftshader_indirect"
    secrets: inherit
