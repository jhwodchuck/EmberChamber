name: Build Android

on:
  workflow_call:
    inputs:
      build_type:
        description: Android build type (debug or release)
        required: true
        type: string
      sign:
        description: Sign with production keystore
        required: false
        type: boolean
        default: false
      ref:
        description: Git ref to checkout before building
        required: false
        type: string
        default: ""
      artifact_name:
        description: Artifact name for upload
        required: false
        type: string
        default: ""
      require_google_services:
        description: Fail if ANDROID_GOOGLE_SERVICES_JSON is missing
        required: false
        type: boolean
        default: false
      validate_release_inputs:
        description: Run release validation checks before build
        required: false
        type: boolean
        default: false
      version_code:
        description: Optional Android versionCode to inject into apps/mobile/app.json
        required: false
        type: string
        default: ""
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_STORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
    outputs:
      artifact_name:
        description: Uploaded artifact name
        value: ${{ jobs.build.outputs.artifact_name }}
      apk_path:
        description: Built APK path
        value: ${{ jobs.build.outputs.apk_path }}
      aab_path:
        description: Built AAB path (release only)
        value: ${{ jobs.build.outputs.aab_path }}

jobs:
  build:
    name: Build Android (${{ inputs.build_type }})
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_NO_TELEMETRY: "1"
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_path: ${{ steps.meta.outputs.apk_path }}
      aab_path: ${{ steps.meta.outputs.aab_path }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Validate build_type
        run: |
          case "${{ inputs.build_type }}" in
            debug|release) ;;
            *)
              echo "build_type must be debug or release" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Assert Firebase Android app config is configured
        if: inputs.require_google_services
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GitHub Actions secret ANDROID_GOOGLE_SERVICES_JSON" >&2
            exit 1
          fi

      - name: Write Firebase Android app config
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON is not configured; continuing without google-services.json"
            exit 0
          fi
          mkdir -p apps/mobile/secrets
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > apps/mobile/secrets/google-services.json

      - name: Inject Android versionCode into Expo config
        if: inputs.version_code != ''
        env:
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          node -e "const fs=require('fs'); const p='apps/mobile/app.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); d.expo=d.expo||{}; d.expo.android=d.expo.android||{}; d.expo.android.versionCode=Number(process.env.VERSION_CODE); fs.writeFileSync(p, JSON.stringify(d, null, 2)+'\\n');"

      - name: Validate Android release inputs
        if: inputs.validate_release_inputs
        run: |
          npm run verify:google-services --workspace=apps/mobile
          npm run type-check --workspace=apps/mobile
          (cd apps/mobile && npx expo config --json > /tmp/emberchamber-mobile-config.json)

      - name: Generate Android native project
        run: npm run build:android --workspace=apps/mobile

      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Assert Android signing secrets are configured
        if: inputs.sign
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_STORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub Actions secret ${key}" >&2
              exit 1
            fi
          done

      - name: Decode release keystore
        if: inputs.sign
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/app/emberchamber-release.keystore

      - name: Build Android artifact(s)
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          USE_PROD_SIGNING: ${{ inputs.sign }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug
            exit 0
          fi

          if [ "$USE_PROD_SIGNING" = "true" ]; then
            ./gradlew assembleRelease bundleRelease \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/apps/mobile/android/app/emberchamber-release.keystore" \
              -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
            exit 0
          fi

          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
            -Pandroid.injected.signing.store.password="android" \
            -Pandroid.injected.signing.key.alias="androiddebugkey" \
            -Pandroid.injected.signing.key.password="android"
        working-directory: apps/mobile/android

      - name: Collect Android artifacts
        id: meta
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          SAFE_REF=$(printf '%s' "${{ inputs.ref != '' && inputs.ref || github.ref_name }}" | tr '/:@' '-')
          OUT_DIR=apps/mobile/artifacts/android-build
          mkdir -p "$OUT_DIR"

          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_SRC=apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            APK_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-debug.apk"
            cp "$APK_SRC" "$APK_DEST"
            AAB_DEST=""
            ARTIFACT_NAME=${INPUT_ARTIFACT_NAME:-emberchamber-android-debug}
          else
            APK_SRC=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            AAB_SRC=apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
            APK_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-release.apk"
            AAB_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-release.aab"
            cp "$APK_SRC" "$APK_DEST"
            cp "$AAB_SRC" "$AAB_DEST"
            ARTIFACT_NAME=${INPUT_ARTIFACT_NAME:-emberchamber-android-release}
          fi

          {
            echo "artifact_name=$ARTIFACT_NAME"
            echo "apk_path=$APK_DEST"
            echo "aab_path=$AAB_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: apps/mobile/artifacts/android-build/*
          retention-days: 30
          if-no-files-found: error
