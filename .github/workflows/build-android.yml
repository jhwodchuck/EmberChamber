name: Build Android

on:
  workflow_call:
    inputs:
      build_type:
        description: Android build type (debug or release)
        required: true
        type: string
      sign:
        description: Sign with production keystore
        required: false
        type: boolean
        default: false
      ref:
        description: Git ref to checkout before building
        required: false
        type: string
        default: ""
      artifact_name:
        description: Artifact name for upload
        required: false
        type: string
        default: ""
      require_google_services:
        description: Fail if ANDROID_GOOGLE_SERVICES_JSON is missing
        required: false
        type: boolean
        default: false
      validate_release_inputs:
        description: Run release validation checks before build
        required: false
        type: boolean
        default: false
      version_code:
        description: Optional Android versionCode to inject into apps/mobile/app.json
        required: false
        type: string
        default: ""
      build_apk:
        description: Build APK (assembleRelease / assembleDebug)
        required: false
        type: boolean
        default: true
      build_aab:
        description: Build AAB via bundleRelease (release builds only)
        required: false
        type: boolean
        default: true
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_STORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
    outputs:
      artifact_name:
        description: Uploaded artifact name
        value: ${{ jobs.build.outputs.artifact_name }}
      apk_path:
        description: Built APK path
        value: ${{ jobs.build.outputs.apk_path }}
      aab_path:
        description: Built AAB path (release only)
        value: ${{ jobs.build.outputs.aab_path }}
      version_code:
        description: Android versionCode used for the build
        value: ${{ jobs.build.outputs.version_code }}
      mapping_path:
        description: R8/ProGuard mapping.txt path (release only; empty when minification is off)
        value: ${{ jobs.build.outputs.mapping_path }}

jobs:
  build:
    name: Build Android (${{ inputs.build_type }})
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_NO_TELEMETRY: "1"
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      apk_path: ${{ steps.meta.outputs.apk_path }}
      aab_path: ${{ steps.meta.outputs.aab_path }}
      version_code: ${{ steps.version-code.outputs.version_code }}
      mapping_path: ${{ steps.meta.outputs.mapping_path }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Validate build_type
        run: |
          case "${{ inputs.build_type }}" in
            debug|release) ;;
            *)
              echo "build_type must be debug or release" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Assert Firebase Android app config is configured
        if: inputs.require_google_services
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GitHub Actions secret ANDROID_GOOGLE_SERVICES_JSON" >&2
            exit 1
          fi

      - name: Write Firebase Android app config
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON is not configured; continuing without google-services.json"
            exit 0
          fi
          mkdir -p apps/mobile/secrets
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > apps/mobile/secrets/google-services.json

      - name: Resolve Android versionCode
        id: version-code
        env:
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$INPUT_VERSION_CODE" ]; then
            VERSION_CODE="$INPUT_VERSION_CODE"
          else
            DATE_CODE=$(date -u +%Y%m%d)
            RUN_SUFFIX=$(printf '%02d' $((GITHUB_RUN_NUMBER % 100)))
            VERSION_CODE="${DATE_CODE}${RUN_SUFFIX}"
          fi

          echo "Using Android versionCode: $VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Inject Android versionCode into Expo config
        run: |
          node -e "const fs=require('fs'); const p='apps/mobile/app.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); d.expo=d.expo||{}; d.expo.android=d.expo.android||{}; d.expo.android.versionCode=Number(process.env.VERSION_CODE); fs.writeFileSync(p, JSON.stringify(d, null, 2)+'\\n');"

      - name: Build protocol package
        run: npm run build --workspace=packages/protocol

      - name: Validate Android release inputs
        if: inputs.validate_release_inputs
        run: |
          npm run verify:google-services --workspace=apps/mobile
          npm run type-check --workspace=apps/mobile
          (cd apps/mobile && npx expo config --json > /tmp/emberchamber-mobile-config.json)

      - name: Generate Android native project
        run: npm run build:android --workspace=apps/mobile

      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Enable R8 minification and extend ProGuard rules
        if: inputs.build_type == 'release' && inputs.sign
        run: |
          PROPS=apps/mobile/android/gradle.properties
          RULES=apps/mobile/android/app/proguard-rules.pro

          # --- gradle.properties: enable R8 full-mode + resource shrinking ---
          if ! grep -q 'enableMinifyInReleaseBuilds' "$PROPS"; then
            printf '\n# R8 full-mode minification (produces mapping.txt for Play crash symbolication)\nandroid.enableMinifyInReleaseBuilds=true\nandroid.enableShrinkResourcesInReleaseBuilds=true\n' >> "$PROPS"
            echo "gradle.properties: Enabled R8 minification and resource shrinking"
          else
            echo "gradle.properties: R8 already enabled, skipping"
          fi

          # --- proguard-rules.pro: keep rules for RN/Expo ecosystem ---
          if ! grep -q 'emberchamber-r8-rules' "$RULES"; then
            printf '\n# emberchamber-r8-rules — appended by CI workflow\n' >> "$RULES"
            printf -- '-keep class com.facebook.react.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.hermes.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.jni.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.soloader.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.react.bridge.** { *; }\n' >> "$RULES"
            printf -- '-keepclassmembers class * { @com.facebook.react.bridge.ReactMethod *; }\n' >> "$RULES"
            printf -- '-keepclassmembers class * { @com.facebook.react.bridge.ReactProp *; }\n' >> "$RULES"
            printf -- '-keepclassmembers class * { @com.facebook.react.bridge.ReactPropGroup *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.hermes.unicode.** { *; }\n' >> "$RULES"
            printf -- '-keep class expo.modules.** { *; }\n' >> "$RULES"
            printf -- '-keep class host.exp.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.google.firebase.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.google.android.gms.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.react.fabric.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.react.uimanager.** { *; }\n' >> "$RULES"
            printf -- '-keep class com.facebook.react.turbomodule.** { *; }\n' >> "$RULES"
            printf -- '-dontwarn okhttp3.**\n' >> "$RULES"
            printf -- '-dontwarn okio.**\n' >> "$RULES"
            printf -- '-keep class okhttp3.** { *; }\n' >> "$RULES"
            printf -- '-keep interface okhttp3.** { *; }\n' >> "$RULES"
            printf -- '-dontwarn kotlinx.coroutines.**\n' >> "$RULES"
            printf -- '-keep class kotlinx.coroutines.** { *; }\n' >> "$RULES"
            printf -- '-dontwarn com.google.firebase.ktx.Firebase\n' >> "$RULES"
            printf -- '-dontwarn com.google.firebase.ktx.FirebaseExtensionsKt\n' >> "$RULES"
            printf -- '-dontwarn com.google.firebase.installations.ktx.InstallationsKt\n' >> "$RULES"
            echo "proguard-rules.pro: Appended React Native / Expo keep rules"
          else
            echo "proguard-rules.pro: Keep rules already present, skipping"
          fi

      - name: Assert Android signing secrets are configured
        if: inputs.sign
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_STORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub Actions secret ${key}" >&2
              exit 1
            fi
          done

      - name: Decode release keystore
        if: inputs.sign
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/app/emberchamber-release.keystore

      - name: Generate debug keystore for unsigned release builds
        if: inputs.build_type == 'release' && !inputs.sign
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Android artifact(s)
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          USE_PROD_SIGNING: ${{ inputs.sign }}
          BUILD_APK: ${{ inputs.build_apk }}
          BUILD_AAB: ${{ inputs.build_aab }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug
            exit 0
          fi

          # Compose release task list from build_apk / build_aab inputs
          GRADLE_TASKS=""
          [ "$BUILD_APK" = "true" ] && GRADLE_TASKS="$GRADLE_TASKS assembleRelease"
          [ "$BUILD_AAB" = "true" ] && GRADLE_TASKS="$GRADLE_TASKS bundleRelease"
          GRADLE_TASKS="${GRADLE_TASKS# }"  # strip leading space
          if [ -z "$GRADLE_TASKS" ]; then
            echo "build_apk and build_aab are both false — nothing to build" >&2
            exit 1
          fi

          if [ "$USE_PROD_SIGNING" = "true" ]; then
            # shellcheck disable=SC2086
            ./gradlew $GRADLE_TASKS \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/apps/mobile/android/app/emberchamber-release.keystore" \
              -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
            exit 0
          fi

          # shellcheck disable=SC2086
          ./gradlew $GRADLE_TASKS \
            -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
            -Pandroid.injected.signing.store.password="android" \
            -Pandroid.injected.signing.key.alias="androiddebugkey" \
            -Pandroid.injected.signing.key.password="android"
        working-directory: apps/mobile/android

      - name: Collect Android artifacts
        id: meta
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          BUILD_APK: ${{ inputs.build_apk }}
          BUILD_AAB: ${{ inputs.build_aab }}
          INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          SAFE_REF=$(printf '%s' "${{ inputs.ref || github.ref_name }}" | tr '/:@' '-')
          OUT_DIR=apps/mobile/artifacts/android-build
          mkdir -p "$OUT_DIR"

          APK_DEST=""
          AAB_DEST=""
          MAPPING_DEST=""

          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_SRC=apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            APK_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-debug.apk"
            cp "$APK_SRC" "$APK_DEST"
            ARTIFACT_NAME=${INPUT_ARTIFACT_NAME:-emberchamber-android-debug}
          else
            ARTIFACT_NAME=${INPUT_ARTIFACT_NAME:-emberchamber-android-release}

            if [ "$BUILD_APK" = "true" ]; then
              APK_SRC=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
              APK_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-release.apk"
              cp "$APK_SRC" "$APK_DEST"
            fi

            if [ "$BUILD_AAB" = "true" ]; then
              AAB_SRC=apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
              AAB_DEST="$OUT_DIR/emberchamber-${SAFE_REF}-release.aab"
              cp "$AAB_SRC" "$AAB_DEST"
            fi

            # Collect R8/ProGuard mapping file when present
            MAPPING_SRC=apps/mobile/android/app/build/outputs/mapping/release/mapping.txt
            if [ -f "$MAPPING_SRC" ]; then
              MAPPING_DEST="$OUT_DIR/mapping.txt"
              cp "$MAPPING_SRC" "$MAPPING_DEST"
              echo "Collected R8 mapping file: $MAPPING_DEST"
            else
              echo "No R8 mapping file found (minification may be disabled)"
            fi
          fi

          {
            echo "artifact_name=$ARTIFACT_NAME"
            echo "apk_path=$APK_DEST"
            echo "aab_path=$AAB_DEST"
            echo "mapping_path=$MAPPING_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: apps/mobile/artifacts/android-build/*
          retention-days: 30
          if-no-files-found: error

      - name: Fix failing Android build
        uses: fly-ci/wingman-action@v1
        if: ${{ failure() && github.event.pull_request != null }}
