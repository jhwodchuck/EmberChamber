name: Deploy - Relay

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Wrangler environment to deploy"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      health_url:
        description: "Optional base URL override for /health and /ready checks"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-relay-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy relay to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RELAY_ENV: ${{ github.event.inputs.environment || 'production' }}
      RELAY_HEALTH_URL_INPUT: ${{ github.event.inputs.health_url || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build protocol package
        run: npm run build --workspace=packages/protocol

      - name: Verify Rust relay contracts
        run: cargo test -p emberchamber-relay-protocol

      - name: Build relay
        run: npm run build --workspace=apps/relay

      - name: Test relay
        run: npm test --workspace=apps/relay

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --config apps/relay/wrangler.jsonc --env "$RELAY_ENV" --remote

      - name: Deploy Worker
        run: npx wrangler deploy --config apps/relay/wrangler.jsonc --env "$RELAY_ENV"

      - name: Emit deployment provenance
        run: |
          echo "┌── Deployment provenance ──────────────────────────"
          echo "│  Commit : $GITHUB_SHA"
          echo "│  Ref    : $GITHUB_REF_NAME"
          echo "│  Actor  : $GITHUB_ACTOR"
          echo "│  Run ID : $GITHUB_RUN_ID"
          echo "└────────────────────────────────────────────────────"

      - name: Resolve post-deploy health URL
        id: relay-url
        run: |
          if [ -n "$RELAY_HEALTH_URL_INPUT" ]; then
            echo "base_url=$RELAY_HEALTH_URL_INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$RELAY_ENV" = "production" ]; then
            echo "base_url=https://relay.emberchamber.com" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check /health
        if: steps.relay-url.outputs.base_url != ''
        run: curl --fail --show-error --silent --retry 5 --retry-delay 3 "${{ steps.relay-url.outputs.base_url }}/health"

      - name: Log deployed Worker version
        if: steps.relay-url.outputs.base_url != ''
        run: |
          HEALTH=$(curl --silent --retry 3 --retry-delay 3 "${{ steps.relay-url.outputs.base_url }}/health" || echo '{}')
          VERSION=$(printf '%s' "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','n/a'))" 2>/dev/null || echo "n/a")
          echo "Deployed Worker reports version: $VERSION"

      - name: Check /ready
        if: steps.relay-url.outputs.base_url != ''
        run: curl --fail --show-error --silent --retry 5 --retry-delay 3 "${{ steps.relay-url.outputs.base_url }}/ready"

      - name: Verify push secrets configured
        if: steps.relay-url.outputs.base_url != ''
        run: |
          READY_JSON=$(curl --fail --show-error --silent --retry 3 --retry-delay 3 "${{ steps.relay-url.outputs.base_url }}/ready")
          PUSH_CONFIGURED=$(echo "$READY_JSON" | jq -r '.pushConfigured')
          FCM_JSON_SET=$(echo "$READY_JSON" | jq -r '.features.fcmServiceAccountJson')
          PUSH_TOKEN_SET=$(echo "$READY_JSON" | jq -r '.features.pushTokenSecret')
          if [ "$PUSH_CONFIGURED" = "true" ]; then
            echo "Push secrets verified: pushConfigured=true"
          else
            echo "::warning title=Push not configured::Android push notifications will be silently skipped. Set EMBERCHAMBER_FCM_SERVICE_ACCOUNT_JSON and EMBERCHAMBER_PUSH_TOKEN_SECRET as Cloudflare Worker secrets, then redeploy. See docs/operator-playbook.md."
            echo "  features.fcmServiceAccountJson: $FCM_JSON_SET"
            echo "  features.pushTokenSecret:       $PUSH_TOKEN_SET"
          fi
