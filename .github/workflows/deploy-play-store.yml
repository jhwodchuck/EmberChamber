name: Deploy - Android to Play Store

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy, usually a tag like v0.1.0-beta.8"
        required: true
        type: string
      track:
        description: "Google Play track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Release status for the uploaded bundle"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - halted
          - inProgress
      rollout:
        description: "Rollout fraction from 0.0 to 1.0 when release_status is inProgress"
        required: false
        type: string
      in_app_update_priority:
        description: "In-app update priority from 0 to 5"
        required: true
        default: "2"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
      changes_not_sent_for_review:
        description: "Create the edit without sending it for review"
        required: true
        default: false
        type: boolean
      validate_only:
        description: "Validate with Google Play without publishing"
        required: true
        default: false
        type: boolean
      upload_screenshots:
        description: "Upload Play Store screenshots from the latest successful CI - Mobile run on main"
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_NO_TELEMETRY: "1"
  PLAY_PACKAGE_NAME: com.emberchamber.mobile

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-play-store-${{ github.event.inputs.track }}-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed AAB
    uses: ./.github/workflows/build-android.yml
    with:
      build_type: release
      sign: true
      ref: ${{ github.event.inputs.ref }}
      artifact_name: emberchamber-play-store-aab
      require_google_services: true
      validate_release_inputs: true
    secrets: inherit

  deploy:
    name: Upload AAB to Google Play
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION_CODE: ${{ needs.build.outputs.version_code }}
    steps:
      - name: Validate inputs
        env:
          PLAY_RELEASE_STATUS: ${{ github.event.inputs.release_status }}
          PLAY_ROLLOUT: ${{ github.event.inputs.rollout }}
        run: |
          if [ "$PLAY_RELEASE_STATUS" = "inProgress" ] && [ -z "$PLAY_ROLLOUT" ]; then
            echo "rollout is required when release_status is inProgress" >&2
            exit 1
          fi

          if [ -n "$PLAY_ROLLOUT" ] && ! printf '%s' "$PLAY_ROLLOUT" | grep -Eq '^(0(\.[0-9]+)?|1(\.0+)?)$'; then
            echo "rollout must be between 0.0 and 1.0" >&2
            exit 1
          fi

      - name: Assert Play Store credentials are configured
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub Actions secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Download signed AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: apps/mobile/artifacts/android-build

      - name: Resolve AAB path
        run: |
          AAB_PATH=$(find apps/mobile/artifacts/android-build -name '*.aab' | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "No AAB found in downloaded build artifacts" >&2
            exit 1
          fi
          echo "AAB_PATH=$AAB_PATH" >> "$GITHUB_ENV"

          MAPPING_PATH=$(find apps/mobile/artifacts/android-build -name 'mapping.txt' | head -n 1)
          if [ -n "$MAPPING_PATH" ]; then
            echo "Found R8 mapping file: $MAPPING_PATH"
            echo "PLAY_MAPPING_PATH=$MAPPING_PATH" >> "$GITHUB_ENV"
          else
            echo "No mapping file present; skipping deobfuscation upload"
          fi

      - name: Generate Play Store changelog
        env:
          REF: ${{ github.event.inputs.ref }}
        run: |
          git fetch --tags --quiet
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${REF}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${REF}"
          else
            RANGE="${REF}"
          fi

          # Collect feat/fix/perf subjects; drop merge, ci, docs, chore, test, build
          CHANGES=$(git log "$RANGE" \
            --pretty="• %s" \
            --no-merges \
            | grep -Ev '^[[:space:]]*$' \
            | grep -Ev '^• (chore|ci|docs|test|build)([(:)]|$)' \
            | head -15)

          if [ -z "$CHANGES" ]; then
            CHANGES="• Bug fixes and performance improvements"
          fi

          # Play Store "What's new" cap is 500 characters
          BODY=$(printf 'Beta %s\n\n%s' "$REF" "$CHANGES" | head -c 490)

          CHANGELOG_DIR="apps/mobile/fastlane/metadata/android/en-US/changelogs"
          mkdir -p "$CHANGELOG_DIR"
          printf '%s\n' "$BODY" > "${CHANGELOG_DIR}/${VERSION_CODE}.txt"
          echo "--- Play Store changelog ---"
          cat "${CHANGELOG_DIR}/${VERSION_CODE}.txt"

      - name: Download Android screenshots for Play Store
        if: ${{ github.event.inputs.upload_screenshots == 'true' }}
        run: |
          IMAGE_ROOT="apps/mobile/fastlane/metadata/android/en-US/images"
          declare -a SCREENSHOT_MAP=(
            "phone:phoneScreenshots"
            "tablet:sevenInchScreenshots"
            "chromebook:tenInchScreenshots"
          )

          for ENTRY in "${SCREENSHOT_MAP[@]}"; do
            PLAY_DIR="${ENTRY#*:}"
            DEST_DIR="$IMAGE_ROOT/$PLAY_DIR"
            rm -rf "$DEST_DIR"
            mkdir -p "$DEST_DIR"
          done

          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci-mobile.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "No successful CI - Mobile run on main; continuing without screenshot upload."
          else
            echo "Downloading Android screenshots from CI run $RUN_ID"
            for ENTRY in "${SCREENSHOT_MAP[@]}"; do
              FORM_FACTOR="${ENTRY%%:*}"
              PLAY_DIR="${ENTRY#*:}"
              DEST_DIR="$IMAGE_ROOT/$PLAY_DIR"

              gh run download "$RUN_ID" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "emberchamber-android-screenshots-${FORM_FACTOR}-*" \
                --dir "staging/screenshots/$FORM_FACTOR" 2>/dev/null || true

              find "staging/screenshots/$FORM_FACTOR" -name '*.png' \
                -exec cp {} "$DEST_DIR/" \; 2>/dev/null || true

              SHOT_COUNT=$(find "$DEST_DIR" -name '*.png' | wc -l)
              echo "Staged ${SHOT_COUNT} ${FORM_FACTOR} screenshot(s) to ${PLAY_DIR}"
            done
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Write Google Play service account key
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          KEY_PATH="$RUNNER_TEMP/google-play-service-account.json"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$KEY_PATH"
          echo "PLAY_JSON_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve retained Play version codes
        env:
          PLAY_TRACK: ${{ github.event.inputs.track }}
        run: |
          RETAINED_CODES=$(ruby <<'RUBY'
          require 'google/apis/androidpublisher_v3'
          require 'googleauth'

          package_name = ENV.fetch('PLAY_PACKAGE_NAME')
          track_name = ENV.fetch('PLAY_TRACK')
          json_key_path = ENV.fetch('PLAY_JSON_KEY')
          current_version_code = ENV.fetch('VERSION_CODE').to_i

          service = Google::Apis::AndroidpublisherV3::AndroidPublisherService.new
          scope = 'https://www.googleapis.com/auth/androidpublisher'
          service.authorization = Google::Auth::ServiceAccountCredentials.make_creds(
            json_key_io: File.open(json_key_path),
            scope: scope
          )

          edit = service.insert_edit(package_name, Google::Apis::AndroidpublisherV3::AppEdit.new)
          begin
            track = service.get_edit_track(package_name, edit.id, track_name)
            version_codes = Array(track.releases)
              .flat_map { |release| Array(release.version_codes) }
              .compact
              .map(&:to_i)
              .uniq
              .reject { |code| code == current_version_code }
            puts version_codes.join(',')
          ensure
            begin
              service.delete_edit(package_name, edit.id)
            rescue StandardError
            end
          end
          RUBY
          )

          if [ -n "$RETAINED_CODES" ]; then
            echo "Retaining existing Play version codes: $RETAINED_CODES"
            echo "PLAY_VERSION_CODES_TO_RETAIN=$RETAINED_CODES" >> "$GITHUB_ENV"
          else
            echo "No existing version codes to retain for track $PLAY_TRACK"
          fi

      - name: Upload AAB to Google Play
        env:
          PLAY_TRACK: ${{ github.event.inputs.track }}
          PLAY_RELEASE_STATUS: ${{ github.event.inputs.release_status }}
          PLAY_ROLLOUT: ${{ github.event.inputs.rollout }}
          PLAY_UPDATE_PRIORITY: ${{ github.event.inputs.in_app_update_priority }}
          PLAY_VALIDATE_ONLY: ${{ github.event.inputs.validate_only }}
          PLAY_CHANGES_NOT_SENT_FOR_REVIEW: ${{ github.event.inputs.changes_not_sent_for_review }}
        run: |
          cmd=(
            fastlane run upload_to_play_store
            "json_key:$PLAY_JSON_KEY"
            "package_name:$PLAY_PACKAGE_NAME"
            "aab:$AAB_PATH"
            "track:$PLAY_TRACK"
            "release_status:$PLAY_RELEASE_STATUS"
            "in_app_update_priority:$PLAY_UPDATE_PRIORITY"
            "validate_only:$PLAY_VALIDATE_ONLY"
            "metadata_path:apps/mobile/fastlane/metadata/android"
            "skip_upload_metadata:true"
            "skip_upload_images:false"
            "changes_not_sent_for_review:$PLAY_CHANGES_NOT_SENT_FOR_REVIEW"
          )

          if [ -n "$PLAY_ROLLOUT" ]; then
            cmd+=("rollout:$PLAY_ROLLOUT")
          fi

          if [ -n "$PLAY_VERSION_CODES_TO_RETAIN" ]; then
            cmd+=("version_codes_to_retain:$PLAY_VERSION_CODES_TO_RETAIN")
          fi

          if [ -n "$PLAY_MAPPING_PATH" ]; then
            cmd+=("mapping:$PLAY_MAPPING_PATH")
          fi

          "${cmd[@]}"
