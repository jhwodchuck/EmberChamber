name: CI - Docker Compose

on:
  push:
    branches: [main]
    paths:
      - "infra/docker-compose.yml"
      - ".env.example"
      - ".github/workflows/ci-docker.yml"
  pull_request:
    paths:
      - "infra/docker-compose.yml"
      - ".env.example"

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-up:
    name: Verify current app stack services boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Boot Compose dependencies
        run: |
          docker compose -f infra/docker-compose.yml \
            up -d postgres redis minio
        timeout-minutes: 5

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose -f infra/docker-compose.yml \
              exec -T postgres pg_isready -U privatemesh && break
            sleep 2
          done

      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
