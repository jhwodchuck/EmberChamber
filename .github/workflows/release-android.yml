name: Release - Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK / AAB
    runs-on: ubuntu-22.04
    env:
      PRIVATEMESH_APP_URL: ${{ vars.PRIVATEMESH_APP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install dependencies
        run: npm ci

      - name: Verify web build
        run: npm run build --workspace=apps/web

      - name: Initialize Android project
        run: npm run android:init --workspace=apps/desktop
        continue-on-error: true

      - name: Build Android shell
        run: npm run build:android --workspace=apps/desktop -- --debug
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privatemesh-android
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            apps/desktop/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30
