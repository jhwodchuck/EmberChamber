name: Release - Android Beta

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android beta scaffold
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android app
        run: npm run prebuild --workspace=apps/mobile

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/mobile/android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emberchamber-android-beta
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
