name: Release - Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Must be a v* tag for the publish job to run."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android release artifacts
    uses: ./.github/workflows/build-android.yml
    with:
      build_type: release
      sign: true
      validate_release_inputs: true
      require_google_services: true
      ref: ${{ inputs.ref || github.ref }}
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  publish:
    name: Publish Android artifacts to GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist/android

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
          generate_release_notes: true
          files: dist/android/*
