name: Release - Android Beta

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_NO_TELEMETRY: '1'

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android beta scaffold
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android native project
        run: npm run prebuild --workspace=apps/mobile

      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/mobile/android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-android-beta
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish Android asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: apps/mobile/android/app/build/outputs/apk/debug/*.apk
