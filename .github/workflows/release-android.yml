name: Release - Android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_NO_TELEMETRY: "1"

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android release artifacts
    uses: ./.github/workflows/build-android.yml
    with:
      build_type: release
      sign: true
      ref: ${{ github.ref_name }}
      artifact_name: emberchamber-android-release
      require_google_services: true
      validate_release_inputs: true
    secrets: inherit

  publish-release:
    name: Publish Android assets to GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: apps/mobile/artifacts/android-build

      - name: Publish Android assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
          files: |
            apps/mobile/artifacts/android-build/*.apk
            apps/mobile/artifacts/android-build/*.aab
