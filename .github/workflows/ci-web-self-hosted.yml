name: CI - Relay and Companion Apps (Self-Hosted)

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web-self-hosted.yml"
      - ".github/workflows/ci-web.yml"
      - ".github/workflows/reusable-ci-web.yml"
  workflow_dispatch:

concurrency:
  group: ci-relay-web-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-web.yml
    with:
      runner: '["self-hosted","Linux","X64","emberchamber-trusted"]'
      capture_screenshots: true
