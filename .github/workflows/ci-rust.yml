name: CI - Rust Core and Protocol

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-rust.yml"
      - ".github/workflows/reusable-ci-rust.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-rust.yml"
      - ".github/workflows/reusable-ci-rust.yml"

concurrency:
  group: ci-rust-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-rust.yml
    with:
      runner: '"ubuntu-latest"'
