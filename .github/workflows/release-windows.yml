name: Release - Windows Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: ./.github/workflows/reusable-release-desktop.yml
    with:
      runner: '"windows-latest"'
      platform: windows
      artifact_name: emberchamber-windows
      install_linux_deps: false
      prerelease: true

