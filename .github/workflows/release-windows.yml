name: Release - Windows Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer (.exe / .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Restore npm cache
        id: npm-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Save npm cache
        if: steps.npm-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: node-cache-${{ runner.os }}-${{ runner.arch }}-npm-${{ hashFiles('package-lock.json') }}

      - name: Build Windows shell
        run: npm run build --workspace=apps/desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: error

      - name: Publish Windows assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
