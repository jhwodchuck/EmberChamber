name: Release - Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer (.exe / .msi)
    runs-on: windows-latest
    env:
      PRIVATEMESH_APP_URL: ${{ vars.PRIVATEMESH_APP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify web build
        run: npm run build --workspace=apps/web

      - name: Build Windows shell
        run: npm run build --workspace=apps/desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privatemesh-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
