name: Release - Windows Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer (.exe / .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows shell
        run: npm run build --workspace=apps/desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: error

      - name: Publish Windows assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
