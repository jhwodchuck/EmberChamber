name: Release - Apple Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-apple-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS app (.app / .dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build macOS shell
        run: npm run build --workspace=apps/desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-macos
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Publish macOS assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
