name: Release - Apple Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-apple-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: ./.github/workflows/reusable-release-desktop.yml
    with:
      runner: '"macos-14"'
      platform: macos
      artifact_name: emberchamber-macos
      install_linux_deps: false
      prerelease: true

