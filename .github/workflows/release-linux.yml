name: Release - Linux Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: ./.github/workflows/reusable-release-desktop.yml
    with:
      runner: '"ubuntu-22.04"'
      platform: linux
      artifact_name: emberchamber-linux
      install_linux_deps: true
      prerelease: true

