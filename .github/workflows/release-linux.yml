name: Release - Linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Ubuntu .deb and AppImage
    runs-on: ubuntu-22.04
    env:
      PRIVATEMESH_APP_URL: ${{ vars.PRIVATEMESH_APP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Verify web build
        run: npm run build --workspace=apps/web

      - name: Build Linux shell
        run: npm run build --workspace=apps/desktop

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privatemesh-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
