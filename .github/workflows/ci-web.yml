name: CI - Relay and Companion Apps

on:
  push:
    branches: [main]
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
      - ".github/workflows/reusable-ci-web.yml"
  pull_request:
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
      - ".github/workflows/reusable-ci-web.yml"

concurrency:
  group: ci-relay-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-web.yml
    with:
      runner: '"ubuntu-22.04"'
      capture_screenshots: true
