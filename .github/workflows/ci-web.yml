name: CI - Relay and Companion Apps

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: ci-relay-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check relay, build web, test relay, and check desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build protocol package
        run: npm run build --workspace=packages/protocol

      - name: Check relay and web
        run: npm run type-check

      - name: Build web companion
        run: npm run build --workspace=apps/web

      - name: Test relay helpers
        run: npm test --workspace=apps/relay

      - name: Check desktop shell
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
