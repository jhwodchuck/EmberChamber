name: CI - Relay and Companion Apps

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "apps/relay/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: ci-relay-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check relay, build web, test relay, and check desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build protocol package
        run: npm run build --workspace=packages/protocol

      - name: Check relay and web
        run: npm run type-check

      - name: Build web companion
        run: npm run build --workspace=apps/web

      - name: Test relay helpers
        run: npm test --workspace=apps/relay

      - name: Check desktop shell
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  screenshots:
    name: Capture web and desktop shell screenshots
    runs-on: ubuntu-22.04
    needs: verify
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build protocol package
        run: npm run build --workspace=packages/protocol

      - name: Build web app
        run: npm run build --workspace=apps/web

      - name: Install Playwright Chromium
        run: npx -y playwright@1.54.2 install --with-deps chromium

      - name: Capture web screenshots
        run: |
          mkdir -p apps/web/artifacts/screenshots
          npm run start --workspace=apps/web -- --hostname 127.0.0.1 --port 3000 &
          WEB_PID=$!
          trap 'kill $WEB_PID' EXIT

          npx -y wait-on@8.0.3 http://127.0.0.1:3000/start
          npx -y playwright@1.54.2 screenshot --device="Desktop Chrome" \
            http://127.0.0.1:3000/start \
            apps/web/artifacts/screenshots/01-start.png
          npx -y playwright@1.54.2 screenshot --device="Desktop Chrome" \
            http://127.0.0.1:3000/login \
            apps/web/artifacts/screenshots/02-login.png

      - name: Capture desktop shell screenshot
        run: |
          mkdir -p apps/desktop/artifacts/screenshots
          npx -y playwright@1.54.2 screenshot --device="Desktop Chrome" \
            "file://$GITHUB_WORKSPACE/apps/desktop/shell/index.html" \
            apps/desktop/artifacts/screenshots/01-shell.png

      - name: Upload web screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-web-screenshots-${{ github.run_number }}
          path: apps/web/artifacts/screenshots
          retention-days: 14
          if-no-files-found: error

      - name: Upload desktop screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-desktop-screenshots-${{ github.run_number }}
          path: apps/desktop/artifacts/screenshots
          retention-days: 14
          if-no-files-found: error
