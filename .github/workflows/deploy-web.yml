name: Deploy - Web

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy (e.g. relay config change, env var update)"
        required: false
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy web to Vercel production
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Vercel production deployment
        id: vercel-deploy
        run: |
          RESPONSE=$(curl --silent --show-error --fail \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "Vercel deploy triggered successfully"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          job = d.get('job', {})
          print('Job ID:', job.get('id', 'n/a'))
          print('State:', job.get('state', 'n/a'))
          print('Created:', job.get('createdAt', 'n/a'))
          " 2>/dev/null || true

      - name: Wait and verify deployment is live
        run: |
          # Poll the homepage until Vercel's build completes and the CDN
          # propagates, then do a full set of route smoke checks.
          # Polling cap: 5 minutes; probe interval: 15 s.
          BASE="https://emberchamber.com"
          MAX_WAIT=300
          INTERVAL=15
          ELAPSED=0

          echo "Polling $BASE/ for deployment readiness (up to ${MAX_WAIT}s)…"
          while true; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 "${BASE}/")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Deployment live after ${ELAPSED}s (${BASE}/ → ${STATUS})"
              break
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "::error::Timed out waiting for deployment after ${MAX_WAIT}s (last status: ${STATUS})" >&2
              exit 1
            fi
            echo "  ${STATUS} — retrying in ${INTERVAL}s (${ELAPSED}s elapsed)…"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # ---------------------------------------------------------------------------
          # Route smoke tests – verify that core public routes are reachable and return
          # expected HTTP status codes.  A redirect (3xx) is also acceptable on some
          # routes when the CDN enforces HTTPS or canonical domains.
          # ---------------------------------------------------------------------------
          BASE="https://emberchamber.com"
          FAIL=0

          check_route() {
            local path="$1"
            local description="$2"
            local status
            status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --retry 4 --retry-delay 10 --retry-all-errors \
              --max-time 20 \
              "${BASE}${path}")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "  OK  ${status}  ${description} (${path})"
            else
              echo "  FAIL ${status}  ${description} (${path})" >&2
              FAIL=1
            fi
          }

          echo "--- Route smoke checks ---"
          check_route "/"              "Homepage"
          check_route "/start"         "Start here (onboarding)"
          check_route "/download"      "Download / launch targets"
          check_route "/privacy"       "Privacy policy"
          check_route "/trust-and-safety" "Trust and safety"
          check_route "/login"         "Sign-in page"
          check_route "/register"      "Join-beta page"
          check_route "/support"       "Support guide"
          check_route "/beta-terms"    "Beta terms"
          echo "--------------------------"

          if [ "$FAIL" -ne 0 ]; then
            echo "One or more route smoke checks failed." >&2
            exit 1
          fi

          echo "All route smoke checks passed."
