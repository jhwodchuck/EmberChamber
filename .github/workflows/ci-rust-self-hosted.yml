name: CI - Rust Core and Protocol (Self-Hosted)

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-rust-self-hosted.yml"
      - ".github/workflows/ci-rust.yml"
  workflow_dispatch:

concurrency:
  group: ci-rust-core-self-hosted-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format, test, and check Rust core crates
    runs-on: [self-hosted, Linux, X64, emberchamber-trusted]
    steps:
      - uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy -p emberchamber-core -p emberchamber-relay-protocol --all-targets --all-features

      - name: cargo test
        run: cargo test -p emberchamber-core -p emberchamber-relay-protocol
