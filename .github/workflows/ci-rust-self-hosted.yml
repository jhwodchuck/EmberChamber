name: CI - Rust Core and Protocol (Self-Hosted)

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-rust-self-hosted.yml"
      - ".github/workflows/ci-rust.yml"
      - ".github/workflows/reusable-ci-rust.yml"
  workflow_dispatch:

concurrency:
  group: ci-rust-core-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-rust.yml
    with:
      runner: '["self-hosted","Linux","X64","emberchamber-trusted"]'
