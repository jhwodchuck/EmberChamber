name: CI - Mobile (Reusable)
# Canonical Android/mobile CI logic.  Wrap this in thin trigger files rather
# than duplicating the steps across hosted and self-hosted variants.

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON-encoded runner label or label array.
          Hosted example  : '"ubuntu-22.04"'
          Self-hosted      : '["self-hosted","Linux","X64","emberchamber-trusted"]'
        type: string
        required: true
      capture_screenshots:
        description: Run the screenshot capture job after the Android build
        type: boolean
        default: true
      emulator_options:
        description: Extra flags forwarded to the Android emulator (useful for headless self-hosted runners)
        type: string
        default: "-no-audio -no-window -no-boot-anim"
      artifact_suffix:
        description: Optional suffix appended to artifact names (e.g. run number)
        type: string
        default: ""
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_NO_TELEMETRY: "1"

jobs:
  verify-android:
    name: Verify Android mobile app
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-workspace

      - uses: ./.github/actions/write-android-google-services
        with:
          google-services-json: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          required: "false"

      - uses: ./.github/actions/build-protocol

      - name: Verify Android mobile project
        run: npm run verify:android --workspace=apps/mobile

      - name: Fix failing Android verification
        uses: fly-ci/wingman-action@v1
        if: ${{ failure() && github.event.pull_request != null }}

  build-android-release:
    name: Build Android release APK for screenshots
    needs: verify-android
    if: inputs.capture_screenshots
    uses: ./.github/workflows/build-android.yml
    with:
      build_type: release
      sign: false
      artifact_name: emberchamber-android-release-screenshots
      build_apk: true
      build_aab: false
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}

  android-screenshots:
    name: Capture Android screenshots (${{ matrix.device_class }})
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: build-android-release
    if: inputs.capture_screenshots
    strategy:
      fail-fast: false
      matrix:
        include:
          - device_class: phone
            avd_profile: pixel_3a
            orientation: portrait
            wm_size: 1080x2220
            wm_density: 440
          - device_class: tablet
            avd_profile: pixel_tablet
            orientation: portrait
            wm_size: 1600x2560
            wm_density: 320
          - device_class: chromebook
            avd_profile: pixel_c
            orientation: landscape
            wm_size: 1366x768
            wm_density: 160
    env:
      ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix != '' && inputs.artifact_suffix || github.run_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Download release APK artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-android-release.outputs.artifact_name }}
          path: apps/mobile/artifacts/android-build

      - name: Resolve APK path
        run: |
          APK_PATH=$(find apps/mobile/artifacts/android-build -name '*.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in downloaded build artifacts" >&2
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Capture emulator screenshots
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: ${{ matrix.avd_profile }}
          avd-name: ci-screenshot-avd-${{ matrix.device_class }}-${{ matrix.avd_profile }}
          force-avd-creation: true
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: ${{ inputs.emulator_options }}
          script: bash apps/mobile/scripts/run-emulator-screenshots.sh "$APK_PATH" "${{ matrix.device_class }}" "${{ matrix.wm_size }}" "${{ matrix.wm_density }}" "${{ matrix.orientation }}"

      - name: Upload Android screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-android-screenshots-${{ matrix.device_class }}-${{ env.ARTIFACT_SUFFIX }}
          path: apps/mobile/artifacts/android-screenshots/${{ matrix.device_class }}
          retention-days: 14
          if-no-files-found: warn

      - name: Fix failing Android screenshot capture
        uses: fly-ci/wingman-action@v1
        if: ${{ failure() && github.event.pull_request != null }}
