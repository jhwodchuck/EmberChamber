name: CI - Mobile

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/protocol/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/build-android.yml"
      - ".github/workflows/reusable-ci-mobile.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/protocol/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/build-android.yml"
      - ".github/workflows/reusable-ci-mobile.yml"

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci-mobile.yml
    with:
      runner: '"ubuntu-22.04"'
      capture_screenshots: ${{ github.event_name == 'push' }}
    secrets:
      ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
