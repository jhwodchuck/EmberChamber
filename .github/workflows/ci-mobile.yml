name: CI - Mobile

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/release-android.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/release-android.yml"

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-android:
    name: Verify Android mobile app
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Write Firebase Android app config
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "ANDROID_GOOGLE_SERVICES_JSON is not configured; continuing without google-services.json"
            exit 0
          fi
          mkdir -p apps/mobile/secrets
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > apps/mobile/secrets/google-services.json

      - name: Verify Android mobile project
        run: npm run verify:android --workspace=apps/mobile

  android-screenshots:
    name: Capture Android screenshots (${{ matrix.device_class }})
    runs-on: ubuntu-22.04
    needs: verify-android
    strategy:
      fail-fast: false
      matrix:
        include:
          - device_class: phone
            wm_size: 1080x1920
            wm_density: 420
          - device_class: tablet
            wm_size: 1920x1200
            wm_density: 240
          - device_class: chromebook
            wm_size: 1366x768
            wm_density: 160
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Android native project
        run: npm run build:android --workspace=apps/mobile

      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Build Android debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/mobile/android

      - name: Capture emulator screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          avd-name: ci-screenshot-avd-${{ matrix.device_class }}
          disable-animations: true
          script: |
            adb install -r apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            bash apps/mobile/scripts/capture-android-screenshots.sh \
              "apps/mobile/artifacts/android-screenshots/${{ matrix.device_class }}" \
              "com.emberchamber.mobile" \
              "${{ matrix.device_class }}" \
              "${{ matrix.wm_size }}" \
              "${{ matrix.wm_density }}"

      - name: Upload Android screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emberchamber-android-screenshots-${{ matrix.device_class }}-${{ github.run_number }}
          path: apps/mobile/artifacts/android-screenshots/${{ matrix.device_class }}
          retention-days: 14
          if-no-files-found: error
