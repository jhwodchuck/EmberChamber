name: CI - Mobile

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/release-android.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-mobile.yml"
      - ".github/workflows/release-android.yml"

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-android:
    name: Verify Android mobile app
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase Android app config
        if: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON != '' }}
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p apps/mobile/secrets
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > apps/mobile/secrets/google-services.json

      - name: Verify Android mobile project
        run: npm run verify:android --workspace=apps/mobile
