name: Setup Node workspace
description: >
  Installs the correct Node.js version with the npm cache wired to
  package-lock.json, then runs `npm ci --no-audit --no-fund` to install all
  workspace dependencies.  Use this as the first step in any job that needs
  the Node ecosystem.

inputs:
  node-version:
    description: Node.js version to install
    default: "22"
    required: false

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      shell: bash
      run: npm ci --no-audit --no-fund
